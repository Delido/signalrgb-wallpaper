ShortDescription: Live RGB glow on your desktop, driven by your SignalRGB effect.
Description: |-
  SignalRGB Desktop Wallpaper makes your live SignalRGB effect shine
  through transparent regions of your wallpaper image. Pick any
  picture, carve cut-outs into it (or use one of the bundled
  starters), and the holes light up in whatever colour your current
  SignalRGB effect is producing — in real time, 60 fps, with zero
  noticeable CPU cost.

  Runs on top of Lively Wallpaper (free) or Wallpaper Engine (paid,
  on Steam). The installer sets everything up automatically — no
  Python, no manual file copies, no terminal.

  Highlights:
  - Live RGB glow behind a transparent background, up to 60 Hz
  - Up to 4 monitors, each fully independent or spanned
  - In-browser image editor + curated wallpaper-pack browser
    backed by GitHub Pages manifests
  - Browser-based Configurator with floating live preview
  - 18 ambient presets (snow, rain, storm, sparks, aurora,
    constellation, fireflies, plasma, vortex, bubbles, matrix,
    starfield, lightning, waves, ripples, flowfield, wormhole,
    and weather-reactive auto-pick from your live forecast)
  - Cursor effects: liquid distortion, chromatic halo,
    spotlight, widget float, plus a click-driven water ripple
    that bends the wallpaper image with real SVG refraction
  - 13 widgets (clock, calendar, weather with three skin
    variants, sticky note, countdown, picture, quote,
    CPU/RAM/hardware-sensor meters, audio spectrum, now-playing,
    RSS feed)
  - 10 Quick Look bundles (one-click full-screen presets)
  - Preset slots, per-app profiles, hotkeys, auto-cycle
  - DE / EN UI, auto-detected from Windows locale
  - Auto-pause when a fullscreen app is active
