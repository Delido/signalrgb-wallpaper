// For tile-x and tile-y, the non-repeating axis stays at "100%" so
// the image still fills that direction; the repeating axis scales.
const BG_FIT_CSS = {
  "cover":   { size: () => "cover",                                                 repeat: "no-repeat" },
  "contain": { size: () => "contain",                                               repeat: "no-repeat" },
  "fill":    { size: () => "100% 100%",                                             repeat: "no-repeat" },
  "tile":    { size: (s) => "calc(var(--bg-w, auto) * " + s + " / 100) "
                          + "calc(var(--bg-h, auto) * " + s + " / 100)",            repeat: "repeat"    },
  "tile-x":  { size: (s) => "calc(var(--bg-w, auto) * " + s + " / 100) 100%",       repeat: "repeat-x"  },
  "tile-y":  { size: (s) => "100% calc(var(--bg-h, auto) * " + s + " / 100)",       repeat: "repeat-y"  },
};

let currentBgFit = "cover";
let currentBgTileScale = 100;

function applyBgFit(mode) {
  currentBgFit = mode;
  _refreshBgSize();
}
function applyBgTileScale(scale) {
  const s = Math.max(10, Math.min(200, parseInt(scale, 10) || 100));
  currentBgTileScale = s;
  _refreshBgSize();
}
function _refreshBgSize() {
  const css = BG_FIT_CSS[currentBgFit] || BG_FIT_CSS.cover;
  bgEl.style.backgroundSize = css.size(currentBgTileScale);
  bgEl.style.backgroundRepeat = css.repeat;
  // Video uses object-fit instead of background-size. The tile
  // modes don't apply to video (browsers can't repeat-tile a
  // <video> the way background-repeat can a CSS image), so map
  // anything tile-shaped to cover.
  let vFit;
  switch (currentBgFit) {
    case "contain": vFit = "contain"; break;
    case "fill":    vFit = "fill";    break;
    default:        vFit = "cover";   // cover, tile*, anything unknown
  }
  bgVideoEl.style.objectFit = vFit;
}

function setBackground() {
  const raw = urlOverride && urlOverride.trim() ? urlOverride.trim() : pickedImagePath;
  const src = normalizeImagePath(raw);
  console.log("[wallpaper] setBackground: raw=", JSON.stringify(raw), "src=", JSON.stringify(src));
  flashDebug("raw=" + JSON.stringify(raw) + " | normalised=" + JSON.stringify(src));
  if (!src) {
    _clearImageBg();
    _clearVideoBg();
    return;
  }
  if (VIDEO_BG_EXTS.test(src)) {
    _setVideoBg(src);
  } else {
    _setImageBg(src);
  }
}

function _clearImageBg() {
  bgEl.style.backgroundImage = "";
  bgEl.style.opacity = "0";
}
function _clearVideoBg() {
  bgVideoEl.style.opacity = "0";
  bgVideoEl.style.display = "none";
  try { bgVideoEl.pause(); } catch (_) {}
  // v1.2.13: aggressive teardown to release the decoded-video buffer.
  // Chromium's HTMLMediaElement holds onto the decoded frame pool well
  // beyond a `removeAttribute("src")` — the user's report was a video
  // bg replaced by an image leaving ~hundreds of MB allocated.
  // Sequence that actually frees the buffer in Chromium / WebView2:
  //   • pause (above)
  //   • src = ""   then load() — drops the current source
  //   • removeAttribute("src") — clears any lingering attr-side state
  //   • removeAttribute("currentTime") — guards against weird seeks
  //   • dataset.currentSrc = "" — resets our own duplicate-load guard
  // The bgVideoEl element itself is reused (replacing it would lose
  // the CSS rules + the pause-state listeners hooked up at boot).
  try { bgVideoEl.src = ""; } catch (_) {}
  try { bgVideoEl.load(); } catch (_) {}
  bgVideoEl.removeAttribute("src");
  bgVideoEl.removeAttribute("currentTime");
  bgVideoEl.dataset.currentSrc = "";
}

function _setImageBg(src) {
  // Hide video first so the image fade isn't stacked on a still-
  // running clip during the swap.
  _clearVideoBg();
  // <div> backgrounds don't fire load / error events the way <img>
  // does, so we preload via a throwaway Image and wire its events
  // to drive the same fade-in / debug-flash UX the old <img>
  // implementation gave us.
  const probe = new Image();
  probe.onload = () => {
    // CSS url() needs the path single-quoted to survive paths with
    // spaces or parentheses. encodeURI handles the bytes safely.
    bgEl.style.backgroundImage = "url('" + src.replace(/'/g, "%27") + "')";
    // Stash natural pixel dimensions as CSS custom properties so the
    // tile-mode sizes (calc(var(--bg-w) * scale / 100)) can scale
    // the pattern relative to the source image's own resolution.
    // cover / contain / fill ignore these.
    bgEl.style.setProperty("--bg-w", (probe.naturalWidth || 1) + "px");
    bgEl.style.setProperty("--bg-h", (probe.naturalHeight || 1) + "px");
    // Re-apply background-size now that the natural dimensions are
    // known — important on first load when applyBgFit was called
    // before the image had loaded.
    _refreshBgSize();
    bgEl.style.opacity = "1";
  };
  probe.onerror = () => {
    const msg = "image load failed: " + src;
    console.error("[wallpaper]", msg);
    if (showStatusEnabled) {
      statusEl.textContent = msg;
      statusEl.classList.remove("ok", "hidden");
      statusEl.classList.add("bad");
    }
  };
  probe.src = src;
}

function _setVideoBg(src) {
  // Hide image div first so the video fade-in isn't masked by a
  // still-painted background-image during the swap.
  _clearImageBg();
  bgVideoEl.style.display = "block";
  // Only re-set src + reload when the source actually changed —
  // re-assigning the same src restarts playback from frame 0 which
  // is a visible glitch on every settings push.
  const want = src;
  if (bgVideoEl.dataset.currentSrc !== want) {
    bgVideoEl.dataset.currentSrc = want;
    bgVideoEl.src = src;
    try { bgVideoEl.load(); } catch (_) {}
  }
  // <video> fires `loadedmetadata` when dimensions are known; use
  // that to push the native pixel size into the same --bg-w /
  // --bg-h slots the image path uses (so tile-mode CSS lookups
  // don't break when someone configures a video as tile bg).
  const onMeta = () => {
    bgEl.style.setProperty("--bg-w", (bgVideoEl.videoWidth  || 1) + "px");
    bgEl.style.setProperty("--bg-h", (bgVideoEl.videoHeight || 1) + "px");
    _refreshBgSize();
    bgVideoEl.removeEventListener("loadedmetadata", onMeta);
  };
  bgVideoEl.addEventListener("loadedmetadata", onMeta);
  bgVideoEl.onerror = () => {
    const msg = "video load failed: " + src;
    console.error("[wallpaper]", msg);
    if (showStatusEnabled) {
      statusEl.textContent = msg;
      statusEl.classList.remove("ok", "hidden");
      statusEl.classList.add("bad");
    }
  };
  // Autoplay can be blocked by host policy even with muted=true;
  // call play() explicitly and swallow the rejection.
  const startPlay = () => {
    bgVideoEl.play().catch((e) => {
      console.warn("[wallpaper] video autoplay blocked:", e && e.message);
    });
    bgVideoEl.style.opacity = "1";
  };
  // canplay = first frame decodable, safe to fade in. Falls back
  // to loadedmetadata for hosts that don't fire canplay reliably.
  if (bgVideoEl.readyState >= 2) {
    startPlay();
  } else {
    const onReady = () => {
      startPlay();
      bgVideoEl.removeEventListener("canplay", onReady);
    };
    bgVideoEl.addEventListener("canplay", onReady);
  }
}

// Legacy listener kept around for any external code that still
// listens — the new path is `probe.onerror` above. We leave the
// stub so addEventListener doesn't throw on the now-div element
// (divs accept the listener silently but never fire it).
bgEl.addEventListener("error", () => {
  const tried = bgEl.style.backgroundImage || "(empty)";
  const msg = "image load failed: " + tried;
  console.error("[wallpaper]", msg);
  // Only surface in the on-screen overlay when the user explicitly enabled
  // the debug overlay — otherwise we'd silently override their off-toggle
  // every time an image fails to load.
  if (showStatusEnabled) {
    statusEl.textContent = msg;
    statusEl.classList.remove("ok", "hidden");
    statusEl.classList.add("bad");
  }
});

// Force-show the status overlay with a transient message - used to surface
// property changes and other diagnostics. Gated on showStatusEnabled so
// users who disabled the overlay don't see it pop up on every settings
// push (every applyProperty() call would otherwise flash the overlay back
// to visible for 8 seconds).
let _flashTimer = null;
let flashUntil = 0;
let showStatusEnabled = false;
function flashDebug(text) {
  if (!showStatusEnabled) return;
  statusEl.textContent = text;
  statusEl.classList.remove("hidden", "bad", "ok");
  flashUntil = performance.now() + 8000;  // sticky for 8 s
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => {
    statusEl.textContent = "";
    flashUntil = 0;
  }, 8000);
}

function applyProperty(name, val) {
  // v1.5.0-beta hotfix: preview-mode short-circuit. The Configurator's
  // live-preview iframe doesn't need rAF-driven effects to render at
  // full fidelity — they're the dominant CPU cost (per the user's
  // trace: tens of thousands of paint events per second from
  // ambient + audio-glow + pixelfx rAF chains, on top of the glow
  // grid). Hard-disable them at the property-application layer so
  // the rest of the page renders normally (background, glow,
  // widgets, tile chrome) without any user-visible difference at
  // preview size.
  if (IS_PREVIEW && (name === "ambientEffect" || name === "pixelfx"
                      || name === "audioGlow" || name === "audioGlowMode"
                      || name === "bgParallax")) {
    val = (name === "ambientEffect" || name === "pixelfx"
            || name === "audioGlowMode") ? "off" : false;
  }
  console.log("[wallpaper] property:", name, "=", JSON.stringify(val));
  // flashDebug is a no-op when showStatusEnabled is false.
  flashDebug("set " + name + " = " + JSON.stringify(val));
  switch (name) {
    case "bgImage":
      pickedImagePath = val || "";
      setBackground();
      break;
    case "bgImageUrl":
      urlOverride = val || "";
      setBackground();
      break;
    case "bgFit":
      applyBgFit(val || "cover");
      break;
    case "bgTileScale":
      applyBgTileScale(val);
      break;
    case "bgDim":
      dimEl.style.opacity = String((parseInt(val) || 0) / 100);
      break;
    case "barLayout": {
      const cls = LAYOUT_CLASSES.indexOf(val) >= 0 ? val : "lay-grid";
      LAYOUT_CLASSES.forEach((c) => barsEl.classList.remove(c));
      barsEl.classList.add(cls);
      currentLayout = cls;
      lastCols = 0; lastRows = 0;
      // v1.2.12: flip the canvas-vs-div renderer to match the new layout.
      _syncGridCanvasVisibility();
      break;
    }
    case "gridRenderer":
      // v1.2.12: per-screen renderer pick for the grid layout. Anything
      // other than the literal "canvas" stays on the DOM path so a
      // typo can't accidentally silently break the page.
      gridRenderer = val === "canvas" ? "canvas" : "dom";
      _syncGridCanvasVisibility();
      break;
    case "frameRate": {
      // v1.2.12: per-screen render-rate cap, paired with the bridge's
      // outgoing broadcast cap. 20 / 30 / 60 Hz are the offered buckets
      // (Performance / Balanced / Quality), but we coerce anything in
      // (0, 240] for safety.
      const rate = (typeof val === "number" && isFinite(val))
        ? val
        : parseInt(val, 10);
      const clamped = (rate > 0 && rate <= 240) ? rate : 30;
      // v1.6.3-beta hotfix1: stash the user-derived interval too so
      // the effectQuality bucket can restore it when leaving Quality.
      _userFrameInterval = Math.max(1, Math.round(1000 / clamped));
      RENDER_INTERVAL_MS = (_effectQuality === "quality")
        ? Math.max(1, Math.round(1000 / 60))
        : _userFrameInterval;
      break;
    }
    case "glassQuality": {
      // v1.2.12: low / medium (default) / high backdrop-filter buckets.
      // Implemented via body classes that the CSS at the top of <head>
      // hooks into; medium = no class so the default 6px rule wins.
      const cls = (val === "low" || val === "high") ? "glass-quality-" + val : null;
      document.body.classList.remove("glass-quality-low", "glass-quality-high");
      if (cls) document.body.classList.add(cls);
      break;
    }
    case "effectQuality": {
      // v1.6.3-beta: effect-canvas quality bucket. The v1.6.1-beta GPU
      // sweep dropped the ambient/pixelfx/audio-glow canvases to half
      // resolution + DPR 1 + 30 Hz cap to reach 0% idle on a 5120×1440
      // surface. That's the right floor when nothing's happening, but
      // users on heavier hardware want the option to crank quality
      // back up for active sessions. Three buckets:
      //   "performance" → 0.5× ambient, DPR 1, 30 Hz (sweep defaults)
      //   "balanced"    → 0.75× ambient, DPR 1, 30 Hz
      //   "quality"     → 1.0× ambient, DPR up to 2, 60 Hz
      // Each canvas's resize() pulls the active bucket via
      // `getEffectQuality()` so a config change triggers a re-size on
      // the next dispatchEvent("resize") call below. The frame-rate
      // override only kicks in when the user hasn't manually picked a
      // different frameRate — bucket implies a rate, but explicit
      // wins.
      const ALLOWED = ["performance", "balanced", "quality"];
      _effectQuality = ALLOWED.indexOf(val) >= 0 ? val : "performance";
      // v1.6.3-beta hotfix1: choose between the user-derived interval
      // and the Quality bucket's 60 Hz override. Without this branch,
      // leaving Quality left RENDER_INTERVAL_MS pinned at 16 ms and
      // the user's frameRate pick was forgotten until they touched
      // the frameRate dropdown again.
      RENDER_INTERVAL_MS = (_effectQuality === "quality")
        ? Math.max(1, Math.round(1000 / 60))
        : _userFrameInterval;
      // Kick a resize so every canvas with a ResizeObserver / window
      // resize listener (ambient / pixelfx / audio-glow) re-pulls
      // the new scale + DPR on the next tick.
      try { window.dispatchEvent(new Event("resize")); } catch (_) {}
      break;
    }
    case "showBars":
      barsEl.classList.toggle("disabled", !val);
      break;
    case "glowStrength":
      document.documentElement.style.setProperty("--glow", String((parseInt(val) || 100) / 100));
      break;
    case "barHeight":
      document.documentElement.style.setProperty("--bar-h", (parseInt(val) || 38) + "vh");
      break;
    case "barWidth":
      document.documentElement.style.setProperty("--bar-w", ((parseInt(val) || 14) / 10) + "vw");
      break;
    case "stripesBlur":
      document.documentElement.style.setProperty("--stripe-blur", (parseInt(val) || 60) + "px");
      break;
    case "gridBlur":
      document.documentElement.style.setProperty("--grid-blur", (parseInt(val) || 30) + "px");
      break;
    case "showStatus":
      showStatusEnabled = !!val;
      statusEl.classList.toggle("hidden", !val);
      // Clear any pending flash so the overlay doesn't stay visible after
      // the user just turned it off mid-flash.
      if (!val && _flashTimer) { clearTimeout(_flashTimer); _flashTimer = null; flashUntil = 0; }
      break;
    case "widgets":
      setWidgets(Array.isArray(val) ? val : []);
      break;
    case "widgetsLocked":
      setWidgetsLocked(!!val);
      break;
    case "widgetTileStyle":
      // Apply the opt-in tile shell. v1.0 baseline is "off" → no class,
      // widgets render as transparent overlays exactly like before.
      // glass / solid / clear add the matching body class so a single
      // CSS rule lights up every .widget at once.
      applyWidgetTileStyle(typeof val === "string" ? val : "off");
      break;
    case "widgetTheme":
      // v1.6.0-beta theme palette: applies the matching body.theme-<name>
      // class which sets every widget's --tile-bg / --tile-border /
      // --tile-fg / --tile-fg-muted / --tile-accent / --tile-font CSS
      // variable. Stacks with widgetTileStyle (shell variant vs colour
      // palette are orthogonal).
      applyWidgetTheme(typeof val === "string" ? val : "default");
      break;
    case "mouseEffects":
      // v1.6.0-beta stackable mouse-driven distortion effects.
      // Array of strings; each effect manages its own lifecycle via
      // mouseFx.setActive(name, on).
      applyMouseEffects(Array.isArray(val) ? val : []);
      break;
    case "ambientEffect":
      _userAmbient = typeof val === "string" ? val : "off";
      ambient.setPreset(_weatherAmbient || _userAmbient);
      break;
    case "weatherReactiveAmbient":
      _weatherReactive = !!val;
      // Re-evaluate: when turning OFF, drop any weather override
      // back to the user's stored preset; when turning ON, the next
      // weather widget update will set _weatherAmbient.
      if (!_weatherReactive) {
        _weatherAmbient = "";
        ambient.setPreset(_userAmbient);
      }
      break;
    case "ambientTint":
      ambient.setTinted(!!val);
      break;
    case "ambientDensity":
      ambient.setDensity(parseInt(val, 10));
      break;
    case "pixelfx":
      // Preview-mode iframe must not track cursor — would map the
      // configurator-area pointer instead of the real desktop one.
      pixelfx.setMode(PREVIEW_MODE ? "off"
                                   : (typeof val === "string" ? val : "off"));
      break;
    case "parallax3d":
      // Same reason: parallax binds to cursor position.
      parallax.setStrength(PREVIEW_MODE ? 0 : (parseInt(val, 10) | 0));
      break;
    case "audioGlow":
      // Lively / WE feed FFT bins into the on-desktop instance; the
      // iframe has no host providing those, and even if it did, two
      // simultaneous audio-driven layers would visibly desync.
      audioGlow.setMode(PREVIEW_MODE ? "off"
                                     : (typeof val === "string" ? val : "off"));
      break;
    case "audioGlowIntensity":
      audioGlow.setIntensity(parseInt(val, 10) | 0);
      break;
    case "audioGlowTint":
      audioGlow.setTinted(!!val);
      break;
    case "screenIndex":
      // Delivered by Wallpaper Engine when the user picks a different
      // screen on the per-assignment property panel. Switching here
      // reconnects the WS to the matching ?screen=N route. Lively
      // doesn't send this (it relies on the meta tag baked at build
      // time per Lively bundle).
      setScreenIndex(val);
      break;
  }
}

// Lively adapter: translate index/typed values to the unified format.
const LIVELY_BG_FIT  = ["cover", "contain", "fill", "tile", "tile-x", "tile-y"];
const LIVELY_LAYOUT  = LAYOUT_CLASSES; // same indices as the dropdown items

window.livelyPropertyListener = function (name, val) {
  if (name === "bgFit")     val = LIVELY_BG_FIT[val]  || "cover";
  if (name === "barLayout") val = LIVELY_LAYOUT[val]  || "lay-grid";
  applyProperty(name, val);
};

// Wallpaper Engine adapter: enumerate properties and forward already-correct
// values (the project.json combos use the same string keys, so no translation
// is needed here).
window.wallpaperPropertyListener = {
  applyUserProperties: function (properties) {
    console.log("[wallpaper] applyUserProperties:", JSON.stringify(properties));
    if (!properties) return;
    for (const name in properties) {
      const p = properties[name];
      // Wallpaper Engine usually wraps values in { value: ... } but some
      // builds / property types pass the raw value directly. Handle both.
      let val;
      if (p && typeof p === "object" && "value" in p) {
        val = p.value;
      } else if (p === null || ["string", "number", "boolean"].includes(typeof p)) {
        val = p;
      } else {
        continue;
      }
      applyProperty(name, val);
    }
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Pause/resume integration.
//
// When the user picks "Pause wallpapers" from Lively's tray, Lively *may* call
// livelyWallpaperPlaybackChanged(state) — but only if the host build delivers
// the IPC and the LivelyInfo opts into it. We don't pass "--pause-event true"
// in Arguments anymore (Lively rejects unknown options on import, and the
// event also fails to fire on many builds), so we rely on
// document.visibilitychange instead — fires reliably across CEF / WebView2 /
// browser tabs whenever the surface becomes hidden. The callback is still
// wired up below so newer Lively builds that push the event through get a
// proper hook.
// ─────────────────────────────────────────────────────────────────────────────
// v1.2.5: split pause into two flags. The pre-v1.2.5 setPaused was
// a single bool — the rAF probe below set it to "false" every 250 ms
// when rAF was ticking normally, which silently overrode any
// external pause (from the tray "Pause" toggle, the bridge's
// fullscreen-pause WS message, or document.visibilitychange) within
// a few hundred milliseconds. User report: "er zeigt kurz pause an
// und startet sich wieder".
//
// Now: _externalPaused is set by the bridge / Lively callback /
// visibility events (persistent). _renderingPaused is set by the
// rAF probe (auto-detected when the page is suspended). Effective
// pause is the OR of both — and the rAF probe never touches
// _externalPaused.
let _externalPaused = false;
let _renderingPaused = false;
let isPaused = false;
const pausedBadgeEl = document.getElementById("paused-badge");
function _recomputePaused() {
  const next = _externalPaused || _renderingPaused;
  if (next === isPaused) return;
  isPaused = next;
  console.log("[wallpaper] paused =", isPaused,
              "(external=" + _externalPaused + ", rendering=" + _renderingPaused + ")");
  if (pausedBadgeEl) pausedBadgeEl.classList.toggle("on", isPaused);
  // v1.2.12: drop all GPU-heavy filter layers out of the compositor
  // when paused. See the body.paused-glow CSS rule for the layer list
  // + rationale. This is what actually pulls the GPU back to ~0 %; the
  // rAF early-return alone leaves the compositor running at 60 Hz on
  // static-but-still-laid-out blur layers.
  document.body.classList.toggle("paused-glow", isPaused);
  // v1.2.12: the four ambient/audioglow/pixelfx/parallax rAF loops
  // now stop scheduling new frames while paused (was: kept scheduling
  // and early-returned, which still woke WebView2's compositor at
  // 60 Hz and forced re-composition of every CSS filter / backdrop-
  // filter layer). Each module listens for this event and re-arms
  // its own rAF chain when it goes back to running.
  if (!isPaused) {
    try { window.dispatchEvent(new Event("wallpaper-resume")); }
    catch (_) {}
  }
  if (showStatusEnabled) {
    flashDebug(isPaused ? "paused" : "resumed");
  }
  // Hard-pause the background video element so a moving MP4 doesn't
  // keep playing under a "paused" wallpaper. Resume on unpause.
  try {
    if (bgVideoEl && bgVideoEl.src) {
      if (isPaused) bgVideoEl.pause();
      else { const p = bgVideoEl.play(); if (p && p.catch) p.catch(() => {}); }
    }
  } catch (_) {}
}
function setPaused(p) {
  _externalPaused = !!p;
  _recomputePaused();
}
function _setRenderingPaused(p) {
  _renderingPaused = !!p;
  _recomputePaused();
}


// Lively's wiki documents the payload as a JSON-stringified object with
// an "IsPaused" boolean field. In practice different Lively builds pass
// different shapes — raw object, raw bool, JSON-string of an object,
// etc. Normalise everything to a single `paused` bool.
window.livelyWallpaperPlaybackChanged = function (state) {
  let parsed = state;
  if (typeof state === "string") {
    try { parsed = JSON.parse(state); }
    catch (_) { /* keep raw string for the heuristic below */ }
  }
  let paused;
  if (typeof parsed === "boolean") {
    // Ambiguous: some builds pass `isPlaying`-style bool, others `isPaused`-style.
    // No way to tell from a naked bool. We assume "true = playing" because
    // that's the more common convention; an `IsPaused` field would have been
    // wrapped in an object. Wrong-guess case fixable via the diagnostic
    // badge — file an issue with your Lively build version.
    paused = !parsed;
  } else if (parsed && typeof parsed === "object") {
    if      ("IsPaused"  in parsed) paused = !!parsed.IsPaused;
    else if ("isPaused"  in parsed) paused = !!parsed.isPaused;
    else if ("IsRunning" in parsed) paused = !parsed.IsRunning;
    else if ("isRunning" in parsed) paused = !parsed.isRunning;
    else if ("IsPlaying" in parsed) paused = !parsed.IsPlaying;
    else if ("isPlaying" in parsed) paused = !parsed.isPlaying;
    else if ("playing"   in parsed) paused = !parsed.playing;
    else paused = false;
  } else if (typeof parsed === "string") {
    // Last-resort: look for explicit "pause" words. Don't match generic
    // "true"/"1" — those are too ambiguous about which direction.
    paused = /pause/i.test(parsed);
  } else {
    paused = false;
  }
  console.log("[wallpaper] livelyWallpaperPlaybackChanged raw=", JSON.stringify(state), "→ paused=", paused);
  setPaused(paused);
};

document.addEventListener("visibilitychange", () => {
  // document.hidden=true → wallpaper switched away, RDP disconnect, lock
  // screen etc. Treat as a pause; resume on visible.
  setPaused(document.hidden);
});

// ─────────────────────────────────────────────────────────────────────────────
// rAF-tick-rate pause detection.
//
// Lively's "pause" works by suspending the WebView2 rendering process at the
// OS level. Pages that animate via requestAnimationFrame freeze automatically
// because rAF callbacks stop firing while rendering is suspended.
//
// We DON'T animate on rAF — we render reactively to incoming WebSocket
// frames. WS messages keep arriving and our handlers keep updating the DOM
// even while rendering is suspended; the user just sees a frozen image
// because no paint happens. But our internal `isPaused` state doesn't track
// the actual pause, and the PAUSED badge never appears.
//
// Fix: probe rAF tick rate. setInterval keeps running during render
// suspension; rAF callbacks don't. If rAF hasn't ticked in 500 ms, the page
// is in a paused / hidden state — flip setPaused(true). When ticks resume,
// flip back. Catches every flavour of pause Lively/the OS might apply, no
// reliance on Lively-specific hooks firing.
// v1.2.12: throttle the rAF probe cascade so we don't wake WebView2's
// compositor 60×/s just to take a timestamp. setTimeout schedules the
// NEXT rAF 200 ms later — net effect is ~5 Hz rAF instead of 60 Hz.
// The 250 ms setInterval below still detects pause via the 500 ms
// staleness threshold (a paused page never fires the rAF, so the
// timestamp doesn't advance regardless of how often we'd otherwise
// schedule one). Saves ~1-2% baseline CPU on Lively / WE pages where
// the only thing keeping the compositor warm is this probe.
let _lastRafTickMs = performance.now();
function probeRafLoop() {
  _lastRafTickMs = performance.now();
  setTimeout(() => requestAnimationFrame(probeRafLoop), 200);
}
requestAnimationFrame(probeRafLoop);
setInterval(() => {
  const stale = performance.now() - _lastRafTickMs;
  // v1.2.5: only flips the rendering-suspension flag. The external
  // pause (bridge tray toggle, Lively callback, visibilitychange)
  // sits in its own slot so this probe can't clobber it.
  // v1.2.12: with the 200 ms self-throttle above, a non-paused page
  // updates _lastRafTickMs every ~216 ms (200 ms setTimeout + ~16 ms
  // rAF latency). 500 ms staleness still cleanly distinguishes that
  // from a truly paused page (where rAF doesn't fire at all).
  _setRenderingPaused(stale > 500);
}, 250);

// ─────────────────────────────────────────────────────────────────────────────
// Widget edit-options live in the Configurator, not in-page.
// Lively / WE's CEF doesn't forward keyboard events to wallpaper pages
// reliably (mouse goes through but keystrokes land on whatever has
// real OS focus), so the in-page prompt that worked for clicking
// silently dropped typed characters. The gear icon now just opens the
// Configurator with a deep-link to the matching widget — the
// Configurator is a normal browser tab and types fine.
//
// wpPrompt / wpAlert are kept around for the rare case a widget DOES
// want a synchronous yes/no with no keyboard typing.
// ─────────────────────────────────────────────────────────────────────────────

function openWidgetInConfigurator(rec) {
  const id = rec.el && rec.el.dataset && rec.el.dataset.id;
  if (!id) return;
  const url = "http://127.0.0.1:17320/configurator"
            + "?editWidget=" + encodeURIComponent(id)
            + "&editScreen=" + encodeURIComponent(SCREEN_INDEX);
  try {
    window.open(url, "_blank");
  } catch (e) {
    console.warn("[widget] open configurator failed:", e);
  }
}

function _ensureWpPrompt() {
  let overlay = document.getElementById("wp-prompt-overlay");
  if (overlay) return overlay;
  overlay = document.createElement("div");
  overlay.id = "wp-prompt-overlay";
  overlay.className = "wp-prompt-overlay";
  overlay.innerHTML =
    '<div class="wp-prompt">' +
    '<label class="wp-prompt-label"></label>' +
    '<input type="text" class="wp-prompt-input">' +
    '<div class="btn-row">' +
    '<button type="button" class="wp-prompt-cancel">Cancel</button>' +
    '<button type="button" class="wp-prompt-ok primary">OK</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  return overlay;
}

function wpPrompt(label, defaultValue) {
  return new Promise((resolve) => {
    const overlay = _ensureWpPrompt();
    const card    = overlay.querySelector(".wp-prompt");
    const labelEl = overlay.querySelector(".wp-prompt-label");
    const input   = overlay.querySelector(".wp-prompt-input");
    const okBtn   = overlay.querySelector(".wp-prompt-ok");
    const cancel  = overlay.querySelector(".wp-prompt-cancel");
    card.classList.remove("no-input");
    labelEl.textContent = label;
    input.value = defaultValue == null ? "" : String(defaultValue);
    const finish = (value) => {
      overlay.classList.remove("show");
      okBtn.onclick = cancel.onclick = null;
      input.onkeydown = null;
      overlay.onclick = null;
      resolve(value);
    };
    okBtn.onclick   = () => finish(input.value);
    cancel.onclick  = () => finish(null);
    input.onkeydown = (e) => {
      if (e.key === "Enter")  { e.preventDefault(); finish(input.value); }
      if (e.key === "Escape") { e.preventDefault(); finish(null); }
    };
    overlay.onclick = (e) => { if (e.target === overlay) finish(null); };
    overlay.classList.add("show");
    requestAnimationFrame(() => { try { input.focus(); input.select(); } catch (_) {} });
  });
}

function wpAlert(message) {
  return new Promise((resolve) => {
    const overlay = _ensureWpPrompt();
    const card    = overlay.querySelector(".wp-prompt");
    const labelEl = overlay.querySelector(".wp-prompt-label");
    const okBtn   = overlay.querySelector(".wp-prompt-ok");
    const cancel  = overlay.querySelector(".wp-prompt-cancel");
    // no-input mode hides the input + cancel button so the user only
    // sees "OK". Otherwise alerts look like prompts with empty fields.
    card.classList.add("no-input");
    labelEl.textContent = message;
    const finish = () => {
      overlay.classList.remove("show");
      okBtn.onclick = cancel.onclick = null;
      overlay.onclick = null;
      document.removeEventListener("keydown", onKey);
      resolve();
    };
    const onKey = (e) => {
      if (e.key === "Enter" || e.key === "Escape") {
        e.preventDefault(); finish();
      }
    };
    okBtn.onclick   = finish;
    overlay.onclick = (e) => { if (e.target === overlay) finish(); };
    document.addEventListener("keydown", onKey);
    overlay.classList.add("show");
    requestAnimationFrame(() => { try { okBtn.focus(); } catch (_) {} });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Widgets — placeable HTML modules. The WIDGET_REGISTRY below is the single
// source of truth: adding a new widget type = one entry here + a matching
// entry in bridge.py's WIDGET_DEFAULTS, and the in-page picker + tray "Add…"
// submenu both pick it up automatically.
//
// Each registry entry declares:
//   label        Human-readable name shown in the picker
//   icon         Inline SVG string for the picker button
//   markup       () -> initial inner HTML for the widget body

//                appended (used for things like sticky-note double-click
//                inline editing — handlers that need to be attached once)
//   tick         (rec) -> called every second and whenever options change.
//                rec.opts is the live options blob from the server.
//   editOptions  (rec) -> optional UX for tweaking options. Today: prompt-
//                driven (browser native). A nicer floating editor can drop
//                in later without changing the contract.
//   skins        (v2.3.4-beta) optional { id: { markup, render? } } object.
//                When present and rec.opts.skin matches an id, the skin's
//                markup() replaces the top-level markup() and its render
//                (if supplied) replaces the top-level tick render path.
//                The "default" skin id is implicit — leaving rec.opts.skin
//                unset (or set to "default") uses the top-level markup +
//                tick. SKIN_CATALOG_MIRROR below + the same constant in
//                configurator.html keep the IDs / labels in sync so the
//                widget config modal can offer a skin picker without

// ─────────────────────────────────────────────────────────────────────────────

    markup: () => '<div class="cal-head"></div><table><thead><tr></tr></thead><tbody></tbody></table>',
    tick: (rec) => {
      const weekStart = (rec.opts && rec.opts.weekStart === 0) ? 0 : 1;
      const now    = new Date();
      const year   = now.getFullYear();
      const month  = now.getMonth();
      const today  = now.getDate();
      rec.el.querySelector(".cal-head").textContent =
        now.toLocaleDateString(undefined, { month: "long", year: "numeric" });
      const baseSun = new Date(2024, 5, 2);
      const dayNames = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(baseSun);
        d.setDate(baseSun.getDate() + i + weekStart);
        dayNames.push(d.toLocaleDateString(undefined, { weekday: "short" }).slice(0, 2));
      }
      rec.el.querySelector("thead tr").innerHTML =
        dayNames.map((n) => "<th>" + n + "</th>").join("");
      const startOffset  = (new Date(year, month, 1).getDay() - weekStart + 7) % 7;
      const daysInMonth  = new Date(year, month + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startOffset; i++) {
        const d = new Date(year, month, 1 - (startOffset - i));
        cells.push({ day: d.getDate(), dim: true });
      }
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, dim: false, today: d === today });
      }
      while (cells.length % 7 !== 0) {
        const d = new Date(year, month + 1, cells.length - startOffset - daysInMonth + 1);
        cells.push({ day: d.getDate(), dim: true });
      }
      const rows = [];
      for (let i = 0; i < cells.length; i += 7) {
        rows.push("<tr>" + cells.slice(i, i + 7).map((c) =>
          "<td" + (c.today ? ' class="today"' : c.dim ? ' class="dim"' : "") + ">" + c.day + "</td>"
        ).join("") + "</tr>");
      }
      rec.el.querySelector("tbody").innerHTML = rows.join("");
    },
    editOptions: openWidgetInConfigurator,
  },

//   { type: "log",   message }                  forwarded to console

// SyntaxError — `function name() {}` isn't valid as an object-literal

    WIDGET_REGISTRY[type]._pluginMeta = plug;

        '<path d="M8 12h8 M12 8v8"/></svg>',

// ── Generic HTTP widget runtime ────────────────────────────────────────────
//
// Tiny mustache: `{{foo.bar[0].baz}}` walks the parsed JSON, returns the
// string at the path, or "" on miss. `{{.}}` returns the whole value
// JSON-stringified — useful as a default template for "just dump what
// you got". Bracketed array indices supported, no helpers, no escaping.
// 50 LOC vs pulling mustache.js (33 KB).

function _getByPath(obj, path) {
  if (path === "." || path === "") return obj;
  const parts = path.split(/\.|\[(\d+)\]/).filter(Boolean);
  let cur = obj;
  for (const p of parts) {
    if (cur == null) return undefined;
    cur = cur[p] !== undefined ? cur[p] : cur[Number(p)];
  }
  return cur;
}

function _renderHttpTemplate(template, data) {
  if (!template) template = "{{.}}";
  return template.replace(/\{\{\s*([^{}]+?)\s*\}\}/g, (_, path) => {
    let v = _getByPath(data, path.trim());
    if (v == null) return "";
    if (typeof v === "object") {
      try { return JSON.stringify(v); }
      catch (_) { return String(v); }
    }
    return String(v);
  });
}

function _parseHttpHeaders(raw) {
  // Lines of "Key: value", blanks + #-comments tolerated.
  const out = {};
  if (!raw) return out;
  for (const line of String(raw).split(/\r?\n/)) {
    const t = line.trim();
    if (!t || t.startsWith("#")) continue;
    const i = t.indexOf(":");
    if (i <= 0) continue;
    out[t.slice(0, i).trim()] = t.slice(i + 1).trim();
  }
  return out;
}

async function fetchHttpWidget(rec) {
  const body = rec.el.querySelector(".http-body");
  const foot = rec.el.querySelector(".http-foot");
  const opts = rec.opts || {};
  const url = String(opts.url || "").trim();
  if (!url) {
    if (body) body.textContent = "Click ⚙ to set a URL";
    if (foot) foot.textContent = "";
    return;
  }
  try {
    const r = await fetch(url, {
      method: String(opts.method || "GET").toUpperCase(),
      headers: _parseHttpHeaders(opts.headers),
      mode: "cors",
      cache: "no-store",
    });
    const ct = r.headers.get("content-type") || "";
    let data;
    if (ct.toLowerCase().includes("application/json")) {
      data = await r.json();
    } else {
      data = await r.text();
    }
    const text = _renderHttpTemplate(opts.template, data);
    if (body) body.textContent = text || "(empty)";
    if (foot) foot.textContent = "updated " + new Date().toLocaleTimeString();
    if (opts.tintFromGlow && currentTintCss && body) {
      body.style.color = currentTintCss;
    } else if (body) {
      body.style.color = "";
    }
  } catch (e) {
    if (body) body.textContent = "fetch failed";
    if (foot) foot.textContent = String(e.message || e).slice(0, 80);
  }
}

        '<defs><filter id="fx-ripple-filter" x="0" y="0" width="100%" height="100%">' +
        '<feImage id="fx-ripple-img" preserveAspectRatio="none" result="map" x="0" y="0" width="100%" height="100%"/>' +
        '<feDisplacementMap in="SourceGraphic" in2="map" scale="50"' +
        ' xChannelSelector="R" yChannelSelector="G"/>' +
        '</filter></defs>';
      document.body.appendChild(svg);
      svgFilter = svg;
      feImg = svg.querySelector("#fx-ripple-img");
      mapCanvas = document.createElement("canvas");
      mapCanvas.width = MAP_SIZE; mapCanvas.height = MAP_SIZE;
      mapCtx = mapCanvas.getContext("2d");
      // Neutral grey = no displacement (128, 128, 0). Initialize.
      mapCtx.fillStyle = "rgb(128,128,0)";
      mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
    }
    function tick(now) {
      // v2.3.5-beta: pause guard — see Repulsion's tick comment.
      if (isPaused) { raf = null; return; }
      raf = requestAnimationFrame(tick);
      if (now - _lastTick < RENDER_INTERVAL_MS) return;
      _lastTick = now;
      // Decay existing ripple — blend toward neutral grey at 6 %/frame.
      mapCtx.fillStyle = "rgba(128, 128, 0, 0.06)";
      mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
      // Draw a fresh ripple at cursor (scaled into MAP_SIZE coords).
      const dx = _cursorX - lastMouseX;
      const dy = _cursorY - lastMouseY;
      const moved = Math.hypot(dx, dy) > 2;
      if (moved) {
        const mx = (_cursorX / window.innerWidth)  * MAP_SIZE;
        const my = (_cursorY / window.innerHeight) * MAP_SIZE;
        // Encode movement direction into R+G channels so the
        // displacement map drags pixels with the cursor.
        const r = Math.max(0, Math.min(255, 128 + dx * 4));
        const g = Math.max(0, Math.min(255, 128 + dy * 4));
        const grad = mapCtx.createRadialGradient(mx, my, 0, mx, my, 18);
        grad.addColorStop(0, "rgba(" + r + "," + g + ",0,0.85)");
        grad.addColorStop(1, "rgba(128,128,0,0)");
        mapCtx.fillStyle = grad;
        mapCtx.fillRect(mx - 20, my - 20, 40, 40);
      }
      lastMouseX = _cursorX; lastMouseY = _cursorY;
      // v2.3.4-beta activity-gated update. Movement OR active fade
      // resets the idle counter; once we've been idle for the
      // threshold we stop calling toDataURL+setAttribute, which is
      // where the per-frame data: URL accumulation was burning RAM
      // before. The decay loop above keeps running so the canvas
      // converges to neutral grey on its own; we just stop poking
      // feImage about it once the visible map matches the cached
      // SVG paint anyway.
      if (moved) _idleFrames = 0;
      else       _idleFrames++;
      if (_idleFrames < IDLE_FRAMES_BEFORE_SKIP) {
        feImg.setAttribute("href", mapCanvas.toDataURL());
      }
    }
    return {
      enable() {
        ensureFilter();
        document.body.classList.add("fx-ripple");
        if (!raf) raf = requestAnimationFrame(tick);
      },
      disable() {
        document.body.classList.remove("fx-ripple");
        if (raf) { cancelAnimationFrame(raf); raf = null; }
        _idleFrames = IDLE_FRAMES_BEFORE_SKIP;
      },
    };
  })();

  const _EFFECTS = { repulsion, chromatic, spotlight, ripple };

  return {
    setActive(names) {
      // No-op in IS_PREVIEW — the preview iframe doesn't need or
      // benefit from these effects.
      if (typeof IS_PREVIEW !== "undefined" && IS_PREVIEW) {
        for (const fx of Object.values(_EFFECTS)) fx.disable();
        active.clear();
        return;
      }
      _attachListeners();
      const want = new Set((names || []).filter(n => _EFFECTS[n]));
      console.log("[wallpaper] mouse-fx: setActive(" + Array.from(want).join(",") + ")");
      for (const n of active) {
        if (!want.has(n) && _EFFECTS[n]) {
          console.log("[wallpaper] mouse-fx: disabling", n);
          _EFFECTS[n].disable();
        }
      }
      for (const n of want) {
        if (!active.has(n)) {
          console.log("[wallpaper] mouse-fx: enabling", n);
          _EFFECTS[n].enable();
        }
      }
      active = want;
    },
    // v2.3.5-beta: expose the active set + the per-effect handles so
    // the wallpaper-resume listener can re-arm the rAF chain for
    // every currently-enabled effect after fullscreen pause ends.
    _activeNames: () => active,
    _enable: (name) => { if (_EFFECTS[name]) _EFFECTS[name].enable(); },
  };
})();

// v2.3.5-beta: re-arm the four mouse-effect rAF loops when the
// page comes off pause. Each effect's tick now bails on isPaused
// (so no CPU during fullscreen pause), but that means the rAF
// chain stays dead afterward — calling enable() per active name
// kicks them back to life. The other rAF loops (ambient, audio-
// glow, pixelfx, parallax) already had this listener pattern.
window.addEventListener("wallpaper-resume", () => {
  for (const name of MouseFx._activeNames()) MouseFx._enable(name);
});

function applyMouseEffects(arr) {
  MouseFx.setActive(arr);
}

function setWidgetsLocked(locked) {
  widgetsLocked = !!locked;
  widgetsContainer.classList.toggle("edit-mode", !locked);
  // v2.2.0-beta wave 2: in-wallpaper Add-Widget picker removed. It
  // could add a widget but not configure it — net negative UX.
  // Widgets are added + configured via the Configurator instead.
  if (widgetPicker) widgetPicker.classList.remove("on");
  // v2.3.11-beta: floating edit-mode pill follows the lock state.
  // Visible only while unlocked so the user can re-lock from the
  // wallpaper itself instead of opening the Configurator again.
  if (widgetsBanner) widgetsBanner.classList.toggle("on", !locked);
}

function setWidgets(list) {
  const wantIds = new Set(list.map((w) => w.id));
  for (const [id, rec] of [...widgetNodes.entries()]) {
    if (!wantIds.has(id)) {
      // v2.3.8-beta: balance the fast-tick rAF counter when a
      // fast-tick widget is removed so the rAF self-stops at 0.
      if (rec.reg && rec.reg.fastTick) _bumpFastTick(-1);
      rec.el.remove();
      widgetNodes.delete(id);
    }
  }
  for (const w of list) {
    let rec = widgetNodes.get(w.id);
    if (!rec) {
      rec = createWidget(w);
      if (!rec) continue;
      widgetNodes.set(w.id, rec);
      widgetsContainer.appendChild(rec.el);
      bindInteract(rec);
      if (rec.reg.mount) {
        try { rec.reg.mount(rec); } catch (e) { console.warn("[widget mount]", e); }
      }
      // v2.3.8-beta: bump the fast-tick counter when a new fast-tick
      // widget is created. Starts the rAF loop on 0 → 1.
      if (rec.reg && rec.reg.fastTick) _bumpFastTick(+1);
    }
    applyWidgetPosition(rec, w);
    applyWidgetOptions(rec, w);
  }
  // v1.2.12: any widget mutation (add / remove / opts change) can flip
  // _anyTintedWidget()'s answer, so drop the cache and let the next
  // renderFrame re-compute it once.
  _invalidateTintedCache();
}

// v2.3.4-beta: skin lookup. Returns the active skin object (or null
// for "default" / no skins). `_widgetActiveSkin` operates on a live
// widget rec; `_widgetSkinForOpts` works from raw opts during create.
function _widgetSkinForOpts(type, opts) {
  const reg = WIDGET_REGISTRY[type];
  if (!reg || !reg.skins) return null;
  const id = (opts && opts.skin) ? String(opts.skin) : "default";
  if (id === "default") return null;
  return reg.skins[id] || null;
}
function _widgetActiveSkin(rec) {
  return _widgetSkinForOpts(rec.type, rec.opts);
}

function createWidget(w) {
  const reg = WIDGET_REGISTRY[w.type];
  if (!reg) { console.warn("[widget] unknown type:", w.type); return null; }
  const el = document.createElement("div");
  // v2.3.4-beta: skin class on the widget element so per-skin CSS
  // can target without hitting widget-type defaults.
  const skinId = (w.opts && w.opts.skin) ? String(w.opts.skin) : "default";
  el.className = "widget widget-" + w.type + " widget-skin-" + skinId;
  el.dataset.id = w.id;
  // ── v1.1.5+ widget shell ──
  // Optional header bar wraps every widget when the user opts into
  // a tile style. Holds the widget's icon + display label, plus the
  // settings/remove action buttons that used to live as floating
  // overlays on the widget body. Header is visible in non-edit mode
  // too (was edit-mode-only); actions only fade in on hover so the
  // read-state stays uncluttered.
  const widgetTitle = reg.label || w.type;
  const headerActions =
    (reg.editOptions ? '<button type="button" class="widget-act widget-settings" title="Configure" tabindex="-1">⚙</button>' : '') +
    '<button type="button" class="widget-act widget-remove" title="Remove widget" tabindex="-1">×</button>';
  // v2.3.4-beta: if a non-default skin is active, prefer its markup.
  const _skin = _widgetSkinForOpts(w.type, w.opts);
  const _body = (_skin && typeof _skin.markup === "function")
    ? _skin.markup() : reg.markup();
  el.innerHTML =
    '<div class="widget-header">' +
      '<span class="widget-header-icon">' + (reg.icon || '') + '</span>' +
      '<span class="widget-header-title">' + escapeHtml(widgetTitle) + '</span>' +
      '<span class="widget-header-actions">' + headerActions + '</span>' +
    '</div>' +
    '<div class="widget-body">' + _body + '</div>' +
    '<div class="widget-handle"></div>';
  el.querySelector(".widget-remove").addEventListener("click", (e) => {
    e.stopPropagation();
    sendWidgetCmd({ type: "widget-remove", id: w.id });
  });
  const rec = { el, type: w.type, reg, opts: {}, last: { x: 0, y: 0, w: 0, h: 0 } };
  if (reg.editOptions) {
    el.querySelector(".widget-settings").addEventListener("click", (e) => {
      e.stopPropagation();
      try {
        const r = reg.editOptions(rec);
        // editOptions is now async on every built-in widget so it
        // returns a Promise; surface rejections to the console
        // instead of dropping silently.
        if (r && typeof r.then === "function") {
          r.catch((err) => console.warn("[widget editOptions]", err));
        }
      } catch (err) { console.warn("[widget editOptions]", err); }
    });
  }
  rec.tick = () => reg.tick(rec);
  return rec;
}

function applyWidgetPosition(rec, w) {
  const next = { x: w.x | 0, y: w.y | 0, w: w.w | 0, h: w.h | 0 };
  if (next.x === rec.last.x && next.y === rec.last.y &&
      next.w === rec.last.w && next.h === rec.last.h) return;
  // v1.6.1-beta hotfix: widget position now lives in CSS custom
  // properties (--widget-x / --widget-y) instead of inline
  // `transform: translate()`. The CSS rule on `.widget` composes
  // the position WITH any active effect transform (theme-pulse
  // scale, repulsion offset) so neither one clobbers the other —
  // previously a theme change or mouse-fx pulse rewrote
  // style.transform = "scale(1)" and every widget snapped to
  // (0, 0) for the duration of the animation.
  rec.el.style.setProperty("--widget-x", next.x + "px");
  rec.el.style.setProperty("--widget-y", next.y + "px");
  rec.el.style.width  = next.w + "px";
  rec.el.style.height = next.h + "px";
  // interact.js convention — keep the x/y on the dataset so its move handler
  // can resume from current state instead of starting at 0,0.
  rec.el.dataset.x = String(next.x);
  rec.el.dataset.y = String(next.y);
  rec.last = next;
}

function applyWidgetOptions(rec, w) {
  const nextOpts = w.options || {};
  // When the user edits a widget's options (location for weather, label
  // for countdown, etc.) we want the visible state to reflect them
  // immediately — not 30 minutes later when the next REFRESH window opens.
  // So whenever the options payload has actually changed, drop any cached
  // fetch result and force the next tick() to re-fetch.
  const prevSig = rec._optsSig;
  const nextSig = JSON.stringify(nextOpts);
  const changed = prevSig !== undefined && prevSig !== nextSig;
  rec._optsSig = nextSig;
  const prevSkin = (rec.opts && rec.opts.skin) ? String(rec.opts.skin) : "default";
  const nextSkin = nextOpts.skin ? String(nextOpts.skin) : "default";
  rec.opts = nextOpts;
  // v2.3.4-beta: a skin change requires regenerating the widget body
  // markup, because skins own their own DOM structure (not just CSS).
  // Swap body content + the widget-skin-<id> class, then drop cache
  // so the next tick repaints freshly.
  if (changed && prevSkin !== nextSkin) {
    const reg = WIDGET_REGISTRY[rec.type];
    if (reg) {
      const _skin = _widgetSkinForOpts(rec.type, nextOpts);
      const _body = (_skin && typeof _skin.markup === "function")
        ? _skin.markup() : (typeof reg.markup === "function" ? reg.markup() : "");
      const bodyEl = rec.el.querySelector(".widget-body");
      if (bodyEl) bodyEl.innerHTML = _body;
      rec.el.classList.remove("widget-skin-" + prevSkin);
      rec.el.classList.add("widget-skin-" + nextSkin);
    }
  }
  if (changed) {
    rec.cache = null;
    rec.lastFetch = 0;
    // v1.5.0-beta plugin API: push new options into the sandboxed
    // iframe so a plugin can react without a full reload.
    if (rec.type && rec.type.startsWith("plugin/")) {
      _sendPluginMessage(rec, { type: "opts", options: nextOpts });
    }
  }
  rec.el.classList.toggle("tinted", !!rec.opts.tintFromGlow);
  if (rec.opts.tintFromGlow) {
    rec.el.style.setProperty("--w-tint", currentTintCss);
  } else {
    rec.el.style.removeProperty("--w-tint");
  }
  // ── Universal widget options (v1.1+) ──
  // Three knobs every widget honours via CSS custom properties + a
  // few opt-in class names so individual widget renderers don't
  // each need to re-implement them.
  //   textAlign  — "left" | "center" | "right" (default "left")
  //   textScale  — 0.5 - 2.0, multiplier on widget font-size
  //                 (default 1.0 = no scaling)
  //   tileStyle  — "inherit" | "off" | "glass" | "solid" | "clear"
  //                 (default "inherit" → use the global widgetTileStyle
  //                  set on <body>)
  //
  // text-align only works on non-flex content. Meter widgets
  // (cpu / ram / hwmon) use flex-row layouts for the stat-value
  // and stat-head so we ALSO emit --w-justify mapped to a
  // justify-content value — CSS rules below `read` whichever
  // suits the container.
  const textAlign = (rec.opts.textAlign === "center" || rec.opts.textAlign === "right")
                  ? rec.opts.textAlign : "left";
  const justify = textAlign === "center" ? "center"
                : textAlign === "right"  ? "flex-end"
                : "flex-start";
  rec.el.style.setProperty("--w-align",   textAlign);
  rec.el.style.setProperty("--w-justify", justify);
  const scale = parseFloat(rec.opts.textScale);
  const scaleClamped = (scale > 0 && scale <= 4) ? scale : 1;
  rec.el.style.setProperty("--w-scale", String(scaleClamped));
  // Per-widget tile-style override. Strip any prior override class,
  // then apply the new one. "inherit" leaves the body-level class
  // doing its thing.
  for (const s of WIDGET_TILE_STYLES) {
    if (s === "off") continue;
    rec.el.classList.remove("tile-" + s);
  }
  rec.el.classList.remove("tile-off");   // explicit off-override
  const tileOverride = rec.opts.tileStyle;
  if (tileOverride && tileOverride !== "inherit"
      && WIDGET_TILE_STYLES.indexOf(tileOverride) >= 0) {
    rec.el.classList.add("tile-" + tileOverride);
  }
  // Header toggle — universal showHeader option (default false so the
  // pre-v1.1.5 look is preserved). True → reveal the header strip
  // baked into every widget at create-time.
  rec.el.classList.toggle("with-header", !!rec.opts.showHeader);
  if (rec.tick) rec.tick();
}

function bindInteract(rec) {
  if (typeof interact === "undefined") return;
  const send = () => sendWidgetCmd({
    type: "widget-update", id: rec.el.dataset.id,
    x: parseInt(rec.el.dataset.x, 10) | 0,
    y: parseInt(rec.el.dataset.y, 10) | 0,
    w: rec.el.offsetWidth | 0,
    h: rec.el.offsetHeight | 0,
  });
  interact(rec.el)
    .draggable({
      inertia: false,
      modifiers: [
        interact.modifiers.restrictRect({ restriction: "parent", endOnly: false }),
      ],
      // Don't start a drag when the user clicks the widget's own buttons or
      // is mid-edit on a sticky note — otherwise typing inside the note
      // would also drag the whole widget around.
      ignoreFrom: '.widget-settings, .widget-remove, [contenteditable="true"]',
      listeners: {
        move(event) {
          const x = (parseFloat(event.target.dataset.x) || 0) + event.dx;
          const y = (parseFloat(event.target.dataset.y) || 0) + event.dy;
          // v1.6.1-beta hotfix: drive position through the same
          // --widget-x / --widget-y custom properties applyWidgetPosition
          // uses, so the composed CSS transform on .widget keeps
          // the position even while a theme-pulse / repulsion /
          // resize is active mid-drag.
          event.target.style.setProperty("--widget-x", x + "px");
          event.target.style.setProperty("--widget-y", y + "px");
          event.target.dataset.x = x;
          event.target.dataset.y = y;
        },
        end: send,
      },
    })
    .resizable({
      edges: { left: false, right: true, bottom: true, top: false },
      modifiers: [
        interact.modifiers.restrictSize({ min: { width: 80, height: 80 } }),
      ],
      listeners: {
        move(event) {
          event.target.style.width  = event.rect.width  + "px";
          event.target.style.height = event.rect.height + "px";
        },
        end: send,
      },
    });
}

function sendWidgetCmd(msg) {
  if (!ws || ws.readyState !== 1) return;
  try { ws.send(JSON.stringify(msg)); } catch (e) { console.warn("[widget] send failed:", e); }
}

// ── In-page picker — generated once from WIDGET_REGISTRY ────────────────────
function buildWidgetPicker() {
  const grid = widgetPicker.querySelector(".picker-grid");
  grid.innerHTML = "";
  for (const [type, reg] of Object.entries(WIDGET_REGISTRY)) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "picker-btn";
    btn.title = "Add " + reg.label;
    btn.innerHTML = reg.icon +
                    '<div class="picker-btn-label">' + escapeHtml(reg.label) + '</div>';
    btn.addEventListener("click", () => {
      sendWidgetCmd({ type: "widget-add", widgetType: type });
    });
    grid.appendChild(btn);
  }
}
buildWidgetPicker();

// ── Shared helpers used by registry entries ─────────────────────────────────

function formatCountdown(ms, units) {
  if (ms <= 0) return "now";
  const s    = Math.floor(ms / 1000);
  const days = Math.floor(s / 86400);
  const hrs  = Math.floor((s % 86400) / 3600);
  const min  = Math.floor((s % 3600) / 60);
  const sec  = s % 60;
  const pad2 = (n) => String(n).padStart(2, "0");
  if (units === "days") return days + "d";
  if (units === "hms")  return pad2(hrs) + ":" + pad2(min) + ":" + pad2(sec);
  // smart: scale to the most-meaningful unit
  if (days >= 2) return days + "d " + hrs + "h";
  if (days >= 1) return days + "d " + hrs + "h " + min + "m";
  return pad2(hrs) + ":" + pad2(min) + ":" + pad2(sec);
}

const WMO_CODES = {
  0:"Clear", 1:"Mainly clear", 2:"Partly cloudy", 3:"Overcast",
  45:"Fog", 48:"Rime fog",
  51:"Light drizzle", 53:"Drizzle", 55:"Heavy drizzle",
  61:"Light rain", 63:"Rain", 65:"Heavy rain",
  71:"Light snow", 73:"Snow", 75:"Heavy snow", 77:"Snow grains",
  80:"Rain showers", 81:"Heavy showers", 82:"Violent showers",
  85:"Snow showers", 86:"Heavy snow showers",
  95:"Thunderstorm", 96:"Storm w/ hail", 99:"Storm w/ heavy hail",
};

function fetchWeather(rec) {
  const lat   = parseFloat(rec.opts.lat);
  const lon   = parseFloat(rec.opts.lon);
  const label = rec.opts.label || "";
  const units = rec.opts.units === "imperial" ? "fahrenheit" : "celsius";
  const windUnits = rec.opts.units === "imperial" ? "mph" : "kmh";
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
    rec.el.querySelector(".wx-foot").textContent = "no location set";
    return;
  }
  // v2.3.3-beta: enriched data — apparent temperature, humidity,
  // daily high/low, precipitation probability — to back the new
  // widget layout. Open-Meteo is happy to bundle them in one call.
  const url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat +
              "&longitude=" + lon +
              "&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m" +
              "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max" +
              "&temperature_unit=" + units +
              "&wind_speed_unit=" + windUnits +
              "&forecast_days=1&timezone=auto";
  fetch(url).then((r) => r.json()).then((j) => {
    const cur = (j && j.current) || {};
    const dly = (j && j.daily) || {};
    rec.cache = {
      label,
      temp:   cur.temperature_2m,
      feel:   cur.apparent_temperature,
      humid:  cur.relative_humidity_2m,
      code:   cur.weather_code,
      wind:   cur.wind_speed_10m,
      hi:     Array.isArray(dly.temperature_2m_max) ? dly.temperature_2m_max[0] : null,
      lo:     Array.isArray(dly.temperature_2m_min) ? dly.temperature_2m_min[0] : null,
      precip: Array.isArray(dly.precipitation_probability_max) ? dly.precipitation_probability_max[0] : null,
      units, windUnits, ts: Date.now(),
    };
    renderWeatherCache(rec);
  }).catch((e) => {
    rec.el.querySelector(".wx-foot").textContent = "fetch failed";
    console.warn("[widget weather]", e);
  });
}

// v2.3.3-beta: map WMO weather code → inline SVG icon. Single-stroke
// minimal shapes that read at widget scale; condition-appropriate
// (sun / partly cloudy / cloud / rain / snow / storm / fog).
function _weatherIconSvg(code) {
  const sun  = '<circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/>';
  const moon = '<path d="M21 13a8 8 0 1 1-9-9 6 6 0 0 0 9 9z"/>';
  const cloud = '<path d="M7 17h10a4 4 0 0 0 0-8 6 6 0 0 0-11-1 4 4 0 0 0 1 9z"/>';
  const cloudSun = '<circle cx="7" cy="9" r="2.5"/><path d="M11 17h7a4 4 0 0 0 0-8 6 6 0 0 0-11-1"/>';
  const rain  = cloud + '<path d="M9 19l-1 3M13 19l-1 3M17 19l-1 3"/>';
  const snow  = cloud + '<path d="M9 20l1 1M9 21l1-1M13 20l1 1M13 21l1-1M17 20l1 1M17 21l1-1"/>';
  const storm = cloud + '<path d="M11 17l-2 4h3l-2 4"/>';
  const fog   = '<path d="M4 10h16M4 14h16M4 18h16"/>';
  let path;
  if (code === 0)                            path = sun;
  else if (code === 1 || code === 2)         path = cloudSun;
  else if (code === 3)                       path = cloud;
  else if (code === 45 || code === 48)       path = fog;
  else if ((code >= 51 && code <= 65)
        || (code >= 80 && code <= 82))       path = rain;
  else if ((code >= 71 && code <= 77)
        || code === 85 || code === 86)       path = snow;
  else if (code >= 95 && code <= 99)         path = storm;
  else                                       path = cloud;
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
}

function renderWeatherCache(rec) {
  const c = rec.cache;
  if (!c) return;
  const unitSym = c.units === "fahrenheit" ? "°F" : "°C";
  const windSym = c.windUnits === "mph" ? "mph" : "km/h";
  const fmtT = (v) => v == null ? "—" : (Math.round(v) + "°");
  const q = (sel) => rec.el.querySelector(sel);
  // v2.3.3-beta: populate the redesigned markup. Each query is
  // null-guarded so older widget DOM (saved before the redesign)
  // doesn't throw — markup gets regenerated on next page load.
  const icon = q(".wx-icon");
  if (icon) icon.innerHTML = _weatherIconSvg(c.code);
  if (q(".wx-loc"))  q(".wx-loc").textContent  = c.label || "Weather";
  if (q(".wx-temp")) q(".wx-temp").textContent = (c.temp == null ? "—" : Math.round(c.temp)) + unitSym;
  if (q(".wx-cond")) q(".wx-cond").textContent = WMO_CODES[c.code] || "—";
  if (q(".wx-feel")) {
    q(".wx-feel").textContent = c.feel == null
      ? "" : "Real Feel " + Math.round(c.feel) + unitSym;
  }
  if (q(".wx-hi")) q(".wx-hi").innerHTML = '<span class="wx-arrow">↑</span>' + fmtT(c.hi);
  if (q(".wx-lo")) q(".wx-lo").innerHTML = '<span class="wx-arrow">↓</span>' + fmtT(c.lo);
  if (q(".wx-precip")) q(".wx-precip").textContent = "☂ " + (c.precip == null ? "—" : c.precip + "%");
  if (q(".wx-humid"))  q(".wx-humid").textContent  = "💧 " + (c.humid == null ? "—" : Math.round(c.humid) + "%");
  if (q(".wx-wind"))   q(".wx-wind").textContent   = "🌬 " + (c.wind == null ? "—" : Math.round(c.wind) + " " + windSym);
  const minsAgo = Math.max(0, Math.round((Date.now() - c.ts) / 60000));
  // Open-Meteo data is CC-BY — the attribution stays in the footer
  // whenever the widget has real data to show.
  if (q(".wx-foot")) {
    q(".wx-foot").textContent =
      "updated " + (minsAgo === 0 ? "just now" : minsAgo + " min ago") + " · via Open-Meteo";
  }
  // v2.3.3-beta: weather-reactive ambient overlay. If the user has
  // weatherReactiveAmbient on, push the mapped preset into the
  // ambient module. Doesn't touch the stored ambientEffect setting
  // so the override evaporates the moment reactive mode is toggled
  // off (handled in the setting dispatcher).
  if (_weatherReactive) {
    const want = _weatherCodeToAmbient(c.code);
    if (want !== _weatherAmbient) {
      _weatherAmbient = want;
      ambient.setPreset(want || _userAmbient);
    }
  }
}

function fetchQuote(rec) {
  // Pick a fresh random quote, but try to avoid repeating the current
  // one back-to-back when the daily refresh fires.
  const prev = rec.cache && rec.cache.content;
  let pick;
  for (let i = 0; i < 5; i++) {
    pick = LOCAL_QUOTES[Math.floor(Math.random() * LOCAL_QUOTES.length)];
    if (pick.content !== prev) break;
  }
  rec.cache = { content: pick.content, author: pick.author, ts: Date.now() };
  renderQuoteCache(rec);
}

function renderQuoteCache(rec) {
  const c = rec.cache;
  if (!c) return;
  rec.el.querySelector(".q-text").textContent   = "“" + (c.content || "—") + "”";
  rec.el.querySelector(".q-author").textContent = "— " + (c.author || "anonymous");

// ── RSS fetch / parse / render ──
// Parses RSS 2.0 + Atom in the same pass: both expose <title> at the
// item root, just under <item> vs <entry>. Links and dates differ, so
// each parser arm extracts what's there and skips what isn't. Items
// without a title are dropped — they're almost always a sidecar
// <image>/<channel> element a feed mis-orders into the item list.
async function fetchRss(rec) {
  const url = (rec.opts && rec.opts.feedUrl || "").trim();
  const foot = rec.el.querySelector(".rss-foot");
  if (!url) {
    foot.textContent = "Click ⚙ to set a feed URL";
    return;
  }
  // v1.2.13: only allow http(s) URLs — a javascript:/data:/file: URL
  // shouldn't be feedable, and rejecting them here is cheaper than
  // chasing CEF-version-specific browser behaviour.
  try {
    const parsed = new URL(url);
    if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
      foot.textContent = "error: only http(s) feeds supported";
      foot.classList.add("err");
      return;
    }
  } catch (_) {
    foot.textContent = "error: invalid URL";
    foot.classList.add("err");
    return;
  }
  foot.textContent = "fetching…";
  try {
    const resp = await fetch(url, { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const xml = await resp.text();
    const doc = new DOMParser().parseFromString(xml, "application/xml");
    if (doc.querySelector("parsererror")) {
      throw new Error("not valid XML");
    }
    const isAtom = !!doc.querySelector("feed > entry");
    const items  = [];
    if (isAtom) {
      for (const entry of doc.querySelectorAll("feed > entry")) {
        const title = (entry.querySelector(":scope > title")?.textContent || "").trim();
        if (!title) continue;
        const linkEl = entry.querySelector(':scope > link[rel="alternate"]')
                    || entry.querySelector(":scope > link");
        const link   = linkEl ? (linkEl.getAttribute("href") || linkEl.textContent || "").trim() : "";
        const dateStr = (entry.querySelector(":scope > updated")?.textContent
                      || entry.querySelector(":scope > published")?.textContent || "").trim();
        items.push({ title, link, date: dateStr ? new Date(dateStr).getTime() : 0 });
      }
    } else {
      for (const item of doc.querySelectorAll("channel > item, rss > channel > item")) {
        const title = (item.querySelector(":scope > title")?.textContent || "").trim();
        if (!title) continue;
        const link  = (item.querySelector(":scope > link")?.textContent || "").trim();
        const dateStr = (item.querySelector(":scope > pubDate")?.textContent || "").trim();
        items.push({ title, link, date: dateStr ? new Date(dateStr).getTime() : 0 });
      }
    }
    // Channel title — RSS feeds publish it as <channel><title>; Atom
    // feeds as <feed><title>. Used as the widget's caption when the
    // user hasn't overridden it via opts.feedTitle.
    const channelTitle = (isAtom
      ? doc.querySelector("feed > title")?.textContent
      : doc.querySelector("channel > title")?.textContent) || "";
    rec.cache = {
      title: channelTitle.trim(),
      items,
      ts: Date.now(),
      err: null,
    };
    renderRssCache(rec);
  } catch (e) {
    console.warn("[rss] fetch failed:", e);
    rec.cache = rec.cache || { items: [] };
    rec.cache.err = e.message || String(e);
    renderRssCache(rec);
  }
}

function renderRssCache(rec) {
  const c = rec.cache;
  if (!c) return;
  const head = rec.el.querySelector(".rss-head");
  const list = rec.el.querySelector(".rss-list");
  const foot = rec.el.querySelector(".rss-foot");
  const overrideTitle = (rec.opts && rec.opts.feedTitle || "").trim();
  head.textContent = overrideTitle || c.title || "RSS";
  const maxItems = Math.max(1, Math.min(50,
    parseInt((rec.opts && rec.opts.itemCount) || 8, 10)));
  const showDate = rec.opts && rec.opts.showDate !== false;
  list.innerHTML = "";
  const items = (c.items || []).slice(0, maxItems);
  for (const it of items) {
    const li = document.createElement("li");
    li.className = "rss-item";
    const titleSpan = document.createElement("span");
    titleSpan.className = "rss-title";
    titleSpan.textContent = it.title;
    li.appendChild(titleSpan);
    if (showDate && it.date) {
      const dateSpan = document.createElement("span");
      dateSpan.className = "rss-date";
      dateSpan.textContent = _formatRssDate(it.date);
      li.appendChild(dateSpan);
    }
    list.appendChild(li);
  }
  if (c.err) {
    foot.textContent = "error: " + c.err;
    foot.classList.add("err");
  } else if (!items.length) {
    foot.textContent = "no items";
    foot.classList.remove("err");
  } else {
    foot.textContent = "updated " + _formatRssDate(c.ts);
    foot.classList.remove("err");
  }
}

function _formatRssDate(ts) {
  if (!ts) return "";
  const d  = new Date(ts);
  const dt = (Date.now() - ts) / 1000;
  if (dt < 60)      return "just now";
  if (dt < 3600)    return Math.floor(dt / 60) + "m ago";
  if (dt < 86400)   return Math.floor(dt / 3600) + "h ago";
  if (dt < 604800)  return Math.floor(dt / 86400) + "d ago";
  return d.toLocaleDateString();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

// Drive all widgets from a single rAF-friendly interval. Clock needs second-
// resolution; calendar and weather coast on minute-resolution but a 1 s tick
// is cheap and keeps things simple.
//
// v2.3.8-beta: widgets that declare `reg.fastTick = true` opt out of this
// 1 Hz path because they need finer cadence (the audio-spectrum widget
// drove FFT bars at 1 fps before this — visually broken). Fast widgets
// are driven by `_fastTickLoop` below, started on-demand when at least
// one fast widget exists.
setInterval(() => {
  if (isPaused) return;
  for (const rec of widgetNodes.values()) {
    if (rec.tick && !(rec.reg && rec.reg.fastTick)) {
      try { rec.tick(); } catch (e) { console.warn("[widget tick]", e); }
    }
  }
}, 1000);

// v2.3.8-beta: RENDER_INTERVAL_MS-throttled rAF for widgets that need
// per-frame redraws (audio-spectrum). Counter-gated so we don't pay
// for an idle rAF wake every frame when no fast widgets exist; ramp
// counter via `_bumpFastTick(+1)` on add and `_bumpFastTick(-1)` on
// remove, and the loop self-stops at 0.
let _fastTickCount = 0;
let _fastTickRaf = null;
let _fastTickLast = 0;
function _fastTickStep(now) {
  if (_fastTickCount <= 0) { _fastTickRaf = null; return; }
  _fastTickRaf = requestAnimationFrame(_fastTickStep);
  if (isPaused) return;
  if (now - _fastTickLast < RENDER_INTERVAL_MS) return;
  _fastTickLast = now;
  for (const rec of widgetNodes.values()) {
    if (rec.reg && rec.reg.fastTick && rec.tick) {
      try { rec.tick(); } catch (e) { console.warn("[fast widget tick]", e); }
    }
  }
}
function _bumpFastTick(delta) {
  _fastTickCount = Math.max(0, _fastTickCount + delta);
  if (_fastTickCount > 0 && !_fastTickRaf) {
    _fastTickLast = 0;
    _fastTickRaf = requestAnimationFrame(_fastTickStep);
  }
}
window.addEventListener("wallpaper-resume", () => {
  if (_fastTickCount > 0 && !_fastTickRaf) {
    _fastTickLast = 0;
    _fastTickRaf = requestAnimationFrame(_fastTickStep);
  }
});

// Tint update from the live colour stream — called from renderFrame() with the
// already-decoded zone colours, so it doesn't add a second parse pass. Picks
// the average of the first few zones; widgets that opted in pick this up via
// the --w-tint CSS variable on the next applyOptions cycle (also any tick).
// v1.2.12: cached. renderFrame hits this every tick (30 Hz) so a
// linear scan over widgetNodes was the dominant cost in the
// otherwise-tiny renderFrame epilogue once the grid render itself
// got optimised. _invalidateTintedCache() is called from every
// widget mutation path so the cache stays correct without polling.
let _tintedCache = null;
function _anyTintedWidget() {
  if (_tintedCache !== null) return _tintedCache;
  let any = false;
  for (const rec of widgetNodes.values()) {
    if (rec.opts && rec.opts.tintFromGlow) { any = true; break; }
  }
  _tintedCache = any;
  return any;
}
function _invalidateTintedCache() { _tintedCache = null; }

function updateTintFromFrame(zoneColors) {
  if (!zoneColors || !zoneColors.length) return;
  // Sample up to 16 zones; cheap mean of RGB.
  const N = Math.min(16, zoneColors.length);
  let r = 0, g = 0, b = 0;
  for (let i = 0; i < N; i++) {
    r += zoneColors[i][0];
    g += zoneColors[i][1];
    b += zoneColors[i][2];
  }
  r = (r / N) | 0; g = (g / N) | 0; b = (b / N) | 0;
  currentTintCss = "rgb(" + r + "," + g + "," + b + ")";
  for (const rec of widgetNodes.values()) {
    if (rec.opts && rec.opts.tintFromGlow) {
      rec.el.style.setProperty("--w-tint", currentTintCss);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// SysStats + audio buses
//
// Bridge pushes `{type:"sysstats", data:{cpu, ram, netDown, netUp, uptime,
// ts}}` once a second. We keep the latest snapshot plus a rolling 120-sample
// history (≈ 2 min) so sparkline widgets render from one shared source.
//
// Lively pushes an FFT array into `livelyAudioListener`. Wallpaper Engine
// uses `wallpaperRegisterAudioListener(fn)`; we register for both so the
// audio-spectrum widget works on either host.
// ─────────────────────────────────────────────────────────────────────────────

let lastSysStats = null;
// path -> last 120 numeric samples. Drained by the hardware-sensor
// widget's tick handler for its sparkline.
const hwmonHistory = Object.create(null);
const sysstatsHistory = [];
let lastAudio = null;

window.livelyAudioListener = function (audioArray) {
  lastAudio = audioArray;
};
if (typeof window.wallpaperRegisterAudioListener === "function") {
  try { window.wallpaperRegisterAudioListener((arr) => { lastAudio = arr; }); }
  catch (_) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Ambient effects — hand-rolled canvas particles with four presets.
//
// One generic engine; each preset declares targetCount / spawn / step /
// render. The engine ticks via requestAnimationFrame, scales the canvas
// to the viewport, and re-spawns up to the target count each frame.
// Tint pulls from currentTintCss (the glow-feed average that widgets
// already share) when the user enables it.
// ─────────────────────────────────────────────────────────────────────────────

const ambient = (function () {
  const canvas = document.getElementById("ambient-canvas");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let preset = "off";
  let tintEnabled = false;
  let density = 60;
  let raf = null;
  let lastT = 0;
  let viewW = 0, viewH = 0;
  // v1.6.1-beta R2.3: throttle this rAF chain to RENDER_INTERVAL_MS.
  // Same regression as audio-glow had — uncapped native rAF (~60 Hz)
  // burning ~2× the GPU it needs to. Particle motion is dt-driven
  // and visually identical at 30 Hz on the slow / smoothed presets
  // (snow, fireflies, plasma, aurora …).
  let _ambientLastTick = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    // v1.6.3-beta: backing scale + DPR pulled from effectQuality.
    // performance → 0.5× / DPR 1  (5120×1440 ≈ 7.4M px → 1.85M)
    // balanced    → 0.75× / DPR 1 (5120×1440 ≈ 7.4M px → 4.2M)
    // quality     → 1.0×  / DPR 2 (5120×1440 → 29.5M px, was the
    //                              pre-v1.6.1-beta default)
    const SCALE = _qualityScale();
    const dpr = _qualityDpr();
    const effective = SCALE * dpr;
    canvas.width  = Math.max(1, Math.round(viewW * effective));
    canvas.height = Math.max(1, Math.round(viewH * effective));
    ctx.setTransform(effective, 0, 0, effective, 0, 0);
  }
  window.addEventListener("resize", () => { if (preset !== "off") resize(); });

  function start() {
    if (raf) return;
    resize();
    lastT = performance.now();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    particles = [];
    // Drop any pooled corpses — they belong to the previous preset's
    // object shape and would leak Matrix column structs into Snow's
    // particle array otherwise. Length = 0 keeps the array's backing
    // store but discards references for GC.
    recyclePool.length = 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // v2.3.6-beta memory: collapse the backing buffer when the effect
    // is off. A viewport-sized canvas at 5120×1440 × DPR=1 × 4 bytes
    // is ~30 MB sitting unused; with four such canvases (bars, ambient,
    // pixelfx, audioglow) that's >100 MB resident per wallpaper
    // instance — doubled on multi-monitor setups (each gets its own
    // WebView2). start() resize()s back to full viewport, so the
    // tradeoff is just one allocation when the user enables the
    // effect again.
    canvas.width = 1; canvas.height = 1;
  }

  // Per-preset recycle pool for particle objects. Only presets that
  // define respawn(p, w, h) participate; the rest stay on the
  // allocate-fresh-on-spawn path so behaviour is unchanged for them.
  // Cleared on preset switch via stop().
  const recyclePool = [];

  function tick(now) {
    // v1.2.12: rAF cancel-on-pause. Pre-v1.2.12 we rescheduled
    // unconditionally and then early-returned — JS-CPU cost ≈ 0 but
    // the 60 Hz wakeups kept WebView2's compositor warm and forced
    // it to re-evaluate every CSS filter / backdrop-filter layer on
    // the page every frame. Now we stop the chain entirely; the
    // window-level "wallpaper-resume" event listener below picks it
    // back up on unpause.
    if (isPaused) { raf = null; return; }
    raf = requestAnimationFrame(tick);
    // v1.6.1-beta R2.3: gate by the global frame cap. dt is computed
    // from the actual elapsed time so particle physics still moves
    // the correct amount per visible frame; we just skip the render
    // half (and the spawn / step churn) when we're inside the
    // interval. RENDER_INTERVAL_MS defaults to 33 ms (30 Hz).
    if (now - _ambientLastTick < RENDER_INTERVAL_MS) return;
    const dt = Math.min(0.1, (now - lastT) / 1000);
    lastT = now;
    _ambientLastTick = now;
    const def = AMBIENT_PRESETS[preset];
    if (!def) return;
    const target = def.targetCount(density, viewW, viewH);
    // v1.6.1-beta hotfix11: trim excess when density drops.
    // Previously turning density DOWN had a delayed effect —
    // existing particles only attrited via natural step
    // consumption, taking many seconds at low respawn rates.
    // Now we pop from the end on every frame until we're at the
    // new target. Popping from the end is O(1) per particle and
    // doesn't disturb the swap-and-pop indices below.
    while (particles.length > target) {
      const dead = particles.pop();
      if (def.respawn && dead) recyclePool.push(dead);
    }
    // Spawn — prefer recycled corpses if the preset can respawn them
    // in place, else allocate fresh.
    while (particles.length < target) {
      const reuse = def.respawn ? recyclePool.pop() : undefined;
