      if (reuse !== undefined) {
        def.respawn(reuse, viewW, viewH);
        particles.push(reuse);
      } else {
        particles.push(def.spawn(viewW, viewH));
      }
    }
    // Step + compact via swap-and-pop instead of Array.splice. splice
    // shifts O(n) elements per dead particle, so a burst of deaths
    // degrades the step phase to O(n^2). Order doesn't matter for
    // any of our ambient presets — Matrix columns, snow flakes,
    // sparks, etc. are all rendered with identical z-order.
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!def.step(particles[i], dt, viewW, viewH)) {
        const dead = particles[i];
        const last = particles.length - 1;
        if (i !== last) particles[i] = particles[last];
        particles.pop();
        // Only recycle when the preset knows how to respawn — else
        // the corpse goes straight to GC like before.
        if (def.respawn) recyclePool.push(dead);
      }
    }
    ctx.clearRect(0, 0, viewW, viewH);
    const tint = tintEnabled ? currentTintCss : null;
    // Optional once-per-frame setup (e.g. Matrix hoists its font + colour
    // LUT here so the per-particle loop never re-parses the font or builds
    // a fresh colour string per glyph).
    if (typeof def.before === "function") def.before(ctx, tint);
    // Prefer renderAll(ctx, particles, tint) when the preset offers
    // it — that path can batch glyphs / strokes across particles so
    // expensive context-state changes (fillStyle, strokeStyle, font)
    // happen O(buckets) times instead of O(particles × glyphs).
    if (typeof def.renderAll === "function") {
      def.renderAll(ctx, particles, tint);
    } else {
      for (const p of particles) def.render(ctx, p, tint);
    }
    // Optional post-pass for effects that need to draw across the
    // whole particle set (e.g. constellation's connecting lines).
    if (typeof def.after === "function") def.after(ctx, particles, tint);
  }

  // v1.2.12: resume the rAF chain when the page comes off pause. The
  // tick() above stops scheduling when isPaused goes true, so without
  // this listener the ambient effect would stay frozen after unpause.
  window.addEventListener("wallpaper-resume", () => {
    if (preset !== "off" && !raf) {
      lastT = performance.now();
      raf = requestAnimationFrame(tick);
    }
  });

  return {
    setPreset(p) {
      if (!AMBIENT_PRESETS[p] && p !== "off") p = "off";
      if (p === preset) return;
      preset = p;
      if (p === "off") { canvas.classList.remove("on"); stop(); }
      else             { canvas.classList.add("on"); particles = []; start(); }
    },
    setTinted(on) { tintEnabled = !!on; },
    setDensity(d) {
      d = isFinite(d) ? d : 60;
      density = Math.max(1, Math.min(100, d));
    },
  };
})();

// rgbToRgba("rgb(R,G,B)", a) → "rgba(R,G,B,a)" — used by ambient renderers
// to fade particle colours without parsing the rgb() back into components.
function rgbToRgba(rgb, a) {
  return rgb.replace("rgb(", "rgba(").replace(")", "," + a + ")");
}

// Katakana half-width + digits + a handful of symbols, matching the
// classic Matrix-rain character pool. Defined here (above AMBIENT_PRESETS)
// so the Matrix preset's spawn() finds it at call time.
const MATRIX_CHARSET =
  "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン" +
  "0123456789" +
  "!@#$%&*?:;+=-";
// String-indexing (`MATRIX_CHARSET[i]`) returns a fresh 1-char string
// on every access — a hidden allocator at ~2400 lookups/spawn-burst +
// ~120 flicker-swaps/sec across the column set. Array-indexing returns
// the same interned string reference, so this pre-split table is the
// cheapest correct way to fetch a glyph in the hot Matrix paths.
const MATRIX_CHARS = Array.from(MATRIX_CHARSET);
const MATRIX_CHARS_LEN = MATRIX_CHARS.length;

// v2.3.3-beta: weather-reactive ambient overlay state. When
// `weatherReactiveAmbient` is on, the weather widget's update path
// maps the WMO code to one of our ambient presets and sets
// _weatherAmbient. ambient.setPreset prefers it over the user's
// stored ambientEffect choice; toggling the reactive mode off drops
// back to _userAmbient. The user's stored setting is never modified
// — this is a pure presentation override.
let _userAmbient     = "off";
let _weatherAmbient  = "";
let _weatherReactive = false;

function _weatherCodeToAmbient(code) {
  if (typeof code !== "number") return "";
  // WMO code → ambient preset. Empty = no override (clear / cloudy
  // skies don't push a specific atmosphere, the user's pick wins).
  // 51-65: drizzle / rain     → rain
  // 71-77, 85-86: snow        → snow
  // 80-82: heavy showers      → rain
  // 95-99: thunderstorm       → storm
  if (code >= 95 && code <= 99) return "storm";
  if (code >= 51 && code <= 65) return "rain";
  if (code >= 80 && code <= 82) return "rain";
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return "snow";
  return "";
}

// v2.3.3-beta: storm preset lightning state. Kept at module scope so
// the AMBIENT_PRESETS.storm.before hook can persist across frames
// without a closure of its own — fits cleaner than ad-hoc state
// inside the preset literal.
let _stormFlashA   = 0;          // current flash overlay alpha (0..1)
let _stormFlashT   = 0;          // seconds since last strike
let _stormNextFlash = 4 + Math.random() * 8;  // initial first strike
let _stormLastT    = 0;          // perf.now() at last before() call
let _stormDouble   = false;      // already double-pulsed this strike?
let _stormVW = 0, _stormVH = 0;  // viewport dimensions (set by ambient resize)

const AMBIENT_PRESETS = {
  snow: {
    targetCount: (d, w, h) => Math.round((w * h) / 12000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w, y: -10 + Math.random() * -h * 0.3,
      vx: (Math.random() - 0.5) * 0.6,
      vy: 0.3 + Math.random() * 0.7,
      r:  1.2 + Math.random() * 2.5,
      alpha: 0.45 + Math.random() * 0.45,
      wobble: Math.random() * Math.PI * 2,
    }),
    step: (p, dt, w, h) => {
      p.wobble += dt * 1.5;
      p.x += (p.vx + Math.sin(p.wobble) * 0.4) * dt * 60;
      p.y += p.vy * dt * 60;
      if (p.y > h + 10) return false;
      if (p.x < -10)    p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(255,255,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  rain: {
    targetCount: (d, w, h) => Math.round((w * h) / 5000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w * 1.2,
      y: -20 - Math.random() * h * 0.4,
      vx: -1.4,
      vy: 9 + Math.random() * 6,
      length: 10 + Math.random() * 10,
      alpha: 0.25 + Math.random() * 0.35,
    }),
    step: (p, dt, w, h) => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      return (p.y < h + 30 && p.x > -30);
    },
    render: (ctx, p, tint) => {
      ctx.strokeStyle = tint ? rgbToRgba(tint, p.alpha)
                             : "rgba(180,200,255," + p.alpha + ")";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * p.length * 0.08, p.y - p.length);
      ctx.stroke();
    },
  },

  // v2.3.3-beta: storm = rain + lightning. Reuses rain's spawn /
  // step / render for the falling drops, plus a small state machine
  // tracked across `before` calls that periodically fires a
  // full-viewport flash to fake distant lightning. State lives in
  // file-scope vars (_stormFlashA + _stormNextFlash + _stormLastT)
  // because the AMBIENT_PRESETS hook signature (ctx, tint) doesn't
  // pass dt — we derive elapsed time from performance.now()
  // ourselves. Flash colour is intentionally cool-white so it reads
  // as ambient lightning even on a tinted bridge feed.
  storm: {
    targetCount: (d, w, h) => Math.round((w * h) / 5000 * (d / 60)),
    spawn: (w, h) => AMBIENT_PRESETS.rain.spawn(w, h),
    step: (p, dt, w, h) => AMBIENT_PRESETS.rain.step(p, dt, w, h),
    render: (ctx, p, tint) => AMBIENT_PRESETS.rain.render(ctx, p, tint),
    before: (ctx, tint) => {
      const now = performance.now();
      const dt = _stormLastT ? Math.min(0.1, (now - _stormLastT) / 1000) : 0;
      _stormLastT = now;
      // Lightning timer counts up; when it crosses _stormNextFlash
      // we punch in a fresh flash and roll a new interval. Distant
      // storm cadence: 6-22 s between flashes.
      _stormFlashT += dt;
      if (_stormFlashT >= _stormNextFlash) {
        _stormFlashT = 0;
        _stormNextFlash = 6 + Math.random() * 16;
        // Random flash strength so consecutive flashes don't feel
        // identical. Stored as remaining-alpha; decays over the next
        // ~250 ms.
        _stormFlashA = 0.45 + Math.random() * 0.35;
      }
      if (_stormFlashA > 0) {
        // Two-stage decay: a quick stepped fall mimics the multiple
        // discharges of a real lightning strike.
        ctx.fillStyle = "rgba(220, 235, 255, " + _stormFlashA + ")";
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        _stormFlashA = Math.max(0, _stormFlashA - dt * 4.2);
        // Occasional double-flash: ~25 % chance a strike re-pulses
        // halfway through its fade.
        if (_stormFlashA > 0 && _stormFlashA < 0.2 && !_stormDouble && Math.random() < 0.25) {
          _stormDouble = true;
          _stormFlashA = Math.min(1, _stormFlashA + 0.5);
        }
        if (_stormFlashA <= 0) _stormDouble = false;
      }
    },
  },

  sparks: {
    targetCount: (d, w, h) => Math.round((w * h) / 18000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: h + 10,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.4 + Math.random() * 1.0),
      r: 1 + Math.random() * 1.8,
      hue: 30 + Math.random() * 30,
      alpha: 0.8 + Math.random() * 0.2,
      life: 0,
      maxLife: 4 + Math.random() * 6,
    }),
    step: (p, dt) => {
      p.life += dt;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy -= dt * 0.05;
      return p.life < p.maxLife && p.y > -10;
    },
    render: (ctx, p, tint) => {
      const fadeIn  = Math.min(1, p.life / 0.5);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.5);
      const a = p.alpha * Math.min(fadeIn, fadeOut);
      // Bright hot core + warm halo. Tint, if any, replaces the warm halo
      // while the core stays neutral white so sparks still pop visually.
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      grad.addColorStop(0, "rgba(255,255,255," + a + ")");
      const halo = tint
        ? rgbToRgba(tint, a * 0.6)
        : "hsla(" + p.hue + ", 95%, 60%, " + (a * 0.6) + ")";
      grad.addColorStop(0.45, halo);
      grad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r * 5, p.y - p.r * 5, p.r * 10, p.r * 10);
    },
  },

  // ── Constellation ──
  // Drifting particles + thin lines between any two that come within
  // a fade radius. Inspired by the classic CodePen connect-the-dots
  // effect (ykob/aBrjaR style, MIT). Implementation original, fits
  // our existing AMBIENT_PRESETS shape so the renderer below can
  // drive it like the rest.
  constellation: {
    targetCount: (d, w, h) => Math.round((w * h) / 24000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r:  1 + Math.random() * 1.8,
      alpha: 0.4 + Math.random() * 0.4,
    }),
    step: (p, dt, w, h) => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      // Bounce-wrap so particles stay distributed across the canvas.
      if (p.x < -10)      p.x = w + 10;
      if (p.x > w + 10)   p.x = -10;
      if (p.y < -10)      p.y = h + 10;
      if (p.y > h + 10)   p.y = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(180,210,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
    // Optional post-pass: draw connecting lines between nearby
    // particles. The driver loop (renderAmbient) calls this once per
    // frame after all the per-particle render calls; receives the
    // live particle array. ~O(n²) but with `targetCount` capped
    // around 60 it stays well under 1 ms per frame.
    after: (ctx, particles, tint) => {
      const MAX_DIST = 130;
      const MAX_DIST_SQ = MAX_DIST * MAX_DIST;
      const baseColor = tint
        ? rgbToRgba(tint, 1)
        : "rgba(180,210,255,1)";
      ctx.lineWidth = 0.7;
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dSq = dx * dx + dy * dy;
          if (dSq > MAX_DIST_SQ) continue;
          // Stroke alpha falls off linearly with distance.
          const t = 1 - Math.sqrt(dSq) / MAX_DIST;
          const aOut = t * 0.35 * Math.min(a.alpha, b.alpha);
          // Pull alpha component out of baseColor (rgba(...,1))
          // and substitute the per-pair fade. Cheap regex; the
          // baseColor format is fixed above.
          ctx.strokeStyle = baseColor.replace(/[\d.]+\)$/, aOut.toFixed(3) + ")");
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    },
  },

  // ── Fireflies ──
  // Slow-drifting glowing dots that pulse on their own clock. Each
  // particle owns its own phase so the field doesn't strobe in sync.
  fireflies: {
    targetCount: (d, w, h) => Math.round((w * h) / 22000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.2,
      r:  1.5 + Math.random() * 2,
      hue: 50 + Math.random() * 35,            // yellow-green band
      phase: Math.random() * Math.PI * 2,
      phaseSpeed: 0.6 + Math.random() * 1.4,   // rad / s
    }),
    step: (p, dt, w, h) => {
      p.phase += dt * p.phaseSpeed;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      if (p.x < -10)    p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10)    p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      const pulse = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(p.phase));
      const halo  = p.r * 6;
      const grad  = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, halo);
      const a     = pulse;
      const core  = "rgba(255,255,230," + (a * 0.9) + ")";
      const ring  = tint
        ? rgbToRgba(tint, a * 0.55)
        : "hsla(" + p.hue + ", 95%, 55%, " + (a * 0.55) + ")";
      grad.addColorStop(0,    core);
      grad.addColorStop(0.45, ring);
      grad.addColorStop(1,    "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - halo, p.y - halo, halo * 2, halo * 2);
    },
  },

  aurora: {
    targetCount: (d) => Math.max(3, Math.round(3 + d / 25)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: h * (0.2 + Math.random() * 0.5),
      vx: (Math.random() - 0.5) * 0.3,
      r: 180 + Math.random() * 160,
      hue: 130 + Math.random() * 140,
      life: 0,
      maxLife: 20 + Math.random() * 25,
    }),
    step: (p, dt, w) => {
      p.life += dt;
      p.x += p.vx * dt * 60;
      if (p.x < -p.r)     p.x = w + p.r;
      if (p.x > w + p.r)  p.x = -p.r;
      return p.life < p.maxLife;
    },
    render: (ctx, p) => {
      const fadeIn  = Math.min(1, p.life / 4);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 4);
      const a = 0.14 * Math.min(fadeIn, fadeOut);
      const hue = p.hue;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      grad.addColorStop(0,   "hsla(" + hue + ", 80%, 60%, " + a + ")");
      grad.addColorStop(0.5, "hsla(" + hue + ", 80%, 60%, " + (a * 0.4) + ")");
      grad.addColorStop(1,   "hsla(" + hue + ", 80%, 60%, 0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
    },
  },

  // ── Plasma ──
  // Soft full-canvas hue-cycling blobs, lava-lamp style. Distinct from
  // aurora (which is confined to a horizontal band): plasma blobs roam
  // the whole canvas and own their hue clock so the colour wash is
  // always shifting.
  plasma: {
    targetCount: (d) => Math.max(4, Math.round(4 + d / 18)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.2,
      r: 200 + Math.random() * 220,
      hue: Math.random() * 360,
      hueSpeed: 4 + Math.random() * 6,                 // deg / s
    }),
    step: (p, dt, w, h) => {
      p.hue = (p.hue + p.hueSpeed * dt) % 360;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      // Wrap so the blob count stays constant.
      if (p.x < -p.r)    p.x = w + p.r;
      if (p.x > w + p.r) p.x = -p.r;
      if (p.y < -p.r)    p.y = h + p.r;
      if (p.y > h + p.r) p.y = -p.r;
      return true;
    },
    render: (ctx, p, tint) => {
      const a = 0.18;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      if (tint) {
        // Tint mode: drop the hue cycle, run the user's glow colour at
        // varying alpha across the blob's radius. Still feels alive
        // thanks to the drift + size, but stays on-palette.
        grad.addColorStop(0,    rgbToRgba(tint, a));
        grad.addColorStop(0.55, rgbToRgba(tint, a * 0.35));
        grad.addColorStop(1,    rgbToRgba(tint, 0));
      } else {
        grad.addColorStop(0,    "hsla(" + p.hue + ", 80%, 60%, " + a + ")");
        grad.addColorStop(0.55, "hsla(" + p.hue + ", 80%, 60%, " + (a * 0.35) + ")");
        grad.addColorStop(1,    "hsla(" + p.hue + ", 80%, 60%, 0)");
      }
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
    },
  },

  // ── Vortex ──
  // Particles spawn near the canvas edge, spiral inward toward the
  // centre with rising angular velocity, and despawn once they get
  // close enough. New ones replace them at the perimeter to keep the
  // spiral alive. Each particle owns its angle / radius in polar
  // coords; cartesian only computed at render time.
  vortex: {
    targetCount: (d, w, h) => Math.round((w * h) / 14000 * (d / 60)),
    spawn: (w, h) => {
      const maxR = Math.hypot(w, h) * 0.55;
      return {
        cx: w / 2, cy: h / 2,
        angle:  Math.random() * Math.PI * 2,
        radius: maxR * (0.7 + Math.random() * 0.3),
        // Inward speed grows as the particle gets closer to centre,
        // giving the visual a real "drain" feel. Tuned so the average
        // particle lives ~10-15 s.
        inSpeed: 18 + Math.random() * 14,              // px / s, base
        spinSpeed: 0.4 + Math.random() * 0.4,          // rad / s at edge
        r: 1.2 + Math.random() * 1.4,
        alpha: 0.55 + Math.random() * 0.35,
      };
    },
    step: (p, dt, w, h) => {
      const maxR = Math.hypot(w, h) * 0.55;
      // Angular velocity scales inversely with radius so the inner
      // particles whip around faster — classic spiral feel.
      const r = Math.max(8, p.radius);
      p.angle  += p.spinSpeed * (maxR / r) * dt;
      p.radius -= p.inSpeed * dt;
      return p.radius > 6;
    },
    render: (ctx, p, tint) => {
      const x = p.cx + Math.cos(p.angle) * p.radius;
      const y = p.cy + Math.sin(p.angle) * p.radius;
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(200,220,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  // ── Bubbles ──
  // Hollow-rim circles rising from the bottom with a slight horizontal
  // wobble; grow a touch as they rise. Stroked, not filled, so the
  // background image stays visible inside each bubble — useful as a
  // gentle texture overlay rather than a screen-tint.
  bubbles: {
    targetCount: (d, w, h) => Math.round((w * h) / 22000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  h + 10 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.5 + Math.random() * 1.1),
      r:  4 + Math.random() * 8,
      growth: 0.4 + Math.random() * 0.6,               // px / s
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 1.2 + Math.random() * 1.4,
      alpha: 0.35 + Math.random() * 0.35,
    }),
    step: (p, dt, w, h) => {
      p.wobble += p.wobbleSpeed * dt;
      p.x += (p.vx + Math.sin(p.wobble) * 0.35) * dt * 60;
      p.y += p.vy * dt * 60;
      p.r += p.growth * dt;
      if (p.x < -20)    p.x = w + 20;
      if (p.x > w + 20) p.x = -20;
      return p.y > -p.r * 2;
    },
    render: (ctx, p, tint) => {
      // Fade out near the top so bubbles don't pop visibly when they
      // hit the despawn cutoff.
      const topFade = Math.min(1, p.y / 80);
      const a = p.alpha * topFade;
      const rim = tint ? rgbToRgba(tint, a)
                       : "rgba(200,225,255," + a + ")";
      ctx.strokeStyle = rim;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
      // Faint specular highlight on the upper-left, gives the bubble
      // shape some depth.
      ctx.strokeStyle = tint ? rgbToRgba(tint, a * 0.6)
                             : "rgba(255,255,255," + (a * 0.55) + ")";
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(p.x - p.r * 0.35, p.y - p.r * 0.35,
              p.r * 0.35, Math.PI * 0.9, Math.PI * 1.4);
      ctx.stroke();
    },
  },

  // ── Matrix ──
  // Falling columns of katakana + digits, classic green-on-black
  // "digital rain". Each "particle" is one column with its own
  // length / speed / character buffer. Tint mode swaps the green
  // palette for the user's glow colour while keeping the head row
  // bright white so the leading edge of each stream still pops.
  matrix: {
    targetCount: (d, w) => Math.round(w / 16 * (d / 60)),
    spawn: (w, h) => {
      const len = 8 + Math.floor(Math.random() * 18);
      const chars = new Array(len);
      for (let i = 0; i < len; i++) {
        chars[i] = MATRIX_CHARS[(Math.random() * MATRIX_CHARS_LEN) | 0];
      }
      return {
        // Snap x to a 16 px grid so columns align visually instead
        // of looking jittery.
        x: ((Math.random() * w / 16) | 0) * 16,
        y: -len * 16 - Math.random() * 200,
        speed: 100 + Math.random() * 160,
        chars,
        swapTimer: 0,
      };
    },
    // Reset an already-allocated column object in place. The ambient
    // driver pops a dead column from the recycle pool and routes it
    // through respawn() instead of allocating a fresh {chars, …} +
    // backing array on every column birth. With Matrix's ~120 columns
    // continuously dying and respawning, this kills the GC churn that
    // was producing visible frame-time spikes on multi-monitor.
    respawn(p, w, h) {
      // Reuse the existing chars array — it stays at its previous
      // length so we never reallocate. Pick a fresh length and
      // either extend or shrink to fit without `new Array`.
      const len = 8 + Math.floor(Math.random() * 18);
      const chars = p.chars;
      if (chars.length !== len) chars.length = len;
      for (let i = 0; i < len; i++) {
        chars[i] = MATRIX_CHARS[(Math.random() * MATRIX_CHARS_LEN) | 0];
      }
      p.x = ((Math.random() * w / 16) | 0) * 16;
      p.y = -len * 16 - Math.random() * 200;
      p.speed = 100 + Math.random() * 160;
      p.swapTimer = 0;
    },
    step: (p, dt, w, h) => {
      p.y += p.speed * dt;
      p.swapTimer += dt;
      // Periodically swap a random char so the streams flicker like
      // the original effect. ~6 Hz feels right; too fast looks noisy.
      if (p.swapTimer > 0.16) {
        p.swapTimer = 0;
        const idx = (Math.random() * p.chars.length) | 0;
        p.chars[idx] = MATRIX_CHARS[(Math.random() * MATRIX_CHARS_LEN) | 0];
      }
      return p.y - p.chars.length * 16 < h + 20;
    },
    // Once per frame: set the font a single time (re-parsing it per column
    // was the dominant cost) and (re)build a 16-step colour lookup so the
    // per-glyph render path never allocates a colour string. Rebuilt only
    // when the tint state actually changes.
    before(ctx, tint) {
      ctx.font = "13px Consolas, 'Courier New', monospace";
      ctx.textBaseline = "top";
      if (this._tint === tint && this._head) return;
      this._tint = tint;
      const head = this._head = new Array(16);
      const body = this._body = new Array(16);
      for (let k = 0; k < 16; k++) {
        const a = ((k + 0.5) / 16) * 0.85;   // representative alpha for bucket
        head[k] = "rgba(220,255,220," + a.toFixed(3) + ")";
        body[k] = tint
          ? rgbToRgba(tint, +(a * 0.7).toFixed(3))
          : "hsla(120,80%,55%," + (a * 0.85).toFixed(3) + ")";
      }
    },
    // Batched whole-frame render. Each ctx.fillStyle = ... write parses
    // the CSS colour string fresh (Chromium's fillStyle cache is a
    // 1-entry LRU keyed on the previous value, so any alternation
    // thrashes it), so the per-particle render path used to set
    // fillStyle ~2000 times per frame on a typical scene. Bucketing
    // glyphs by their fade-LUT index and head/body class first means
    // fillStyle changes at most 32 times per frame total (16 head
    // buckets + 16 body buckets), regardless of particle count.
    //
    // The bucket backing arrays are allocated lazily once and reused;
    // setting `.length = 0` resets the bucket without freeing the
    // underlying storage so steady state is allocation-free.
    renderAll(ctx, particles) {
      let bx = this._bucketXs, by = this._bucketYs, bc = this._bucketCs;
      if (!bx) {
        bx = this._bucketXs = new Array(32);
        by = this._bucketYs = new Array(32);
        bc = this._bucketCs = new Array(32);
        for (let k = 0; k < 32; k++) {
          bx[k] = []; by[k] = []; bc[k] = [];
        }
      }
      // Reset bucket lengths (without re-allocating).
      for (let k = 0; k < 32; k++) {
        bx[k].length = 0; by[k].length = 0; bc[k].length = 0;
      }
      // Bucket pass: classify every visible glyph by its fade bucket
      // and head/body status. Buckets 0–15 are the bright "head" of
      // each column, 16–31 are the tinted body.
      const np = particles.length;
      for (let pi = 0; pi < np; pi++) {
        const p = particles[pi];
        const n = p.chars.length;
        const px = p.x;
        const py = p.y;
        const pchars = p.chars;
        for (let i = 0; i < n; i++) {
          const y = (py - i * 16) | 0;
          if (y < -16) continue;
          let k = ((1 - i / n) * 16) | 0;
          if (k > 15) k = 15;
          const slot = i === 0 ? k : k + 16;
          const xs = bx[slot], ys = by[slot], cs = bc[slot];
          xs[xs.length] = px;
          ys[ys.length] = y;
          cs[cs.length] = pchars[i];
        }
      }
      // Draw pass: fillStyle changes once per non-empty bucket.
      const head = this._head, body = this._body;
      for (let k = 0; k < 16; k++) {
        const hl = bx[k].length;
        if (hl) {
          ctx.fillStyle = head[k];
          const xs = bx[k], ys = by[k], cs = bc[k];
          for (let j = 0; j < hl; j++) ctx.fillText(cs[j], xs[j], ys[j]);
        }
        const k2 = k + 16;
        const bl = bx[k2].length;
        if (bl) {
          ctx.fillStyle = body[k];
          const xs = bx[k2], ys = by[k2], cs = bc[k2];
          for (let j = 0; j < bl; j++) ctx.fillText(cs[j], xs[j], ys[j]);
        }
      }
    },
  },

  // ── Starfield ──
  // Particles distributed in normalised [-1,1] × [-1,1] space at
  // varying z-depth; each frame z shrinks (zoom toward viewer),
  // projection puts them at increasing screen radius from the
  // centre with a streak trail. Despawn when z gets too small
  // (otherwise they'd grow infinitely large at the centre).
  //
  // cx / cy are baked in at spawn so the projection has a fixed
  // origin even on canvas resize — for the few seconds an average
  // star lives, that's accurate enough.
  starfield: {
    targetCount: (d, w, h) => Math.round((w * h) / 9000 * (d / 60)),
    spawn: (w, h) => ({
      cx: w / 2, cy: h / 2,
      // Bias spawn away from dead-centre so new stars don't pop
      // into existence visibly close to the projection origin.
      nx: (Math.random() - 0.5) * 2 + (Math.random() < 0.5 ? -0.15 : 0.15),
      ny: (Math.random() - 0.5) * 2 + (Math.random() < 0.5 ? -0.15 : 0.15),
      z: 2 + Math.random() * 5,
      speed: 0.5 + Math.random() * 0.5,
      focal: Math.min(w, h) * 0.6,
    }),
    step: (p, dt) => {
      p.z -= p.speed * dt;
      return p.z > 0.15;
    },
    render: (ctx, p, tint) => {
      const px = p.cx + p.nx / p.z * p.focal;
      const py = p.cy + p.ny / p.z * p.focal;
      const r = Math.max(0.4, 2.2 / p.z);
      const a = Math.min(1, (6 - p.z) / 5);
      const color = tint ? rgbToRgba(tint, a) : "rgba(220,235,255," + a + ")";
      // Streak: project at z+frame to get the "previous" position so
      // the star draws as a short trail rather than a pinpoint, which
      // is the trick that sells the hyperspace illusion.
      const prevZ = p.z + p.speed * 0.05;
      const prevPx = p.cx + p.nx / prevZ * p.focal;
      const prevPy = p.cy + p.ny / prevZ * p.focal;
      ctx.strokeStyle = tint ? rgbToRgba(tint, a * 0.5)
                             : "rgba(220,235,255," + (a * 0.5) + ")";
      ctx.lineWidth = r * 0.7;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(prevPx, prevPy);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  // ── Lightning ──
  // Brief flashing branched arcs. Each "particle" is one bolt event:
  // a jagged polyline generated via midpoint displacement plus a
  // life-clock that drives the bright-flash-then-fade envelope.
  // shadowBlur gives the bolt its glow halo; reset after each draw
  // so the blur doesn't leak into the next preset's render path.
  lightning: {
    targetCount: (d) => Math.max(1, Math.round(1 + d / 50)),
    spawn: (w, h) => {
      const startX = Math.random() * w;
      const endX = startX + (Math.random() - 0.5) * w * 0.7;
      const endY = h * (0.4 + Math.random() * 0.5);
      // Midpoint-displacement path: start with two endpoints, halve
      // each segment 4× to get a jagged 17-point polyline. Branch
      // jitter shrinks with depth so the macro shape stays close to
      // a straight bolt while micro-segments wobble.
      let pts = [{ x: startX, y: 0 }, { x: endX, y: endY }];
      for (let depth = 0; depth < 4; depth++) {
        const next = [pts[0]];
        const jitter = 35 / (depth + 1);
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          next.push({
            x: (a.x + b.x) / 2 + (Math.random() - 0.5) * jitter,
            y: (a.y + b.y) / 2 + (Math.random() - 0.5) * jitter,
          });
          next.push(b);
        }
        pts = next;
      }
      return {
        path: pts,
        life: 0,
        flashDur: 0.06 + Math.random() * 0.08,
        maxLife: 0.55 + Math.random() * 0.55,
      };
    },
    step: (p, dt) => {
      p.life += dt;
      return p.life < p.maxLife;
    },
    render: (ctx, p, tint) => {
      // Two-phase envelope: hot flash for the first flashDur seconds,
      // then linear fade. Squaring the fade portion makes the tail
      // drop off faster than a linear ramp — closer to a real arc's
      // afterglow.
      let intensity;
      if (p.life < p.flashDur) {
        intensity = 1;
      } else {
        const t = (p.life - p.flashDur) / (p.maxLife - p.flashDur);
        intensity = Math.max(0, 1 - t);
        intensity *= intensity;
      }
      if (intensity <= 0.01) return;
      const halo = tint || "rgb(180,220,255)";
      ctx.save();
      ctx.shadowColor = halo;
      ctx.shadowBlur = 14 * intensity;
      ctx.strokeStyle = "rgba(255,255,255," + intensity + ")";
      ctx.lineWidth = 1.6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (let i = 0; i < p.path.length; i++) {
        const pt = p.path[i];
        if (i === 0) ctx.moveTo(pt.x, pt.y);
        else ctx.lineTo(pt.x, pt.y);
      }
      ctx.stroke();
      ctx.restore();
    },
  },

  // ── Waves ──
  // Multiple sinusoidal horizontal lines flowing across the canvas
  // at slightly different speeds, amplitudes and phases. Each
  // "particle" is one line; the renderer samples it as a polyline
  // across canvas width every frame. Soft alpha so lines blend
  // into each other where they overlap.
  waves: {
    targetCount: (d) => Math.max(3, Math.round(3 + d / 20)),
    spawn: (w, h) => ({
      yBase: h * (0.15 + Math.random() * 0.7),
      amp:   30 + Math.random() * 80,
      freq:  0.003 + Math.random() * 0.005,    // cycles per px
      speed: 0.4 + Math.random() * 0.7,        // phase advance / sec
      phase: Math.random() * Math.PI * 2,
      thick: 1.5 + Math.random() * 1.5,
      alpha: 0.25 + Math.random() * 0.35,
    }),
    step: (p, dt) => {
      p.phase += p.speed * dt;
      return true;     // waves don't despawn
    },
    render: (ctx, p, tint) => {
      const w = ctx.canvas.width / (window.devicePixelRatio || 1);
      ctx.strokeStyle = tint
        ? rgbToRgba(tint, p.alpha)
        : "rgba(120, 180, 255, " + p.alpha + ")";
      ctx.lineWidth = p.thick;
      ctx.lineCap = "round";
      ctx.beginPath();
      // Sample every 4 px — fine enough that the curve reads as
      // smooth at 1080p / 1440p, coarse enough to keep per-frame
      // cost negligible. lineJoin handles the segment smoothing.
      const STEP = 4;
      for (let x = 0; x <= w; x += STEP) {
        const y = p.yBase + Math.sin(x * p.freq + p.phase) * p.amp;
        if (x === 0) ctx.moveTo(x, y);
        else         ctx.lineTo(x, y);
      }
      ctx.stroke();
    },
  },

  // ── Ripples ──
  // Concentric expanding rings, like water-surface ripples after a
  // drop. Each particle is one ripple: a centre point + a radius
  // that grows over time, with the stroke fading out as the radius
  // increases. Despawn when alpha hits zero so the field doesn't
  // fill up with invisible rings.
  ripples: {
    targetCount: (d) => Math.max(2, Math.round(d / 25)),
    spawn: (w, h) => ({
      x:    Math.random() * w,
      y:    Math.random() * h,
      r:    0,
      vr:   80 + Math.random() * 60,           // radius growth (px / sec)
      maxR: 200 + Math.random() * 180,
      thick: 1.2 + Math.random() * 1.0,
    }),
    step: (p, dt) => {
      p.r += p.vr * dt;
      return p.r < p.maxR;
    },
    render: (ctx, p, tint) => {
      // Stroke alpha fades from 0.55 at birth to 0 at maxR; the
      // squared falloff makes the ring's afterglow taper rather
      // than fading linearly.
      const t = 1 - p.r / p.maxR;
      const a = t * t * 0.55;
      ctx.strokeStyle = tint
        ? rgbToRgba(tint, a)
        : "rgba(180, 220, 255, " + a + ")";
      ctx.lineWidth = p.thick;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
    },
  },

  // ── Flowfield ──
  // Particles drifting through a smooth 2D Perlin-ish noise vector
  // field. Each frame the particle's velocity is steered toward
  // the noise direction at its current position, producing the
  // organic swirling-stream pattern that flow-field pens are known
  // for. Cheap pseudo-noise (sin/cos combo) — no dependency.
  flowfield: {
    targetCount: (d, w, h) => Math.round((w * h) / 6000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: 0, vy: 0,
      r:  0.8 + Math.random() * 1.0,
      alpha: 0.35 + Math.random() * 0.3,
      life: 0,
      maxLife: 6 + Math.random() * 8,
    }),
    step: (p, dt, w, h) => {
      p.life += dt;
      // Cheap noise: sample two trig functions at scaled coords to
      // get an angle. Phase shifts make X and Y components
      // independent enough for the field to swirl rather than
      // align. Not true Perlin but visually indistinguishable for
      // this use case.
      const FREQ = 0.004;
      const T = performance.now() * 0.00008;
      const angle = Math.sin(p.x * FREQ + T) * Math.PI
                  + Math.cos(p.y * FREQ - T * 1.3) * Math.PI;
      // Lerp the velocity toward the noise direction so trails
      // curve smoothly instead of snapping each frame.
      const targetVx = Math.cos(angle) * 50;
      const targetVy = Math.sin(angle) * 50;
      p.vx += (targetVx - p.vx) * 0.04;
      p.vy += (targetVy - p.vy) * 0.04;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      // Despawn off-screen or end-of-life.
      if (p.x < -20 || p.x > w + 20 || p.y < -20 || p.y > h + 20) return false;
      return p.life < p.maxLife;
    },
    render: (ctx, p, tint) => {
      // Subtle birth + death fade so respawning particles don't
      // pop in and dying ones don't snap out.
      const fadeIn  = Math.min(1, p.life / 0.6);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.2);
      const a = p.alpha * Math.min(fadeIn, fadeOut);
      ctx.fillStyle = tint
        ? rgbToRgba(tint, a)
        : "rgba(200, 220, 255, " + a + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  // v1.6.1-beta hotfix6: Wormhole — cursor-aware ambient.
  // Particles get proper velocity vectors (inward + tangential
  // swirl) at spawn so they're visibly moving from the first
  // frame, plus a gravitational accelerator that compounds as
  // they get closer. Spawn ring is much tighter than the
  // previous attempt so most particles fit on screen instead
  // of bunching out in the corners. Renders as a glowing dot
  // + a streak from previous position so each particle is
  // always visible regardless of speed.
  wormhole: {
    // v1.6.1-beta hotfix10: density tuned down from
    // (w*h)/3000 = 2450 on 5120×1440 to (w*h)/6000 = 1225 — the
    // user said "feels like too many, keeps growing". The
    // "growing" sensation was the initial fill ramp (empty →
    // target over ~2 s); halving the steady-state count makes
    // the ramp shorter too. Density slider still scales linearly
    // so users on smaller screens or who want a denser swirl
    // can crank it back up.
    targetCount: (d, w, h) => Math.round((w * h) / 6000 * (d / 60)),
    spawn: (w, h) => {
      const ax = _wormholeAnchorX(w);
      const ay = _wormholeAnchorY(h);
      const ringMin = 150;
      const ringMax = Math.max(w, h) * 0.55;
      // Up to 6 attempts to land on-screen so cursor-at-edge
      // still produces a visible swirl.
      let x = 0, y = 0, angle = 0, dist = 0;
      for (let i = 0; i < 6; i++) {
        angle = Math.random() * Math.PI * 2;
        const t = Math.sqrt(Math.random());
        dist = ringMin + t * (ringMax - ringMin);
        x = ax + Math.cos(angle) * dist;
        y = ay + Math.sin(angle) * dist;
        if (x > 0 && x < w && y > 0 && y < h) break;
      }
      const ca = Math.cos(angle), sa = Math.sin(angle);
      // v1.6.1-beta hotfix9: initial velocities 3-4× the previous
      // values. User reported "way too weakly pulled in" — at 70
      // inward + 280 swirl, particles took ~10 s to traverse the
      // visible orbital field. Now ~3 s to spiral in.
      const inSpeed    = 250 + Math.random() * 200;
      const swirlSpeed = 500 + Math.random() * 300;
      // Periodic diagnostic so Lively-DevTools sessions can see
      // whether cursor tracking is alive. Throttled to one log
      // per 3 s.
      const _now = performance.now();
      if (_now - _wormholeDiagTs > 3000) {
        _wormholeDiagTs = _now;
        console.log("[wormhole] anchor=(" + ax.toFixed(0) + "," +
                    ay.toFixed(0) + ") cursor=(" + _cursorX + "," +
                    _cursorY + ")  — if cursor stays (0,0) Lively " +
                    "isn't forwarding pointer events. Enable " +
                    "Wallpaper Interaction in Lively, or check " +
                    "the cursor-pos callback.");
      }
      return {
        x: x, y: y,
        px: 0, py: 0,
        vx: -ca * inSpeed - sa * swirlSpeed,
        vy: -sa * inSpeed + ca * swirlSpeed,
        r: 1.5 + Math.random() * 2.5,
        hue: Math.random() < 0.5
          ? 210 + Math.random() * 50    // blues
          : 290 + Math.random() * 50,   // magenta / purples
        alpha: 0.75 + Math.random() * 0.25,
        // v1.7.2-beta: stagger lifespans so the cohort doesn't die
        // synchronously. Pre-fix every particle hit the 3 s hard
        // cap at the same time the moment they were spawned in a
        // burst (initial fill, cursor-move respawn) → visible mass
        // die-off + instant respawn = jerky. Each particle now starts
        // with a random -1.8..0 s head-start so the death timing is
        // spread across a ~2 s window — pop disappears gradually
        // instead of all at once.
        life: -Math.random() * 1.8,
        // maxLife stashed per-particle so the render fade-out reads
        // the same value the step path checks against.
        maxLife: 3.0,
      };
    },
    step: (p, dt, w, h) => {
      p.life += dt;
      p.px = p.x; p.py = p.y;
      const ax = _wormholeAnchorX(w);
      const ay = _wormholeAnchorY(h);
      const dx = ax - p.x;
      const dy = ay - p.y;
      const distSq = dx * dx + dy * dy;
      const dist = Math.sqrt(distSq) + 1;
      // v1.6.1-beta hotfix12: three independent kill paths so the
      // pool stays fresh when the cursor moves. Without these,
      // particles orbiting the OLD cursor location kept their
      // momentum after the user dragged the mouse, then slowly
      // spiralled toward the new anchor while NEW particles
      // spawned on top — visible as "old dots don't dissolve,
      // more keep coming".
      //   1) Inner event horizon — particles that reach the
      //      singularity get consumed. Tightened 32 → 24 so the
      //      central glow doesn't pile up.
      //   2) Outer escape — particles past this radius from the
      //      *current* anchor die. Was max(w,h)*1.6 = 8200 px on
      //      a 5120×1440 desktop (basically infinite); now
      //      diag(w,h)*0.5 = ~2660 px. Old-position orbiters get
      //      culled the moment cursor jumps.
      //   3) Hard lifespan — every particle dies after 3 s no
      //      matter what. Bounds the worst case if both above
      //      fail to trigger (e.g. cursor parked in centre +
      //      stable orbit at exactly the right radius).
      if (dist < 24) return false;                       // consumed
      if (dist > Math.hypot(w, h) * 0.5) return false;   // escaped
      if (p.life > p.maxLife) return false;              // expired
      // v1.6.1-beta hotfix9: hybrid pull. Inverse-square at the
      // close range for the classic black-hole feel, plus a
      // constant component that scales linearly outward so
      // far-out particles still get yanked hard. Previously
      // pure inverse-square meant a particle at 2000 px from
      // cursor felt 0.06 px/s² — slower than tectonic drift.
      const accel = 1500000 / distSq + 600;
      p.vx += (dx / dist) * accel * dt;
      p.vy += (dy / dist) * accel * dt;
      p.vx *= 0.997;
      p.vy *= 0.997;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      return true;
    },
    render: (ctx, p, tint) => {
      const ax = _wormholeAnchorX(window.innerWidth  || 1920);
      const ay = _wormholeAnchorY(window.innerHeight || 1080);
      const dx = ax - p.x;
      const dy = ay - p.y;
      const dist = Math.hypot(dx, dy);
      // Clamp intensity to [0, 1] — far particles fade smoothly,
      // close particles cap at full brightness. Reference 1200 px
      // keeps the far-out field visible on ultrawide displays.
      const intensity = Math.max(0,
        Math.min(1, 1.6 - dist / 1200));
      // v1.7.2-beta: end-of-life alpha fade. Without it the
      // particle popped out instantly when life > maxLife (or when
      // the inner/outer kill paths fired) — visible as the cohort
      // strobing. Last 0.4 s linear-ramps down to zero so the
      // particle dissolves gracefully into the swarm.
      const remaining = (p.maxLife || 3.0) - Math.max(0, p.life);
      const lifeFade = Math.max(0, Math.min(1, remaining / 0.4));
      const a = p.alpha * Math.max(0.55, intensity) * lifeFade;
      const color = tint
        ? rgbToRgba(tint, a)
        : "hsla(" + p.hue + ", 95%, " +
            (60 + intensity * 30) + "%, " + a + ")";
      // v1.6.1-beta hotfix9: each particle gets a soft glow halo
      // via canvas shadowBlur. Roughly doubles perceived size +
      // makes the swarm feel denser without renderering more
      // particles. shadowBlur is GPU-accelerated on Chromium so
      // 2400 particles × 8 px blur is still cheap.
      ctx.shadowColor = color;
      ctx.shadowBlur  = 6 + intensity * 6;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 + intensity * 0.8), 0, Math.PI * 2);
      ctx.fill();
      const trailLen = Math.abs(p.x - p.px) + Math.abs(p.y - p.py);
      if (p.px && trailLen > 1.5) {
        ctx.strokeStyle = color;
        ctx.lineWidth = p.r * 0.9;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(p.px, p.py);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
      // Drop the shadow before the next particle so other ambient
      // renderers / wallpaper layers aren't affected.
      ctx.shadowBlur = 0;
    },
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Pixelfx — mouse trail / hover glow / click ripple.
//
// Mouse position arrives via Lively's livelyCurrentCursorPos callback so
// the trail + glow work under click-through. Real click events (needed for
// ripples) only fire when the wallpaper has interaction enabled in
// Lively / WE.
// ─────────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────
// Audio-reactive glow layer.
//
// Whole-screen overlay driven by `lastAudio` (the FFT-bin array Lively /
// WE push into livelyAudioListener). Three modes:
//   pulse    — global brightness/scale modulated by overall amplitude
//   spectrum — 32 bars across the bottom of the screen
//   wave     — symmetric waveform across the centre line
//
// Reuses the existing `lastAudio` global the audio-spectrum widget already
// drains; no second listener subscription needed. RAF loop is parked when
// mode === "off" so the cost is zero on idle setups.
// ─────────────────────────────────────────────────────────────────────────────

const audioGlow = (function () {
  const canvas = document.getElementById("audioglow-canvas");
  const ctx = canvas.getContext("2d");
  let mode = "off";          // off / pulse / spectrum / wave
  let intensity = 60;        // 0..100, scales output amplitude
  let tinted = false;        // mirror the live glow-feed colour when true
  let raf = null;
  let viewW = 0, viewH = 0;
  // Smoothed amplitude for the pulse mode so the layer doesn't strobe on
  // every FFT update. Each tick lerps the running value toward the latest
  // sample.
  let smoothAmp = 0;
  // v1.6.1-beta R2.3: throttle this rAF chain to the global frame cap.
  // Pre-fix it ran at native rAF (60 Hz) and burned ~10 % GPU on a
  // 5120×1440 surface just from full-viewport clearRect+fill every
  // frame. Honouring RENDER_INTERVAL_MS (default 30 Hz) halves it.
  let _audioGlowLastTick = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    // v2.3.8-beta: audio-glow gains the same SCALE × DPR backing
    // buffer treatment ambient already had. The radial pulse / wide
    // spectrum bars / lerped wave are soft, so a 0.5×/0.75× scale is
    // visually indistinguishable but halves (or quarters) full-screen
    // clearRect+fill cost — a 5120×1440 canvas drops from 7.4 Mpx to
    // 1.85 Mpx in performance bucket. The CSS layout still spans
    // 100vw/100vh; the browser's compositor upscales the smaller
    // backing buffer with bilinear filtering on the way to the
    // monitor. Quality bucket keeps 1.0×.
    const SCALE = _qualityScale();
    const dpr = _qualityDpr();
    const effective = SCALE * dpr;
    canvas.width  = Math.max(1, Math.round(viewW * effective));
    canvas.height = Math.max(1, Math.round(viewH * effective));
    ctx.setTransform(effective, 0, 0, effective, 0, 0);
  }
  window.addEventListener("resize", () => { if (mode !== "off") resize(); });

  function start() {
    if (raf) return;
    resize();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    ctx.clearRect(0, 0, viewW, viewH);
    // v2.3.6-beta memory: collapse the backing buffer when off. See
    // the same comment in ambient.stop() — start() resizes back.
    canvas.width = 1; canvas.height = 1;
  }

  // Convert the FFT bin array into a per-band amplitude array of `n`
  // values in [0, 1]. Lively gives us 128 raw bins; we collapse to the
  // requested bucket count and clamp.
  function bucketise(audio, n) {
    const out = new Array(n).fill(0);
    if (!audio || !audio.length) return out;
    const len = audio.length;
    const perBucket = Math.max(1, Math.floor(len / n));
    for (let i = 0; i < n; i++) {
      let sum = 0;
      const start = i * perBucket;
      const end = Math.min(len, start + perBucket);
      for (let j = start; j < end; j++) sum += Math.max(0, audio[j]);
      out[i] = Math.min(1, sum / Math.max(1, end - start));
    }
    return out;
  }

  function colour() {
    return tinted ? currentTintCss : "rgb(106,176,255)";
  }

  function tick() {
    // v1.2.5: respect the global pause. Pre-v1.2.5 the audio-glow
    // canvas kept animating its spectrum / waveform / pulse even
    // when the tray manually paused (or fullscreen-pause kicked in),
    // because this tick missed the isPaused guard the other rAF
    // loops had.
    // v1.2.12: stop the rAF chain entirely on pause (was rescheduling
    // unconditionally, which kept WebView2's compositor warm at 60 Hz
    // on hidden / static-source layers). The window-level
    // "wallpaper-resume" listener at the bottom of this IIFE arms a
    // new chain when isPaused goes false.
    if (isPaused) { raf = null; return; }
    // v1.6.1-beta R2.3: gate by global frameRate. Audio-glow's
    // visual content (radial pulse, breathing wave, slow-bucketed
    // spectrum) is perceptually indistinguishable between 30 Hz and
    // 60 Hz, but the full-viewport clearRect+fill cost is linear in
    // frame rate. Drop frames when we're inside the interval.
    const now = performance.now();
    if (now - _audioGlowLastTick < RENDER_INTERVAL_MS) {
      raf = requestAnimationFrame(tick);
      return;
    }
    _audioGlowLastTick = now;
    ctx.clearRect(0, 0, viewW, viewH);
    const k = intensity / 100;
    if (mode === "pulse") {
      // Smooth the loudest band so the pulse breathes instead of strobing.
      let peak = 0;
      if (lastAudio && lastAudio.length) {
        for (let i = 0; i < lastAudio.length; i++) {
          const v = Math.max(0, lastAudio[i]);
          if (v > peak) peak = v;
        }
      }
      smoothAmp += (Math.min(1, peak) - smoothAmp) * 0.18;
      const radius = Math.max(viewW, viewH) * (0.4 + 0.35 * smoothAmp);
      const cx = viewW / 2, cy = viewH / 2;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      g.addColorStop(0,   "rgba(0,0,0,0)");
      g.addColorStop(0.5, "rgba(0,0,0,0)");
      g.addColorStop(0.85, fadedColour(colour(), 0.55 * k * smoothAmp));
      g.addColorStop(1,   fadedColour(colour(), 0));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, viewW, viewH);
    } else if (mode === "spectrum") {
      const bins = bucketise(lastAudio, 64);
      const gap = 2;
      const w = (viewW - gap * (bins.length - 1)) / bins.length;
      const baseH = Math.max(40, viewH * 0.18);
      ctx.fillStyle = colour();
      ctx.globalAlpha = 0.7 * k;
      for (let i = 0; i < bins.length; i++) {
        const h = bins[i] * baseH;
        const x = i * (w + gap);
        // Bars grow upward from the bottom edge.
        ctx.fillRect(x, viewH - h, w, h);
      }
      ctx.globalAlpha = 1;
    } else if (mode === "wave") {
      const samples = bucketise(lastAudio, 128);
      // Mirror around the horizontal centre line so the wave breathes
      // symmetrically. Stroke twice with mid-screen origin.
      const mid = viewH / 2;
      const amp = viewH * 0.25 * k;
      ctx.strokeStyle = colour();
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      for (let i = 0; i < samples.length; i++) {
        const x = (i / (samples.length - 1)) * viewW;
        const y = mid - samples[i] * amp;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.beginPath();
      for (let i = 0; i < samples.length; i++) {
        const x = (i / (samples.length - 1)) * viewW;
        const y = mid + samples[i] * amp;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    raf = requestAnimationFrame(tick);
  }

  function fadedColour(rgb, a) {
    // rgb is "rgb(r,g,b)"; splice in an explicit alpha for rgba().
    const m = /^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/.exec(rgb);
    if (!m) return rgb;
    return "rgba(" + m[1] + "," + m[2] + "," + m[3] + "," + a + ")";
  }

  // v1.2.12: rearm the rAF chain when the page comes off pause.
  window.addEventListener("wallpaper-resume", () => {
    if (mode !== "off" && !raf) {
      raf = requestAnimationFrame(tick);
    }
  });

  return {
    setMode(m) {
      mode = m || "off";
      if (mode === "off") { canvas.classList.remove("on"); stop(); }
      else                { canvas.classList.add("on");    start(); }
    },
    setIntensity(n) { intensity = Math.max(0, Math.min(100, n | 0)); },
    setTinted(b)    { tinted = !!b; },
  };
})();

const pixelfx = (function () {
  const canvas = document.getElementById("pixelfx-canvas");
  const ctx = canvas.getContext("2d");
  let mode = "off";
  let raf = null;
  let cursorX = -200, cursorY = -200;
  let trail = [];
  let ripples = [];
  let viewW = 0, viewH = 0;
  let lastT = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    // v2.3.8-beta: pixelfx now scales like ambient/audioglow — SCALE
    // × DPR. The cursor trail / glow / ripple / water sprites are
    // already soft (alpha gradients, blurred rings) so a 0.5× backing
    // buffer in performance bucket is visually indistinguishable but
    // quarters the clearRect+fill cost. The 30 Hz tick × 5120×1440
    // surface was the second-largest GPU-frame budget on multi-monitor
    // setups; this drops it to ~1.85 Mpx per frame in performance.
    const SCALE = _qualityScale();
    const dpr = _qualityDpr();
    const effective = SCALE * dpr;
    canvas.width  = Math.max(1, Math.round(viewW * effective));
    canvas.height = Math.max(1, Math.round(viewH * effective));
    ctx.setTransform(effective, 0, 0, effective, 0, 0);
  }
  window.addEventListener("resize", () => { if (mode !== "off") resize(); });
  // v1.6.1-beta R2.3: throttle to RENDER_INTERVAL_MS like ambient.
  let _pixelfxLastTick = 0;

  // v2.3.11-beta: pixelfx is single-select since the "all" mode was
  // removed. wantsTrail/wantsGlow/wantsRipple compare exactly one
  // value now — keeping the predicates instead of inlining `mode ===`
  // because the click handler + render branches read more clearly
  // with named tests.
  const active       = () => mode !== "off";
  const wantsTrail   = () => mode === "trail";
  const wantsGlow    = () => mode === "glow";
  const wantsRipple  = () => mode === "ripple";
  // v2.3.3-beta: "water" mode — full-viewport refraction-feel ripple
  // over the BG image. Distinct from `ripple` (which paints small
  // tint-colored rings as a click feedback layer): water spawns 3
  // staggered rings per click, white-blueish, big enough to cover the
  // screen, with a subtle alpha-sin wave along the radius for an
  // actual water-surface feel. Not part of `all` — it's too prominent
  // visually to layer on top of trail+glow+ripple at the same time.
  const wantsWater   = () => mode === "water";

  function start() {
    if (raf) return;
    resize();
    lastT = performance.now();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    trail = []; ripples = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // v2.3.6-beta memory: collapse the backing buffer when off.
    canvas.width = 1; canvas.height = 1;
  }

  function tick(now) {
    // v1.2.12: rAF cancel-on-pause. See ambient.tick for the long
    // form; resume listener at the bottom of this IIFE re-arms.
    if (isPaused) { raf = null; return; }
    if (!active()) return;
    raf = requestAnimationFrame(tick);
    // v1.6.1-beta R2.3: gate by global frame cap. Trail/glow/ripple
    // are smoothly animated (life-based fades + arc strokes), 30 Hz
    // is visually identical to 60 Hz.
    if (now - _pixelfxLastTick < RENDER_INTERVAL_MS) return;
    const dt = Math.min(0.1, (now - lastT) / 1000);
    lastT = now;
    _pixelfxLastTick = now;
    if (wantsTrail() && cursorX > -50 && cursorY > -50) {
      trail.push({ x: cursorX, y: cursorY, life: 0 });
      while (trail.length > 60) trail.shift();
    }
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life += dt;
      if (trail[i].life > 0.8) trail.splice(i, 1);
    }
    // v2.3.3-beta: cleanup threshold depends on mode — water mode
    // rings have a longer total lifetime (2.4 s of growth + up to
    // 0.3 s of stagger before they start) than the small tint-colored
    // ripple-mode rings (1.1 s).
    const ripCap = wantsWater() ? 2.7 : 1.1;
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].life += dt;
      if (ripples[i].life > ripCap) ripples.splice(i, 1);
    }
    ctx.clearRect(0, 0, viewW, viewH);
    const tintCss = currentTintCss;
    if (wantsTrail()) {
      for (const t of trail) {
        const a = (1 - t.life / 0.8) * 0.55;
        ctx.fillStyle = rgbToRgba(tintCss, a);
        ctx.beginPath();
        ctx.arc(t.x, t.y, 4 + (1 - t.life / 0.8) * 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    if (wantsGlow() && cursorX > -50) {
      const r = 110;
      const grad = ctx.createRadialGradient(cursorX, cursorY, 0, cursorX, cursorY, r);
      grad.addColorStop(0,   rgbToRgba(tintCss, 0.35));
      grad.addColorStop(0.5, rgbToRgba(tintCss, 0.10));
      grad.addColorStop(1,   rgbToRgba(tintCss, 0));
      // Fill a circular path instead of a 2r × 2r rect: some CEF
      // builds render the rect's corners visibly (despite the gradient
      // being alpha-0 past radius r), making the glow look square.
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (wantsRipple()) {
      for (const r of ripples) {
        const radius = r.life * 220;
        const a = (1 - r.life / 1.1) * 0.55;
        ctx.strokeStyle = rgbToRgba(tintCss, a);
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    // v2.3.10-beta: water mode no longer paints on this canvas. It
    // lives in the `water` IIFE below — an SVG feDisplacementMap on
    // #bg fed by a procedurally generated ring-front map. The old
    // outline-ring rendering looked like an inflated click ring,
    // not water.
  }

  document.addEventListener("click", (e) => {
    if (wantsRipple()) {
      ripples.push({ x: e.clientX, y: e.clientY, life: 0 });
    }
    if (wantsWater()) {
      // v2.3.10-beta: route water clicks to the displacement-based
      // water module. Two staggered splashes per click (the second
      // 0.12 s later) so a single click produces a visible follow-up
      // wave behind the leading front instead of one lonely ring.
      water.splash(e.clientX, e.clientY);
      water.splash(e.clientX, e.clientY, -0.12);
    }
  });

  // v1.2.12: rearm the rAF chain when the page comes off pause.
  window.addEventListener("wallpaper-resume", () => {
    if (mode !== "off" && !raf) {
      lastT = performance.now();
      raf = requestAnimationFrame(tick);
    }
  });

  return {
    setMode(m) {
      // v2.3.11-beta: "all" removed from the allow-list. Any persisted
      // "all" value falls through to "off" — user just picks a new
      // single mode from the Configurator tile grid.
      const allowed = ["off","trail","glow","ripple","water"];
      if (allowed.indexOf(m) < 0) m = "off";
      if (m === mode) return;
      mode = m;
      // v2.3.10-beta: water mode is owned by the `water` IIFE below;
      // it doesn't paint on the pixelfx canvas. So in water mode we
      // stop the pixelfx canvas (collapses backing buffer to 1×1,
      // saves the otherwise-idle full-viewport rAF tick) and hand
      // off to the water module. The document-level click handler
      // above is module-scope, so it stays bound in either state
      // and `wantsWater()` still routes splashes correctly.
      if (mode === "off" || mode === "water") {
        canvas.classList.remove("on");
        stop();
      } else {
        canvas.classList.add("on");
        start();
      }
      if (mode === "water") water.enable();
      else                  water.disable();
    },
    setCursor(x, y) { cursorX = x; cursorY = y; },
  };
})();

// v2.3.10-beta: pixelfx "water" mode — click-impulse-driven water
// surface via SVG feDisplacementMap on #bg. Each click spawns a
// ripple object; the rAF loop paints expanding ring fronts into a
// 256×256 displacement-map canvas (R/G channels encode radial
// outward-push then inward-pull across the front), and the SVG
// filter applies that displacement to the wallpaper image. Result
// reads as actual water bending the BG, not as an outline circle.
//
// Architecture mirrors the Liquid Distortion module (mousefx.ripple)
// which uses the same SVG-displacement technique for cursor-driven
// ripples — but with a separate filter ID so the two effects can
// run independently if a user enables both. Activity-gated
// toDataURL + setAttribute per gotcha-uncapped-raf-dpr: the map is
// only re-encoded while ripples are active, and the rAF chain
// self-stops when the last ripple expires.
const water = (function () {
  let raf = null;
  let mapCanvas = null;
  let mapCtx = null;
  let svgFilter = null;
  let feImg = null;
  // v2.3.12-beta: ref to the displacement-map element so we can
  // ramp its `scale` between 0 (no displacement) and ACTIVE_SCALE
  // (real ripple amplitude). Holding scale at 0 while no ripple is
  // in flight side-steps the async-load gap on feImage: even if
  // in2="map" is still loading the data: URL, scale=0 means the
  // displacement is zero regardless of map content, so the
  // wallpaper doesn't jump on filter-attach.
  let feDisp = null;
  let ripples = [];
  let enabled = false;
  let _lastTick = 0;
  const MAP_SIZE = 256;
  const ACTIVE_SCALE = 80;
  // Wave lifetime in seconds. Faster than the old outline rings
  // (was 2.4 s) because a propagating displacement front looks
  // best when it's clearly transient — long-lived ripples make the
  // BG feel permanently underwater.
  const RIPPLE_LIFE = 1.8;
  // Ring-band geometry in map-space (256 = full edge).
  const BAND_INNER = 8;   // displacement push-out band thickness
  const BAND_OUTER = 8;   // displacement pull-in band thickness
  // Per-side amplitude in encoded R/G (capped at ±127 from neutral 128).
  // 90 gives a strong but not cartoony bend; combined with the
  // feDisplacementMap scale="80" below the effective pixel
  // displacement is ~(90 - 128) * 80 / 255 ≈ 12 px peak — visibly
  // bends the BG without obvious tearing at the ring edge.
  const PEAK_AMP = 90;

  function ensureFilter() {
    if (svgFilter) return;
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.style.cssText = "position:absolute; width:0; height:0;";
    svg.setAttribute("aria-hidden", "true");
    // v2.3.12-beta: scale starts at 0. With a missing/loading
    // feImage input, feDisplacementMap multiplies the channel
    // value-to-offset by scale — at scale=0 the displacement is
    // exactly 0 px no matter what `in2` resolves to. So the BG
    // does NOT jump when the filter is first attached. We bump
    // scale to ACTIVE_SCALE in tick() when a ripple is in flight
    // and reset to 0 when the last ripple expires. The previous
    // pre-seed-feImage approach (v2.3.11-beta) didn't work
    // because the data: URL set via setAttribute("href") loads
    // asynchronously — the filter's first render still saw an
    // empty in2 and shifted the BG by -40 px until the load
    // finished a frame or two later.
    svg.innerHTML =
      '<defs><filter id="pixelfx-water-filter" x="0" y="0" width="100%" height="100%">' +
      '<feImage id="pixelfx-water-img" preserveAspectRatio="none"' +
      ' result="map" x="0" y="0" width="100%" height="100%"/>' +
      '<feDisplacementMap id="pixelfx-water-disp" in="SourceGraphic" in2="map"' +
      ' scale="0" xChannelSelector="R" yChannelSelector="G"/>' +
      '</filter></defs>';
    document.body.appendChild(svg);
    svgFilter = svg;
    feImg = svg.querySelector("#pixelfx-water-img");
    feDisp = svg.querySelector("#pixelfx-water-disp");
    mapCanvas = document.createElement("canvas");
    mapCanvas.width = MAP_SIZE; mapCanvas.height = MAP_SIZE;
    mapCtx = mapCanvas.getContext("2d");
    // Neutral grey = R=G=128. Used by tick() each frame as the
    // background of the active map; also pushed once here so the
    // feImage has SOMETHING to load (avoids a "broken image" icon
    // logged by some CEF builds), but the displacement scale=0
    // above is what actually prevents the activation jump.
    mapCtx.fillStyle = "rgb(128,128,0)";
    mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
    feImg.setAttribute("href", mapCanvas.toDataURL());
  }

  // Paint one ripple's ring front into the displacement map. The
  // ring is rendered as N angular slices, each a small radial
  // gradient with R/G encoding the local outward-push direction at
  // that angle. Inner edge of band = positive radial push (drags
  // BG pixels outward), outer edge = negative push (pulls them
  // back). Net visual: a narrow displacement band moves outward
  // from the click point — looks like a water surface wave.
  function paintRipple(r, maxRadiusPx) {
    const t = r.life / RIPPLE_LIFE;
    if (t < 0 || t >= 1) return;
    const radiusPx = t * maxRadiusPx;
    // Map-space radius (assumes viewport mapped onto MAP_SIZE square).
    const viewMax = Math.max(window.innerWidth, window.innerHeight);
    const radiusMap = radiusPx / viewMax * MAP_SIZE;
    // Falloff: peaks early, decays smoothly so far rings fade out.
    const ampScale = (1 - t) * (1 - t * 0.4);
    const amp = PEAK_AMP * ampScale;
    if (amp < 4 || radiusMap < 2) return;
    const cx = r.x / window.innerWidth  * MAP_SIZE;
    const cy = r.y / window.innerHeight * MAP_SIZE;
    // 48 angular slices = enough overlap so the ring reads as
    // continuous instead of a dotted polygon at small radii.
    const N = 48;
    const sliceR = Math.max(4, Math.min(BAND_INNER, BAND_OUTER) * 1.5);
    for (let i = 0; i < N; i++) {
      const theta = (i / N) * Math.PI * 2;
      const cosT = Math.cos(theta);
      const sinT = Math.sin(theta);
      // Outer ring slice — push outward (R/G shifted in radial dir).
      const ox = cx + (radiusMap + BAND_OUTER) * cosT;
      const oy = cy + (radiusMap + BAND_OUTER) * sinT;
      const oR = Math.max(0, Math.min(255, 128 + cosT * amp));
      const oG = Math.max(0, Math.min(255, 128 + sinT * amp));
      let grad = mapCtx.createRadialGradient(ox, oy, 0, ox, oy, sliceR);
      grad.addColorStop(0, "rgba(" + oR + "," + oG + ",0,0.9)");
      grad.addColorStop(1, "rgba(128,128,0,0)");
      mapCtx.fillStyle = grad;
      mapCtx.fillRect(ox - sliceR, oy - sliceR, sliceR * 2, sliceR * 2);
      // Inner ring slice — pull inward (R/G shifted opposite).
      const ix = cx + Math.max(0, radiusMap - BAND_INNER) * cosT;
      const iy = cy + Math.max(0, radiusMap - BAND_INNER) * sinT;
      const iR = Math.max(0, Math.min(255, 128 - cosT * amp));
      const iG = Math.max(0, Math.min(255, 128 - sinT * amp));
      grad = mapCtx.createRadialGradient(ix, iy, 0, ix, iy, sliceR);
      grad.addColorStop(0, "rgba(" + iR + "," + iG + ",0,0.9)");
      grad.addColorStop(1, "rgba(128,128,0,0)");
      mapCtx.fillStyle = grad;
      mapCtx.fillRect(ix - sliceR, iy - sliceR, sliceR * 2, sliceR * 2);
    }
  }

  function tick(now) {
    if (isPaused) { raf = null; return; }
    if (!enabled || ripples.length === 0) {
      // v2.3.12-beta: drop displacement scale to 0 BEFORE clearing
      // the map. Order matters — if we cleared the map first, the
      // filter would briefly render scale=ACTIVE_SCALE × neutral-map
      // which is fine, but setting scale=0 first means the very
      // next paint is provably a no-op regardless of map state.
      if (feDisp) feDisp.setAttribute("scale", "0");
      if (mapCtx) {
        mapCtx.fillStyle = "rgb(128,128,0)";
        mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
        feImg.setAttribute("href", mapCanvas.toDataURL());
      }
      raf = null;
      return;
    }
    raf = requestAnimationFrame(tick);
    if (now - _lastTick < RENDER_INTERVAL_MS) return;
    const dt = Math.min(0.1, (now - _lastTick) / 1000);
    _lastTick = now;

    // Step lifetimes; drop expired ripples.
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].life += dt;
      if (ripples[i].life > RIPPLE_LIFE) ripples.splice(i, 1);
    }

    // Clear map to neutral grey each frame (no decay blending —
    // gives a crisper wave front than a fade-trail).
    mapCtx.fillStyle = "rgb(128,128,0)";
    mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

    // Wave reach in CSS px: ~70 % of the viewport diagonal so the
    // ring crosses the full screen before fading out, but doesn't
    // wrap past the corners with full amplitude.
    const maxRadiusPx = Math.hypot(window.innerWidth, window.innerHeight) * 0.7;
    for (const r of ripples) paintRipple(r, maxRadiusPx);

    // Push displacement map to the SVG filter. toDataURL is the
    // memory-leak hot path Liquid Distortion documented in detail
    // (gotcha-uncapped-raf-dpr); here it's naturally gated by
    // ripple-presence — the tick early-returns + clears the map
    // once the last ripple expires.
    feImg.setAttribute("href", mapCanvas.toDataURL());
  }

  return {
    enable() {
      enabled = true;
      ensureFilter();
      document.body.classList.add("fx-pixelfx-water");
    },
    disable() {
      enabled = false;
      ripples = [];
      document.body.classList.remove("fx-pixelfx-water");
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      // v2.3.12-beta: drop scale to 0 on disable too. Strictly
      // redundant because the class removal detaches the filter,
      // but cheap belt-and-suspenders so a future caller that
      // applies the filter via a different CSS path doesn't pick
      // up a stale ACTIVE_SCALE.
      if (feDisp) feDisp.setAttribute("scale", "0");
      if (mapCtx) {
        mapCtx.fillStyle = "rgb(128,128,0)";
        mapCtx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
        if (feImg) feImg.setAttribute("href", mapCanvas.toDataURL());
      }
    },
    splash(x, y, initialLife) {
      if (!enabled) return;
      ripples.push({ x: x, y: y, life: initialLife || 0 });
      // v2.3.12-beta: scale goes 0 → ACTIVE_SCALE the moment a
      // ripple exists. tick() will paint the map this frame; if
      // we left scale at 0, the first painted ripple frame would
      // be a no-op. Setting scale before tick() runs guarantees
      // the displacement is active from the very first paint.
      if (feDisp) feDisp.setAttribute("scale", String(ACTIVE_SCALE));
      if (!raf) {
        _lastTick = performance.now();
        raf = requestAnimationFrame(tick);
      }
    },
  };
})();

// Note: no wallpaper-resume listener for the water module on
// purpose. If a user paused mid-ripple, dt-based propagation
// would jump ahead on resume (large accumulated dt), skipping
// the ring forward visibly. Letting in-flight ripples die at
// pause-time and requiring a new click to spawn the next wave
// gives cleaner behaviour than trying to continue.

// Lively pushes per-frame cursor coords via this callback when its
// host gives the wallpaper cursor data. Forwarded to both pixelfx
// (trail / glow / ripple) and parallax (3D background sway). When
// click-through is on and Lively doesn't push coords, the DOM
// mousemove listener below stays silent — users need to toggle
// "Wallpaper interaction" in Lively to get cursor-driven effects.
window.livelyCurrentCursorPos = function (x, y) {
  pixelfx.setCursor(x, y);
  parallax.setCursor(x, y);
  // v1.6.1-beta hotfix5: feed the module-level cursor vars so
  // ambient effects (Wormhole) + MouseFx (Spotlight / Chromatic
  // / Ripple) all see the live position. Previously my separate
  // _initCursorTracker IIFE registered ITS own
  // livelyCurrentCursorPos earlier in the file, but THIS
  // assignment overwrites it — so _cursorX / _cursorY stayed at
  // 0,0 forever and Wormhole particles spiralled into the
  // top-left corner instead of the cursor.
  _cursorX = x; _cursorY = y;
};

// DOM mousemove fallback — fires when Lively's "Wallpaper interaction"
// is enabled (no click-through), or when the wallpaper is otherwise
// reachable by real mouse events (Builder/Configurator preview, plain
// browser tab during development, Wallpaper Engine with interaction
// allowed).
document.addEventListener("mousemove", (e) => {
  pixelfx.setCursor(e.clientX, e.clientY);
  parallax.setCursor(e.clientX, e.clientY);
  // Same reason as above — keep the ambient + MouseFx cursor in
  // sync regardless of which input path delivered the event.
  _cursorX = e.clientX; _cursorY = e.clientY;
}, { passive: true });

// ─────────────────────────────────────────────────────────────────────────────
// 3D parallax — the background image translates a fraction of the cursor
// offset (relative to viewport centre), creating a fake-depth effect. Uses
// the same livelyCurrentCursorPos feed pixelfx already drains, so it works
// under Lively's click-through. Smooth lerp on a single RAF loop; disabled
// when strength is 0 to keep the rAF cost off the budget.
// ─────────────────────────────────────────────────────────────────────────────

const parallax = (function () {
  let strength = 0;
  let curX = 0, curY = 0;        // smoothed offset (CSS px)
  let cursorX = -1, cursorY = -1;
  let raf = null;
  // v1.6.1-beta R2.3: cap to RENDER_INTERVAL_MS. Lerp is dt-driven so
  // the smoothing speed stays the same; we just skip the one DOM
  // transform write per off-cap frame.
  let _lastTick = 0;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick(now) {
    // v1.2.12: rAF cancel-on-pause. See ambient.tick for rationale;
    // resume listener at the bottom of this IIFE re-arms. The
    // strength<=0 path lets the chain die too — setStrength()
    // handles start/stop based on strength so that's the canonical
    // restart vector when the user dials parallax back up.
    if (isPaused || strength <= 0) { raf = null; return; }
    raf = requestAnimationFrame(tick);
    if (now - _lastTick < RENDER_INTERVAL_MS) return;
    _lastTick = now;
    const w = window.innerWidth  || 1920;
    const h = window.innerHeight || 1080;
    // Normalised cursor offset from centre, clamped to [-1, 1].
    const nx = (cursorX < 0) ? 0 : Math.max(-1, Math.min(1, (cursorX - w * 0.5) / (w * 0.5)));
    const ny = (cursorY < 0) ? 0 : Math.max(-1, Math.min(1, (cursorY - h * 0.5) / (h * 0.5)));
    // Background translates AGAINST the cursor direction for the
    // "I'm looking around a 3D scene" feel. Negative sign on purpose.
    const targetX = -nx * strength;
    const targetY = -ny * strength;
    curX = lerp(curX, targetX, 0.08);
    curY = lerp(curY, targetY, 0.08);
    // Scale-up just enough that the worst-case translate (= ±strength on
    // either axis) doesn't reveal background past the image edges. Plus a
    // 2 % headroom for sub-pixel jitter. Computed once per frame so a
    // viewport resize re-scales correctly on the next tick.
    const ratio = Math.max(strength / (w * 0.5), strength / (h * 0.5));
    const scale = 1 + ratio + 0.02;
    bgEl.style.transform = "translate(" + curX.toFixed(1) + "px, " +
                                          curY.toFixed(1) + "px) scale(" +
                                          scale.toFixed(3) + ")";
  }

  function start() { if (!raf) raf = requestAnimationFrame(tick); }
  function stop()  {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    bgEl.style.transform = "";    // snap back to no-offset
    curX = 0; curY = 0;
  }

  // v1.2.12: rearm the rAF chain when the page comes off pause.
  window.addEventListener("wallpaper-resume", () => {
    if (strength > 0 && !raf) {
      raf = requestAnimationFrame(tick);
    }
  });

  return {
    setStrength(v) {
      v = isFinite(v) ? v : 0;
      strength = Math.max(0, Math.min(200, v));
      if (strength > 0) start(); else stop();
    },
    setCursor(x, y) { cursorX = x; cursorY = y; },
  };
})();

// ─────────────────────────────────────────────────────────────────────────────
// Sys-stat + audio widget types — appended to WIDGET_REGISTRY so the
// picker and tray-Add submenu pick them up without further wiring. Keep
// the keys in sync with WIDGET_DEFAULTS in bridge.py.
// ─────────────────────────────────────────────────────────────────────────────

WIDGET_REGISTRY["cpu-meter"] = {
  label: "CPU",
  icon: '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/>' +
        '<line x1="9" y1="2" x2="9" y2="6"/><line x1="15" y1="2" x2="15" y2="6"/>' +
        '<line x1="9" y1="18" x2="9" y2="22"/><line x1="15" y1="18" x2="15" y2="22"/>' +
        '<line x1="2" y1="9" x2="6" y2="9"/><line x1="2" y1="15" x2="6" y2="15"/>' +
        '<line x1="18" y1="9" x2="22" y2="9"/><line x1="18" y1="15" x2="22" y2="15"/></svg>',
  markup: () => '<div class="stat-head"><span>CPU</span><span></span></div>' +
                '<div class="stat-value">—</div><canvas></canvas>',
  tick: (rec) => {
    rec.el.querySelector(".stat-value").textContent =
      lastSysStats ? lastSysStats.cpu.toFixed(0) + "%" : "—";
    drawSparkline(rec.el.querySelector("canvas"),
                  sysstatsHistory.map((s) => s.cpu),
                  rec.opts.tintFromGlow ? currentTintCss : "rgb(106,176,255)",
                  100);
  },
  editOptions: null,
};

WIDGET_REGISTRY["ram-meter"] = {
  label: "RAM",
