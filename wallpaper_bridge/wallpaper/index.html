  try { window.wallpaperRegisterAudioListener((arr) => { lastAudio = arr; }); }
  catch (_) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Ambient effects — hand-rolled canvas particles with four presets.
//
// One generic engine; each preset declares targetCount / spawn / step /
// render. The engine ticks via requestAnimationFrame, scales the canvas
// to the viewport, and re-spawns up to the target count each frame.
// Tint pulls from currentTintCss (the glow-feed average that widgets
// already share) when the user enables it.
// ─────────────────────────────────────────────────────────────────────────────

const ambient = (function () {
  const canvas = document.getElementById("ambient-canvas");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let preset = "off";
  let tintEnabled = false;
  let density = 60;
  let raf = null;
  let lastT = 0;
  let viewW = 0, viewH = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", () => { if (preset !== "off") resize(); });

  function start() {
    if (raf) return;
    resize();
    lastT = performance.now();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    particles = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function tick(now) {
    raf = requestAnimationFrame(tick);
    if (isPaused) return;
    const dt = Math.min(0.1, (now - lastT) / 1000);
    lastT = now;
    const def = AMBIENT_PRESETS[preset];
    if (!def) return;
    const target = def.targetCount(density, viewW, viewH);
    while (particles.length < target) particles.push(def.spawn(viewW, viewH));
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!def.step(particles[i], dt, viewW, viewH)) particles.splice(i, 1);
    }
    ctx.clearRect(0, 0, viewW, viewH);
    const tint = tintEnabled ? currentTintCss : null;
    for (const p of particles) def.render(ctx, p, tint);
    // Optional post-pass for effects that need to draw across the
    // whole particle set (e.g. constellation's connecting lines).
    if (typeof def.after === "function") def.after(ctx, particles, tint);
  }

  return {
    setPreset(p) {
      if (!AMBIENT_PRESETS[p] && p !== "off") p = "off";
      if (p === preset) return;
      preset = p;
      if (p === "off") { canvas.classList.remove("on"); stop(); }
      else             { canvas.classList.add("on"); particles = []; start(); }
    },
    setTinted(on) { tintEnabled = !!on; },
    setDensity(d) {
      d = isFinite(d) ? d : 60;
      density = Math.max(1, Math.min(100, d));
    },
  };
})();

// rgbToRgba("rgb(R,G,B)", a) → "rgba(R,G,B,a)" — used by ambient renderers
// to fade particle colours without parsing the rgb() back into components.
function rgbToRgba(rgb, a) {
  return rgb.replace("rgb(", "rgba(").replace(")", "," + a + ")");
}

// Katakana half-width + digits + a handful of symbols, matching the
// classic Matrix-rain character pool. Defined here (above AMBIENT_PRESETS)
// so the Matrix preset's spawn() finds it at call time.
const MATRIX_CHARSET =
  "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン" +
  "0123456789" +
  "!@#$%&*?:;+=-";

const AMBIENT_PRESETS = {
  snow: {
    targetCount: (d, w, h) => Math.round((w * h) / 12000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w, y: -10 + Math.random() * -h * 0.3,
      vx: (Math.random() - 0.5) * 0.6,
      vy: 0.3 + Math.random() * 0.7,
      r:  1.2 + Math.random() * 2.5,
      alpha: 0.45 + Math.random() * 0.45,
      wobble: Math.random() * Math.PI * 2,
    }),
    step: (p, dt, w, h) => {
      p.wobble += dt * 1.5;
      p.x += (p.vx + Math.sin(p.wobble) * 0.4) * dt * 60;
      p.y += p.vy * dt * 60;
      if (p.y > h + 10) return false;
      if (p.x < -10)    p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(255,255,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  rain: {
    targetCount: (d, w, h) => Math.round((w * h) / 5000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w * 1.2,
      y: -20 - Math.random() * h * 0.4,
      vx: -1.4,
      vy: 9 + Math.random() * 6,
      length: 10 + Math.random() * 10,
      alpha: 0.25 + Math.random() * 0.35,
    }),
    step: (p, dt, w, h) => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      return (p.y < h + 30 && p.x > -30);
    },
    render: (ctx, p, tint) => {
      ctx.strokeStyle = tint ? rgbToRgba(tint, p.alpha)
                             : "rgba(180,200,255," + p.alpha + ")";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * p.length * 0.08, p.y - p.length);
      ctx.stroke();
    },
  },

  sparks: {
    targetCount: (d, w, h) => Math.round((w * h) / 18000 * (d / 60)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: h + 10,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.4 + Math.random() * 1.0),
      r: 1 + Math.random() * 1.8,
      hue: 30 + Math.random() * 30,
      alpha: 0.8 + Math.random() * 0.2,
      life: 0,
      maxLife: 4 + Math.random() * 6,
    }),
    step: (p, dt) => {
      p.life += dt;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy -= dt * 0.05;
      return p.life < p.maxLife && p.y > -10;
    },
    render: (ctx, p, tint) => {
      const fadeIn  = Math.min(1, p.life / 0.5);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.5);
      const a = p.alpha * Math.min(fadeIn, fadeOut);
      // Bright hot core + warm halo. Tint, if any, replaces the warm halo
      // while the core stays neutral white so sparks still pop visually.
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      grad.addColorStop(0, "rgba(255,255,255," + a + ")");
      const halo = tint
        ? rgbToRgba(tint, a * 0.6)
        : "hsla(" + p.hue + ", 95%, 60%, " + (a * 0.6) + ")";
      grad.addColorStop(0.45, halo);
      grad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r * 5, p.y - p.r * 5, p.r * 10, p.r * 10);
    },
  },

  // ── Constellation ──
  // Drifting particles + thin lines between any two that come within
  // a fade radius. Inspired by the classic CodePen connect-the-dots
  // effect (ykob/aBrjaR style, MIT). Implementation original, fits
  // our existing AMBIENT_PRESETS shape so the renderer below can
  // drive it like the rest.
  constellation: {
    targetCount: (d, w, h) => Math.round((w * h) / 24000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r:  1 + Math.random() * 1.8,
      alpha: 0.4 + Math.random() * 0.4,
    }),
    step: (p, dt, w, h) => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      // Bounce-wrap so particles stay distributed across the canvas.
      if (p.x < -10)      p.x = w + 10;
      if (p.x > w + 10)   p.x = -10;
      if (p.y < -10)      p.y = h + 10;
      if (p.y > h + 10)   p.y = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(180,210,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
    // Optional post-pass: draw connecting lines between nearby
    // particles. The driver loop (renderAmbient) calls this once per
    // frame after all the per-particle render calls; receives the
    // live particle array. ~O(n²) but with `targetCount` capped
    // around 60 it stays well under 1 ms per frame.
    after: (ctx, particles, tint) => {
      const MAX_DIST = 130;
      const MAX_DIST_SQ = MAX_DIST * MAX_DIST;
      const baseColor = tint
        ? rgbToRgba(tint, 1)
        : "rgba(180,210,255,1)";
      ctx.lineWidth = 0.7;
      for (let i = 0; i < particles.length; i++) {
        const a = particles[i];
        for (let j = i + 1; j < particles.length; j++) {
          const b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dSq = dx * dx + dy * dy;
          if (dSq > MAX_DIST_SQ) continue;
          // Stroke alpha falls off linearly with distance.
          const t = 1 - Math.sqrt(dSq) / MAX_DIST;
          const aOut = t * 0.35 * Math.min(a.alpha, b.alpha);
          // Pull alpha component out of baseColor (rgba(...,1))
          // and substitute the per-pair fade. Cheap regex; the
          // baseColor format is fixed above.
          ctx.strokeStyle = baseColor.replace(/[\d.]+\)$/, aOut.toFixed(3) + ")");
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    },
  },

  // ── Fireflies ──
  // Slow-drifting glowing dots that pulse on their own clock. Each
  // particle owns its own phase so the field doesn't strobe in sync.
  fireflies: {
    targetCount: (d, w, h) => Math.round((w * h) / 22000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.2,
      r:  1.5 + Math.random() * 2,
      hue: 50 + Math.random() * 35,            // yellow-green band
      phase: Math.random() * Math.PI * 2,
      phaseSpeed: 0.6 + Math.random() * 1.4,   // rad / s
    }),
    step: (p, dt, w, h) => {
      p.phase += dt * p.phaseSpeed;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      if (p.x < -10)    p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10)    p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
      return true;
    },
    render: (ctx, p, tint) => {
      const pulse = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(p.phase));
      const halo  = p.r * 6;
      const grad  = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, halo);
      const a     = pulse;
      const core  = "rgba(255,255,230," + (a * 0.9) + ")";
      const ring  = tint
        ? rgbToRgba(tint, a * 0.55)
        : "hsla(" + p.hue + ", 95%, 55%, " + (a * 0.55) + ")";
      grad.addColorStop(0,    core);
      grad.addColorStop(0.45, ring);
      grad.addColorStop(1,    "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - halo, p.y - halo, halo * 2, halo * 2);
    },
  },

  aurora: {
    targetCount: (d) => Math.max(3, Math.round(3 + d / 25)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: h * (0.2 + Math.random() * 0.5),
      vx: (Math.random() - 0.5) * 0.3,
      r: 180 + Math.random() * 160,
      hue: 130 + Math.random() * 140,
      life: 0,
      maxLife: 20 + Math.random() * 25,
    }),
    step: (p, dt, w) => {
      p.life += dt;
      p.x += p.vx * dt * 60;
      if (p.x < -p.r)     p.x = w + p.r;
      if (p.x > w + p.r)  p.x = -p.r;
      return p.life < p.maxLife;
    },
    render: (ctx, p) => {
      const fadeIn  = Math.min(1, p.life / 4);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 4);
      const a = 0.14 * Math.min(fadeIn, fadeOut);
      const hue = p.hue;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      grad.addColorStop(0,   "hsla(" + hue + ", 80%, 60%, " + a + ")");
      grad.addColorStop(0.5, "hsla(" + hue + ", 80%, 60%, " + (a * 0.4) + ")");
      grad.addColorStop(1,   "hsla(" + hue + ", 80%, 60%, 0)");
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
    },
  },

  // ── Plasma ──
  // Soft full-canvas hue-cycling blobs, lava-lamp style. Distinct from
  // aurora (which is confined to a horizontal band): plasma blobs roam
  // the whole canvas and own their hue clock so the colour wash is
  // always shifting.
  plasma: {
    targetCount: (d) => Math.max(4, Math.round(4 + d / 18)),
    spawn: (w, h) => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.2,
      r: 200 + Math.random() * 220,
      hue: Math.random() * 360,
      hueSpeed: 4 + Math.random() * 6,                 // deg / s
    }),
    step: (p, dt, w, h) => {
      p.hue = (p.hue + p.hueSpeed * dt) % 360;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      // Wrap so the blob count stays constant.
      if (p.x < -p.r)    p.x = w + p.r;
      if (p.x > w + p.r) p.x = -p.r;
      if (p.y < -p.r)    p.y = h + p.r;
      if (p.y > h + p.r) p.y = -p.r;
      return true;
    },
    render: (ctx, p, tint) => {
      const a = 0.18;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      if (tint) {
        // Tint mode: drop the hue cycle, run the user's glow colour at
        // varying alpha across the blob's radius. Still feels alive
        // thanks to the drift + size, but stays on-palette.
        grad.addColorStop(0,    rgbToRgba(tint, a));
        grad.addColorStop(0.55, rgbToRgba(tint, a * 0.35));
        grad.addColorStop(1,    rgbToRgba(tint, 0));
      } else {
        grad.addColorStop(0,    "hsla(" + p.hue + ", 80%, 60%, " + a + ")");
        grad.addColorStop(0.55, "hsla(" + p.hue + ", 80%, 60%, " + (a * 0.35) + ")");
        grad.addColorStop(1,    "hsla(" + p.hue + ", 80%, 60%, 0)");
      }
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
    },
  },

  // ── Vortex ──
  // Particles spawn near the canvas edge, spiral inward toward the
  // centre with rising angular velocity, and despawn once they get
  // close enough. New ones replace them at the perimeter to keep the
  // spiral alive. Each particle owns its angle / radius in polar
  // coords; cartesian only computed at render time.
  vortex: {
    targetCount: (d, w, h) => Math.round((w * h) / 14000 * (d / 60)),
    spawn: (w, h) => {
      const maxR = Math.hypot(w, h) * 0.55;
      return {
        cx: w / 2, cy: h / 2,
        angle:  Math.random() * Math.PI * 2,
        radius: maxR * (0.7 + Math.random() * 0.3),
        // Inward speed grows as the particle gets closer to centre,
        // giving the visual a real "drain" feel. Tuned so the average
        // particle lives ~10-15 s.
        inSpeed: 18 + Math.random() * 14,              // px / s, base
        spinSpeed: 0.4 + Math.random() * 0.4,          // rad / s at edge
        r: 1.2 + Math.random() * 1.4,
        alpha: 0.55 + Math.random() * 0.35,
      };
    },
    step: (p, dt, w, h) => {
      const maxR = Math.hypot(w, h) * 0.55;
      // Angular velocity scales inversely with radius so the inner
      // particles whip around faster — classic spiral feel.
      const r = Math.max(8, p.radius);
      p.angle  += p.spinSpeed * (maxR / r) * dt;
      p.radius -= p.inSpeed * dt;
      return p.radius > 6;
    },
    render: (ctx, p, tint) => {
      const x = p.cx + Math.cos(p.angle) * p.radius;
      const y = p.cy + Math.sin(p.angle) * p.radius;
      ctx.fillStyle = tint ? rgbToRgba(tint, p.alpha)
                           : "rgba(200,220,255," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  // ── Bubbles ──
  // Hollow-rim circles rising from the bottom with a slight horizontal
  // wobble; grow a touch as they rise. Stroked, not filled, so the
  // background image stays visible inside each bubble — useful as a
  // gentle texture overlay rather than a screen-tint.
  bubbles: {
    targetCount: (d, w, h) => Math.round((w * h) / 22000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  h + 10 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 0.6,
      vy: -(0.5 + Math.random() * 1.1),
      r:  4 + Math.random() * 8,
      growth: 0.4 + Math.random() * 0.6,               // px / s
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 1.2 + Math.random() * 1.4,
      alpha: 0.35 + Math.random() * 0.35,
    }),
    step: (p, dt, w, h) => {
      p.wobble += p.wobbleSpeed * dt;
      p.x += (p.vx + Math.sin(p.wobble) * 0.35) * dt * 60;
      p.y += p.vy * dt * 60;
      p.r += p.growth * dt;
      if (p.x < -20)    p.x = w + 20;
      if (p.x > w + 20) p.x = -20;
      return p.y > -p.r * 2;
    },
    render: (ctx, p, tint) => {
      // Fade out near the top so bubbles don't pop visibly when they
      // hit the despawn cutoff.
      const topFade = Math.min(1, p.y / 80);
      const a = p.alpha * topFade;
      const rim = tint ? rgbToRgba(tint, a)
                       : "rgba(200,225,255," + a + ")";
      ctx.strokeStyle = rim;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
      // Faint specular highlight on the upper-left, gives the bubble
      // shape some depth.
      ctx.strokeStyle = tint ? rgbToRgba(tint, a * 0.6)
                             : "rgba(255,255,255," + (a * 0.55) + ")";
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(p.x - p.r * 0.35, p.y - p.r * 0.35,
              p.r * 0.35, Math.PI * 0.9, Math.PI * 1.4);
      ctx.stroke();
    },
  },

  // ── Matrix ──
  // Falling columns of katakana + digits, classic green-on-black
  // "digital rain". Each "particle" is one column with its own
  // length / speed / character buffer. Tint mode swaps the green
  // palette for the user's glow colour while keeping the head row
  // bright white so the leading edge of each stream still pops.
  matrix: {
    targetCount: (d, w) => Math.round(w / 16 * (d / 60)),
    spawn: (w, h) => {
      const len = 8 + Math.floor(Math.random() * 18);
      const chars = new Array(len);
      for (let i = 0; i < len; i++) {
        chars[i] = MATRIX_CHARSET[(Math.random() * MATRIX_CHARSET.length) | 0];
      }
      return {
        // Snap x to a 16 px grid so columns align visually instead
        // of looking jittery.
        x: ((Math.random() * w / 16) | 0) * 16,
        y: -len * 16 - Math.random() * 200,
        speed: 100 + Math.random() * 160,
        chars,
        swapTimer: 0,
      };
    },
    step: (p, dt, w, h) => {
      p.y += p.speed * dt;
      p.swapTimer += dt;
      // Periodically swap a random char so the streams flicker like
      // the original effect. ~6 Hz feels right; too fast looks noisy.
      if (p.swapTimer > 0.16) {
        p.swapTimer = 0;
        const idx = (Math.random() * p.chars.length) | 0;
        p.chars[idx] = MATRIX_CHARSET[(Math.random() * MATRIX_CHARSET.length) | 0];
      }
      return p.y - p.chars.length * 16 < h + 20;
    },
    render: (ctx, p, tint) => {
      ctx.font = "13px Consolas, 'Courier New', monospace";
      ctx.textBaseline = "top";
      const n = p.chars.length;
      for (let i = 0; i < n; i++) {
        const y = p.y - i * 16;
        if (y < -16) continue;
        const fade = 1 - i / n;
        const a = fade * 0.85;
        if (i === 0) {
          // Head: always near-white so the stream's leading edge
          // reads against any background.
          ctx.fillStyle = "rgba(220,255,220," + a + ")";
        } else if (tint) {
          ctx.fillStyle = rgbToRgba(tint, a * 0.7);
        } else {
          ctx.fillStyle = "hsla(120, 80%, 55%, " + (a * 0.85) + ")";
        }
        ctx.fillText(p.chars[i], p.x, y);
      }
    },
  },

  // ── Starfield ──
  // Particles distributed in normalised [-1,1] × [-1,1] space at
  // varying z-depth; each frame z shrinks (zoom toward viewer),
  // projection puts them at increasing screen radius from the
  // centre with a streak trail. Despawn when z gets too small
  // (otherwise they'd grow infinitely large at the centre).
  //
  // cx / cy are baked in at spawn so the projection has a fixed
  // origin even on canvas resize — for the few seconds an average
  // star lives, that's accurate enough.
  starfield: {
    targetCount: (d, w, h) => Math.round((w * h) / 9000 * (d / 60)),
    spawn: (w, h) => ({
      cx: w / 2, cy: h / 2,
      // Bias spawn away from dead-centre so new stars don't pop
      // into existence visibly close to the projection origin.
      nx: (Math.random() - 0.5) * 2 + (Math.random() < 0.5 ? -0.15 : 0.15),
      ny: (Math.random() - 0.5) * 2 + (Math.random() < 0.5 ? -0.15 : 0.15),
      z: 2 + Math.random() * 5,
      speed: 0.5 + Math.random() * 0.5,
      focal: Math.min(w, h) * 0.6,
    }),
    step: (p, dt) => {
      p.z -= p.speed * dt;
      return p.z > 0.15;
    },
    render: (ctx, p, tint) => {
      const px = p.cx + p.nx / p.z * p.focal;
      const py = p.cy + p.ny / p.z * p.focal;
      const r = Math.max(0.4, 2.2 / p.z);
      const a = Math.min(1, (6 - p.z) / 5);
      const color = tint ? rgbToRgba(tint, a) : "rgba(220,235,255," + a + ")";
      // Streak: project at z+frame to get the "previous" position so
      // the star draws as a short trail rather than a pinpoint, which
      // is the trick that sells the hyperspace illusion.
      const prevZ = p.z + p.speed * 0.05;
      const prevPx = p.cx + p.nx / prevZ * p.focal;
      const prevPy = p.cy + p.ny / prevZ * p.focal;
      ctx.strokeStyle = tint ? rgbToRgba(tint, a * 0.5)
                             : "rgba(220,235,255," + (a * 0.5) + ")";
      ctx.lineWidth = r * 0.7;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(prevPx, prevPy);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    },
  },

  // ── Lightning ──
  // Brief flashing branched arcs. Each "particle" is one bolt event:
  // a jagged polyline generated via midpoint displacement plus a
  // life-clock that drives the bright-flash-then-fade envelope.
  // shadowBlur gives the bolt its glow halo; reset after each draw
  // so the blur doesn't leak into the next preset's render path.
  lightning: {
    targetCount: (d) => Math.max(1, Math.round(1 + d / 50)),
    spawn: (w, h) => {
      const startX = Math.random() * w;
      const endX = startX + (Math.random() - 0.5) * w * 0.7;
      const endY = h * (0.4 + Math.random() * 0.5);
      // Midpoint-displacement path: start with two endpoints, halve
      // each segment 4× to get a jagged 17-point polyline. Branch
      // jitter shrinks with depth so the macro shape stays close to
      // a straight bolt while micro-segments wobble.
      let pts = [{ x: startX, y: 0 }, { x: endX, y: endY }];
      for (let depth = 0; depth < 4; depth++) {
        const next = [pts[0]];
        const jitter = 35 / (depth + 1);
        for (let i = 0; i < pts.length - 1; i++) {
          const a = pts[i], b = pts[i + 1];
          next.push({
            x: (a.x + b.x) / 2 + (Math.random() - 0.5) * jitter,
            y: (a.y + b.y) / 2 + (Math.random() - 0.5) * jitter,
          });
          next.push(b);
        }
        pts = next;
      }
      return {
        path: pts,
        life: 0,
        flashDur: 0.06 + Math.random() * 0.08,
        maxLife: 0.55 + Math.random() * 0.55,
      };
    },
    step: (p, dt) => {
      p.life += dt;
      return p.life < p.maxLife;
    },
    render: (ctx, p, tint) => {
      // Two-phase envelope: hot flash for the first flashDur seconds,
      // then linear fade. Squaring the fade portion makes the tail
      // drop off faster than a linear ramp — closer to a real arc's
      // afterglow.
      let intensity;
      if (p.life < p.flashDur) {
        intensity = 1;
      } else {
        const t = (p.life - p.flashDur) / (p.maxLife - p.flashDur);
        intensity = Math.max(0, 1 - t);
        intensity *= intensity;
      }
      if (intensity <= 0.01) return;
      const halo = tint || "rgb(180,220,255)";
      ctx.save();
      ctx.shadowColor = halo;
      ctx.shadowBlur = 14 * intensity;
      ctx.strokeStyle = "rgba(255,255,255," + intensity + ")";
      ctx.lineWidth = 1.6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (let i = 0; i < p.path.length; i++) {
        const pt = p.path[i];
        if (i === 0) ctx.moveTo(pt.x, pt.y);
        else ctx.lineTo(pt.x, pt.y);
      }
      ctx.stroke();
      ctx.restore();
    },
  },

  // ── Waves ──
  // Multiple sinusoidal horizontal lines flowing across the canvas
  // at slightly different speeds, amplitudes and phases. Each
  // "particle" is one line; the renderer samples it as a polyline
  // across canvas width every frame. Soft alpha so lines blend
  // into each other where they overlap.
  waves: {
    targetCount: (d) => Math.max(3, Math.round(3 + d / 20)),
    spawn: (w, h) => ({
      yBase: h * (0.15 + Math.random() * 0.7),
      amp:   30 + Math.random() * 80,
      freq:  0.003 + Math.random() * 0.005,    // cycles per px
      speed: 0.4 + Math.random() * 0.7,        // phase advance / sec
      phase: Math.random() * Math.PI * 2,
      thick: 1.5 + Math.random() * 1.5,
      alpha: 0.25 + Math.random() * 0.35,
    }),
    step: (p, dt) => {
      p.phase += p.speed * dt;
      return true;     // waves don't despawn
    },
    render: (ctx, p, tint) => {
      const w = ctx.canvas.width / (window.devicePixelRatio || 1);
      ctx.strokeStyle = tint
        ? rgbToRgba(tint, p.alpha)
        : "rgba(120, 180, 255, " + p.alpha + ")";
      ctx.lineWidth = p.thick;
      ctx.lineCap = "round";
      ctx.beginPath();
      // Sample every 4 px — fine enough that the curve reads as
      // smooth at 1080p / 1440p, coarse enough to keep per-frame
      // cost negligible. lineJoin handles the segment smoothing.
      const STEP = 4;
      for (let x = 0; x <= w; x += STEP) {
        const y = p.yBase + Math.sin(x * p.freq + p.phase) * p.amp;
        if (x === 0) ctx.moveTo(x, y);
        else         ctx.lineTo(x, y);
      }
      ctx.stroke();
    },
  },

  // ── Ripples ──
  // Concentric expanding rings, like water-surface ripples after a
  // drop. Each particle is one ripple: a centre point + a radius
  // that grows over time, with the stroke fading out as the radius
  // increases. Despawn when alpha hits zero so the field doesn't
  // fill up with invisible rings.
  ripples: {
    targetCount: (d) => Math.max(2, Math.round(d / 25)),
    spawn: (w, h) => ({
      x:    Math.random() * w,
      y:    Math.random() * h,
      r:    0,
      vr:   80 + Math.random() * 60,           // radius growth (px / sec)
      maxR: 200 + Math.random() * 180,
      thick: 1.2 + Math.random() * 1.0,
    }),
    step: (p, dt) => {
      p.r += p.vr * dt;
      return p.r < p.maxR;
    },
    render: (ctx, p, tint) => {
      // Stroke alpha fades from 0.55 at birth to 0 at maxR; the
      // squared falloff makes the ring's afterglow taper rather
      // than fading linearly.
      const t = 1 - p.r / p.maxR;
      const a = t * t * 0.55;
      ctx.strokeStyle = tint
        ? rgbToRgba(tint, a)
        : "rgba(180, 220, 255, " + a + ")";
      ctx.lineWidth = p.thick;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.stroke();
    },
  },

  // ── Flowfield ──
  // Particles drifting through a smooth 2D Perlin-ish noise vector
  // field. Each frame the particle's velocity is steered toward
  // the noise direction at its current position, producing the
  // organic swirling-stream pattern that flow-field pens are known
  // for. Cheap pseudo-noise (sin/cos combo) — no dependency.
  flowfield: {
    targetCount: (d, w, h) => Math.round((w * h) / 6000 * (d / 60)),
    spawn: (w, h) => ({
      x:  Math.random() * w,
      y:  Math.random() * h,
      vx: 0, vy: 0,
      r:  0.8 + Math.random() * 1.0,
      alpha: 0.35 + Math.random() * 0.3,
      life: 0,
      maxLife: 6 + Math.random() * 8,
    }),
    step: (p, dt, w, h) => {
      p.life += dt;
      // Cheap noise: sample two trig functions at scaled coords to
      // get an angle. Phase shifts make X and Y components
      // independent enough for the field to swirl rather than
      // align. Not true Perlin but visually indistinguishable for
      // this use case.
      const FREQ = 0.004;
      const T = performance.now() * 0.00008;
      const angle = Math.sin(p.x * FREQ + T) * Math.PI
                  + Math.cos(p.y * FREQ - T * 1.3) * Math.PI;
      // Lerp the velocity toward the noise direction so trails
      // curve smoothly instead of snapping each frame.
      const targetVx = Math.cos(angle) * 50;
      const targetVy = Math.sin(angle) * 50;
      p.vx += (targetVx - p.vx) * 0.04;
      p.vy += (targetVy - p.vy) * 0.04;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      // Despawn off-screen or end-of-life.
      if (p.x < -20 || p.x > w + 20 || p.y < -20 || p.y > h + 20) return false;
      return p.life < p.maxLife;
    },
    render: (ctx, p, tint) => {
      // Subtle birth + death fade so respawning particles don't
      // pop in and dying ones don't snap out.
      const fadeIn  = Math.min(1, p.life / 0.6);
      const fadeOut = Math.min(1, (p.maxLife - p.life) / 1.2);
      const a = p.alpha * Math.min(fadeIn, fadeOut);
      ctx.fillStyle = tint
        ? rgbToRgba(tint, a)
        : "rgba(200, 220, 255, " + a + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    },
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Pixelfx — mouse trail / hover glow / click ripple.
//
// Mouse position arrives via Lively's livelyCurrentCursorPos callback so
// the trail + glow work under click-through. Real click events (needed for
// ripples) only fire when the wallpaper has interaction enabled in
// Lively / WE.
// ─────────────────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────────────────
// Audio-reactive glow layer.
//
// Whole-screen overlay driven by `lastAudio` (the FFT-bin array Lively /
// WE push into livelyAudioListener). Three modes:
//   pulse    — global brightness/scale modulated by overall amplitude
//   spectrum — 32 bars across the bottom of the screen
//   wave     — symmetric waveform across the centre line
//
// Reuses the existing `lastAudio` global the audio-spectrum widget already
// drains; no second listener subscription needed. RAF loop is parked when
// mode === "off" so the cost is zero on idle setups.
// ─────────────────────────────────────────────────────────────────────────────

const audioGlow = (function () {
  const canvas = document.getElementById("audioglow-canvas");
  const ctx = canvas.getContext("2d");
  let mode = "off";          // off / pulse / spectrum / wave
  let intensity = 60;        // 0..100, scales output amplitude
  let tinted = false;        // mirror the live glow-feed colour when true
  let raf = null;
  let viewW = 0, viewH = 0;
  // Smoothed amplitude for the pulse mode so the layer doesn't strobe on
  // every FFT update. Each tick lerps the running value toward the latest
  // sample.
  let smoothAmp = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", () => { if (mode !== "off") resize(); });

  function start() {
    if (raf) return;
    resize();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    ctx.clearRect(0, 0, viewW, viewH);
  }

  // Convert the FFT bin array into a per-band amplitude array of `n`
  // values in [0, 1]. Lively gives us 128 raw bins; we collapse to the
  // requested bucket count and clamp.
  function bucketise(audio, n) {
    const out = new Array(n).fill(0);
    if (!audio || !audio.length) return out;
    const len = audio.length;
    const perBucket = Math.max(1, Math.floor(len / n));
    for (let i = 0; i < n; i++) {
      let sum = 0;
      const start = i * perBucket;
      const end = Math.min(len, start + perBucket);
      for (let j = start; j < end; j++) sum += Math.max(0, audio[j]);
      out[i] = Math.min(1, sum / Math.max(1, end - start));
    }
    return out;
  }

  function colour() {
    return tinted ? currentTintCss : "rgb(106,176,255)";
  }

  function tick() {
    ctx.clearRect(0, 0, viewW, viewH);
    const k = intensity / 100;
    if (mode === "pulse") {
      // Smooth the loudest band so the pulse breathes instead of strobing.
      let peak = 0;
      if (lastAudio && lastAudio.length) {
        for (let i = 0; i < lastAudio.length; i++) {
          const v = Math.max(0, lastAudio[i]);
          if (v > peak) peak = v;
        }
      }
      smoothAmp += (Math.min(1, peak) - smoothAmp) * 0.18;
      const radius = Math.max(viewW, viewH) * (0.4 + 0.35 * smoothAmp);
      const cx = viewW / 2, cy = viewH / 2;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      g.addColorStop(0,   "rgba(0,0,0,0)");
      g.addColorStop(0.5, "rgba(0,0,0,0)");
      g.addColorStop(0.85, fadedColour(colour(), 0.55 * k * smoothAmp));
      g.addColorStop(1,   fadedColour(colour(), 0));
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, viewW, viewH);
    } else if (mode === "spectrum") {
      const bins = bucketise(lastAudio, 64);
      const gap = 2;
      const w = (viewW - gap * (bins.length - 1)) / bins.length;
      const baseH = Math.max(40, viewH * 0.18);
      ctx.fillStyle = colour();
      ctx.globalAlpha = 0.7 * k;
      for (let i = 0; i < bins.length; i++) {
        const h = bins[i] * baseH;
        const x = i * (w + gap);
        // Bars grow upward from the bottom edge.
        ctx.fillRect(x, viewH - h, w, h);
      }
      ctx.globalAlpha = 1;
    } else if (mode === "wave") {
      const samples = bucketise(lastAudio, 128);
      // Mirror around the horizontal centre line so the wave breathes
      // symmetrically. Stroke twice with mid-screen origin.
      const mid = viewH / 2;
      const amp = viewH * 0.25 * k;
      ctx.strokeStyle = colour();
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      for (let i = 0; i < samples.length; i++) {
        const x = (i / (samples.length - 1)) * viewW;
        const y = mid - samples[i] * amp;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.beginPath();
      for (let i = 0; i < samples.length; i++) {
        const x = (i / (samples.length - 1)) * viewW;
        const y = mid + samples[i] * amp;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    raf = requestAnimationFrame(tick);
  }

  function fadedColour(rgb, a) {
    // rgb is "rgb(r,g,b)"; splice in an explicit alpha for rgba().
    const m = /^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/.exec(rgb);
    if (!m) return rgb;
    return "rgba(" + m[1] + "," + m[2] + "," + m[3] + "," + a + ")";
  }

  return {
    setMode(m) {
      mode = m || "off";
      if (mode === "off") { canvas.classList.remove("on"); stop(); }
      else                { canvas.classList.add("on");    start(); }
    },
    setIntensity(n) { intensity = Math.max(0, Math.min(100, n | 0)); },
    setTinted(b)    { tinted = !!b; },
  };
})();

const pixelfx = (function () {
  const canvas = document.getElementById("pixelfx-canvas");
  const ctx = canvas.getContext("2d");
  let mode = "off";
  let raf = null;
  let cursorX = -200, cursorY = -200;
  let trail = [];
  let ripples = [];
  let viewW = 0, viewH = 0;
  let lastT = 0;

  function resize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.round(viewW * dpr);
    canvas.height = Math.round(viewH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", () => { if (mode !== "off") resize(); });

  const active       = () => mode !== "off";
  const wantsTrail   = () => mode === "trail"  || mode === "all";
  const wantsGlow    = () => mode === "glow"   || mode === "all";
  const wantsRipple  = () => mode === "ripple" || mode === "all";

  function start() {
    if (raf) return;
    resize();
    lastT = performance.now();
    raf = requestAnimationFrame(tick);
  }
  function stop() {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    trail = []; ripples = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function tick(now) {
    raf = requestAnimationFrame(tick);
    if (isPaused || !active()) return;
    const dt = Math.min(0.1, (now - lastT) / 1000);
    lastT = now;
    if (wantsTrail() && cursorX > -50 && cursorY > -50) {
      trail.push({ x: cursorX, y: cursorY, life: 0 });
      while (trail.length > 60) trail.shift();
    }
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life += dt;
      if (trail[i].life > 0.8) trail.splice(i, 1);
    }
    for (let i = ripples.length - 1; i >= 0; i--) {
      ripples[i].life += dt;
      if (ripples[i].life > 1.1) ripples.splice(i, 1);
    }
    ctx.clearRect(0, 0, viewW, viewH);
    const tintCss = currentTintCss;
    if (wantsTrail()) {
      for (const t of trail) {
        const a = (1 - t.life / 0.8) * 0.55;
        ctx.fillStyle = rgbToRgba(tintCss, a);
        ctx.beginPath();
        ctx.arc(t.x, t.y, 4 + (1 - t.life / 0.8) * 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    if (wantsGlow() && cursorX > -50) {
      const r = 110;
      const grad = ctx.createRadialGradient(cursorX, cursorY, 0, cursorX, cursorY, r);
      grad.addColorStop(0,   rgbToRgba(tintCss, 0.35));
      grad.addColorStop(0.5, rgbToRgba(tintCss, 0.10));
      grad.addColorStop(1,   rgbToRgba(tintCss, 0));
      // Fill a circular path instead of a 2r × 2r rect: some CEF
      // builds render the rect's corners visibly (despite the gradient
      // being alpha-0 past radius r), making the glow look square.
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cursorX, cursorY, r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (wantsRipple()) {
      for (const r of ripples) {
        const radius = r.life * 220;
        const a = (1 - r.life / 1.1) * 0.55;
        ctx.strokeStyle = rgbToRgba(tintCss, a);
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  document.addEventListener("click", (e) => {
    if (!wantsRipple()) return;
    ripples.push({ x: e.clientX, y: e.clientY, life: 0 });
  });

  return {
    setMode(m) {
      const allowed = ["off","trail","glow","ripple","all"];
      if (allowed.indexOf(m) < 0) m = "off";
      if (m === mode) return;
      mode = m;
      if (mode === "off") { canvas.classList.remove("on"); stop(); }
      else                { canvas.classList.add("on");    start(); }
    },
    setCursor(x, y) { cursorX = x; cursorY = y; },
  };
})();

// Lively pushes per-frame cursor coords via this callback when its
// host gives the wallpaper cursor data. Forwarded to both pixelfx
// (trail / glow / ripple) and parallax (3D background sway). When
// click-through is on and Lively doesn't push coords, the DOM
// mousemove listener below stays silent — users need to toggle
// "Wallpaper interaction" in Lively to get cursor-driven effects.
window.livelyCurrentCursorPos = function (x, y) {
  pixelfx.setCursor(x, y);
  parallax.setCursor(x, y);
};

// DOM mousemove fallback — fires when Lively's "Wallpaper interaction"
// is enabled (no click-through), or when the wallpaper is otherwise
// reachable by real mouse events (Builder/Configurator preview, plain
// browser tab during development, Wallpaper Engine with interaction
// allowed).
document.addEventListener("mousemove", (e) => {
  pixelfx.setCursor(e.clientX, e.clientY);
  parallax.setCursor(e.clientX, e.clientY);
}, { passive: true });

// ─────────────────────────────────────────────────────────────────────────────
// 3D parallax — the background image translates a fraction of the cursor
// offset (relative to viewport centre), creating a fake-depth effect. Uses
// the same livelyCurrentCursorPos feed pixelfx already drains, so it works
// under Lively's click-through. Smooth lerp on a single RAF loop; disabled
// when strength is 0 to keep the rAF cost off the budget.
// ─────────────────────────────────────────────────────────────────────────────

const parallax = (function () {
  let strength = 0;
  let curX = 0, curY = 0;        // smoothed offset (CSS px)
  let cursorX = -1, cursorY = -1;
  let raf = null;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function tick() {
    raf = requestAnimationFrame(tick);
    if (isPaused || strength <= 0) return;
    const w = window.innerWidth  || 1920;
    const h = window.innerHeight || 1080;
    // Normalised cursor offset from centre, clamped to [-1, 1].
    const nx = (cursorX < 0) ? 0 : Math.max(-1, Math.min(1, (cursorX - w * 0.5) / (w * 0.5)));
    const ny = (cursorY < 0) ? 0 : Math.max(-1, Math.min(1, (cursorY - h * 0.5) / (h * 0.5)));
    // Background translates AGAINST the cursor direction for the
    // "I'm looking around a 3D scene" feel. Negative sign on purpose.
    const targetX = -nx * strength;
    const targetY = -ny * strength;
    curX = lerp(curX, targetX, 0.08);
    curY = lerp(curY, targetY, 0.08);
    // Scale-up just enough that the worst-case translate (= ±strength on
    // either axis) doesn't reveal background past the image edges. Plus a
    // 2 % headroom for sub-pixel jitter. Computed once per frame so a
    // viewport resize re-scales correctly on the next tick.
    const ratio = Math.max(strength / (w * 0.5), strength / (h * 0.5));
    const scale = 1 + ratio + 0.02;
    bgEl.style.transform = "translate(" + curX.toFixed(1) + "px, " +
                                          curY.toFixed(1) + "px) scale(" +
                                          scale.toFixed(3) + ")";
  }

  function start() { if (!raf) raf = requestAnimationFrame(tick); }
  function stop()  {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    bgEl.style.transform = "";    // snap back to no-offset
    curX = 0; curY = 0;
  }

  return {
    setStrength(v) {
      v = isFinite(v) ? v : 0;
      strength = Math.max(0, Math.min(200, v));
      if (strength > 0) start(); else stop();
    },
    setCursor(x, y) { cursorX = x; cursorY = y; },
  };
})();

  icon: '<svg viewBox="0 0 24 24"><rect x="2" y="8" width="20" height="8" rx="1"/>' +
        '<line x1="6" y1="8" x2="6" y2="16"/><line x1="10" y1="8" x2="10" y2="16"/>' +

                '<div class="stat-value">—</div><canvas></canvas>',
  tick: (rec) => {
    rec.el.querySelector(".stat-value").textContent =
      lastSysStats ? lastSysStats.ram.toFixed(0) + "%" : "—";
    drawSparkline(rec.el.querySelector("canvas"),
                  sysstatsHistory.map((s) => s.ram),
                  rec.opts.tintFromGlow ? currentTintCss : "rgb(157,221,153)",
                  100);
  },
  editOptions: null,
};

// Note: Network widget removed before v0.6.0-beta release after testing —
// flaky readings on some Windows network-interface combos and the dual-line
// chart layout needed more work. The bridge still pushes netDown / netUp in
// the sysstats frame so a future iteration can bring it back without a
// protocol change.

// Hardware sensor — generic reader for LibreHardwareMonitor's full
// sensor tree (CPU/GPU temps, fan RPMs, voltages, drive temps, power
// readings). Sensor path is picked in the Configurator's options modal
// from /hwmon/sensors which lists everything LHM is currently
// reporting. Falls back to "--" with the configured label when LHM is
// offline or the chosen sensor has disappeared.
WIDGET_REGISTRY["hardware-sensor"] = {
  label: "Hardware Sensor",
  icon: '<svg viewBox="0 0 24 24"><path d="M4 4h6v6H4z"/>' +
        '<path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/>' +
        '<path d="M14 14h6v6h-6z"/></svg>',
  // Markup mirrors cpu-meter / ram-meter: header gets just the label
  // (matching the all-caps small style); the value row holds both the
  // number and the unit so the unit reads as a suffix on the value
  // (`23 %`, `42 °C`) instead of squatting in the header next to the
  // label like a typo.
  markup: () => '<div class="stat-head"><span class="hwmon-label">Hardware</span></div>' +
                '<div class="stat-value">' +
                  '<span class="hwmon-value">—</span>' +
                  '<span class="hwmon-unit"></span>' +
                '</div><canvas></canvas>',
  tick: (rec) => {
    const path = rec.opts.sensorPath || "";
    const entry = (lastSysStats && lastSysStats.hwmon)
      ? lastSysStats.hwmon[path]
      : null;
    // Label: explicit override > last segment of path > generic
    // fallback. The path uses " / " as separator (see
    // HwMonPoller._flatten), so .pop() of the split gives the leaf.
    // Strip a trailing unit fragment that some LHM sensor names
    // carry (e.g. "GPU Total Load %", "CPU Package °C") so we don't
    // double-render the unit once in the label AND once after the
    // value. Conservative regex — only the common suffix shapes.
    let leaf = path ? path.split(" / ").pop() : "Hardware";
    leaf = leaf.replace(/\s*[\(\[]?\s*(%|°C|°F|RPM|V|W|mV|MHz|GHz|GB|MB|KB)\s*[\)\]]?\s*$/i, "").trim();
    const label = rec.opts.label || leaf || "Hardware";
    rec.el.querySelector(".hwmon-label").textContent = label;
    if (entry && typeof entry.value === "number") {
      const decimals = (rec.opts.decimals == null) ? 1 : (rec.opts.decimals | 0);
      rec.el.querySelector(".hwmon-value").textContent =
        entry.value.toFixed(decimals);
      rec.el.querySelector(".hwmon-unit").textContent = entry.unit || "";
    } else {
      rec.el.querySelector(".hwmon-value").textContent = "—";
      rec.el.querySelector(".hwmon-unit").textContent = "";
    }
    // Sparkline scaling: temps (°C) and RPMs both benefit from
    // letting drawSparkline autoscale (maxV omitted). Voltages stay
    // in a tight range, so autoscale works there too.
    drawSparkline(rec.el.querySelector("canvas"),
                  hwmonHistory[path] || [],
                  rec.opts.tintFromGlow ? currentTintCss : "rgb(255, 175, 106)");
  },
  editOptions: null,
};

// Now-playing widget. Reads `lastSysStats.nowPlaying` which the
// bridge fills from Windows SMTC. Auto-hides itself when no media
// session is active so the widget doesn't squat empty in the layout.
WIDGET_REGISTRY["now-playing"] = {
  label: "Now playing",
  icon: '<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/>' +
        '<circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
  markup: () =>
    '<div class="np-title">—</div>' +
    '<div class="np-artist"></div>' +
    '<div class="np-progress"><div class="np-bar"></div></div>',
  tick: (rec) => {
    const np = (lastSysStats && lastSysStats.nowPlaying) || null;
    const el = rec.el;
    const titleEl  = el.querySelector(".np-title");
    const artistEl = el.querySelector(".np-artist");
    const progEl   = el.querySelector(".np-progress");
    const barEl    = el.querySelector(".np-bar");
    // No session → grey out the widget but keep it placed so the user
    // can still see it in the layout preview.
    if (!np || !np.title) {
      el.classList.add("np-empty");
      titleEl.textContent = "—";
      artistEl.textContent = "";
      barEl.style.width = "0%";
      return;
    }
    el.classList.remove("np-empty");
    titleEl.textContent = np.title;
    const showArtist = rec.opts.showArtist !== false;
    artistEl.style.display = showArtist ? "" : "none";
    if (showArtist) artistEl.textContent = np.artist || "";
    const showProgress = rec.opts.showProgress !== false;
    progEl.style.display = showProgress ? "" : "none";
    if (showProgress) {
      const dur = np.duration > 0 ? np.duration : 0;
      const pos = Math.max(0, Math.min(dur, np.position || 0));
      barEl.style.width = (dur > 0 ? (pos / dur * 100) : 0).toFixed(1) + "%";
    }
    // Subtle pause-state hint: when paused, dim the title slightly.
    titleEl.style.opacity = np.paused ? "0.55" : "1";
    if (rec.opts.tintFromGlow) {
      barEl.style.background = currentTintCss;
    } else {
      barEl.style.background = "";
    }
  },
  editOptions: null,
};

WIDGET_REGISTRY["audio-spectrum"] = {
  label: "Audio",
  icon: '<svg viewBox="0 0 24 24"><line x1="4"  y1="8"  x2="4"  y2="16"/>' +
        '<line x1="8"  y1="5"  x2="8"  y2="19"/><line x1="12" y1="9"  x2="12" y2="15"/>' +
        '<line x1="16" y1="3"  x2="16" y2="21"/><line x1="20" y1="10" x2="20" y2="14"/></svg>',
  markup: () => '<canvas></canvas>',
  tick: (rec) => {
    drawSpectrum(rec.el.querySelector("canvas"),
                 lastAudio,
                 rec.opts.tintFromGlow ? currentTintCss : "rgb(106,176,255)");
  },
  editOptions: null,
};

// Rebuild the picker after we mutated the registry so the new types
// appear as buttons. buildWidgetPicker ran once on load against the
// initial registry; calling it again is idempotent.
buildWidgetPicker();

// ── Drawing helpers shared by the four widget renderers ────────────────────

function sizeCanvasToCss(canvas) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvas.clientWidth  * dpr;
  const h = canvas.clientHeight * dpr;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
  }
  return { w: canvas.clientWidth, h: canvas.clientHeight, dpr };
}

function drawSparkline(canvas, values, stroke, maxV) {
  const { w, h, dpr } = sizeCanvasToCss(canvas);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  if (!values || values.length < 2) return;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = stroke;
  ctx.beginPath();
  for (let i = 0; i < values.length; i++) {
    const x = (i / (values.length - 1)) * w;
    const y = h - (values[i] / maxV) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  // Soft fill under the line.
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = rgbToRgba(stroke, 0.18);
  ctx.fill();
}

function drawDualLine(canvas, downValues, upValues, maxV) {
  const { w, h, dpr } = sizeCanvasToCss(canvas);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const draw = (vals, stroke) => {
    if (!vals || vals.length < 2) return;
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = stroke;
    ctx.beginPath();
    for (let i = 0; i < vals.length; i++) {
      const x = (i / (vals.length - 1)) * w;
      const y = h - (vals[i] / maxV) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  };
  draw(downValues, "rgb(106,176,255)");
  draw(upValues,   "rgb(255,154,85)");
}

function drawSpectrum(canvas, audio, color) {
  const { w, h, dpr } = sizeCanvasToCss(canvas);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  if (!audio || !audio.length) {
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.font = "11px ui-sans-serif, sans-serif";
    ctx.fillText("waiting for audio…", 8, h - 8);
    return;
  }
  const bars = Math.min(audio.length, 64);
  const gap  = 1;
  const bw   = (w - gap * (bars - 1)) / bars;
  for (let i = 0; i < bars; i++) {
    const v  = Math.max(0, Math.min(1, audio[i] || 0));
    const bh = v * h;
    ctx.fillStyle = color;
    ctx.fillRect(i * (bw + gap), h - bh, bw, bh);
  }
}

function humanRate(bytesPerSec) {
  if (bytesPerSec < 1024) return Math.round(bytesPerSec) + " B/s";
  if (bytesPerSec < 1024 * 1024) return (bytesPerSec / 1024).toFixed(1) + " KB/s";
  return (bytesPerSec / (1024 * 1024)).toFixed(2) + " MB/s";
}
