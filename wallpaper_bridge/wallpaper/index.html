<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SignalRGB Glow Wallpaper</title>
<!-- Screen index this page subscribes to (set per-bundle by the packager).
     Bridge routes UDP frames tagged for this index to clients that asked for
     it via ?screen=N. Default 0; screen0.zip / screen1.zip / screen2.zip
     each ship with a different content value. -->
<meta name="signalrgb-screen-index" content="0">
<!-- v1.2.12: bundle version stamp. installer/build.ps1 replaces
     `__WALLPAPER_VERSION__` with the bridge version at bundle-staging
     time, so a Lively / WE wallpaper imported from a v1.2.5 installer
     keeps "1.2.5" here even after the bridge is upgraded to v1.2.12.
     The page sends this on WS hello so the bridge can spot the
     mismatch and push a "re-import bundles" hint. When the file is
     served from the dev tree (not via installer), the placeholder
     stays as-is and the bridge reports "wallpaper: dev". -->
<meta name="signalrgb-wallpaper-version" content="__WALLPAPER_VERSION__">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0a0a14 0%, #000 80%);
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
  }

  /* Stacking order (back → front):
     1. body gradient
     2. #bars  (glow zones)           z-index: 1
     3. #bg    (the wallpaper image)  z-index: 2   ← image sits ON TOP of glow
     4. #dim   (darken overlay)       z-index: 3
     5. #status (debug HUD)           z-index: 4
  */

  #bars   { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  /* #bg used to be an <img> with object-fit. Swapped to a <div>
     with background-image because object-fit has no tile / repeat
     mode — and tile is exactly what users with seamless pattern
     wallpapers (carbon, hex grids, retro patterns) need. The fit
     modes drive background-size + background-repeat together:
       cover  → background-size: cover           repeat: no-repeat
       contain→ background-size: contain         repeat: no-repeat
       fill   → background-size: 100% 100%       repeat: no-repeat
       tile   → background-size: auto            repeat: repeat
       tile-x → background-size: auto 100%       repeat: repeat-x
       tile-y → background-size: 100% auto       repeat: repeat-y
     Defaults below cover the cover-mode case; JS overrides on
     bgFit change. */
  #bg     { position: fixed; inset: 0; z-index: 2;
            background-size: cover; background-repeat: no-repeat;
            background-position: center center;
            transition: opacity 0.3s; }
  /* Video-background twin of #bg. Same z-index + fade transition so
     the swap between image-mode and video-mode is invisible. Sized
     via inset:0 + width/height 100%; object-fit picks up the user's
     bgFit choice (only cover/contain/fill make sense for video; the
     tile modes from the v1.1 Background card fall back to cover). */
  #bg-video { position: fixed; inset: 0; z-index: 2;
              width: 100%; height: 100%;
              object-fit: cover; object-position: center center;
              transition: opacity 0.3s; }
  #dim    { position: fixed; inset: 0; background: #000; opacity: 0;
            z-index: 3; pointer-events: none; }
  #status { position: fixed; top: 10px; left: 10px; z-index: 4;
            font-size: 12px; line-height: 1.4;
            color: #fff; background: rgba(0,0,0,0.55);
            padding: 4px 8px; border-radius: 3px;
            pointer-events: none; user-select: none; }
  #status.ok { color: #6f6; }
  #status.bad { color: #f88; }
  #status.hidden { display: none; }

  /* Always-visible PAUSED badge. Independent of the user's "Show debug
     overlay" toggle so we can verify Lively's pause hook actually fires.
     Hidden by default; shown only when isPaused=true. */
  #paused-badge { position: fixed; top: 10px; right: 10px; z-index: 4;
                  display: none; padding: 4px 10px;
                  font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
                  font-size: 12px; letter-spacing: 0.05em;
                  color: #fff; background: rgba(180, 40, 40, 0.85);
                  border-radius: 3px;
                  pointer-events: none; user-select: none; }
  #paused-badge.on { display: block; }

  /* v1.2.12: version-mismatch banner. Shown when the bridge spots that
     our wallpaper bundle (Lively / WE ZIP) is older than the running
     bridge. Anchored bottom-right so it doesn't fight the standby card
     in the centre. Subdued amber, click-through. */
  #version-banner {
    position: fixed; right: 14px; bottom: 14px;
    z-index: 6;
    pointer-events: none;
    display: none;
    max-width: 380px;
    padding: 10px 14px;
    background: rgba(48, 32, 8, 0.92);
    border: 1px solid rgba(255, 178, 64, 0.45);
    border-radius: 10px;
    color: rgba(255, 222, 170, 0.96);
    font-family: ui-sans-serif, "Segoe UI", Roboto, sans-serif;
    font-size: 12.5px;
    line-height: 1.4;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
  }
  #version-banner.on { display: block; }
  #version-banner b { color: rgba(255, 200, 90, 1); }
  #version-banner code {
    font-family: ui-monospace, Consolas, monospace;
    background: rgba(0, 0, 0, 0.32);
    padding: 1px 5px; border-radius: 4px;
  }
  /* v1.2.12: hard-hide all glow + animation layers while paused. The
     rAF loops on ambient / audio-glow / pixelfx / parallax keep
     scheduling at 60 Hz even when paused (they early-return after the
     reschedule), and while that costs ~0% JS-CPU, WebView2's compositor
     wakes on every rAF and re-runs every `filter: blur()` / canvas
     filter on every frame because it can't tell that the source is
     static. Removing the layers from the compositor at `display: none`
     drops the GPU cost from ~10 % to ~0 % on dGPU-rich setups.
     #bg + widgets stay visible — pause means "stop the glow + motion",
     not "black screen". */
  body.paused-glow #bars,
  body.paused-glow #bars-canvas,
  body.paused-glow #ambient-canvas,
  body.paused-glow #audioglow-canvas,
  body.paused-glow #pixelfx-canvas { display: none !important; }

  /* v1.2.12: Glass-tile backdrop-filter quality buckets. Default
     (no body.glass-quality-*) uses the 6px-blur rules further down.
     - low : remove backdrop-filter, slightly higher bg alpha so the
             tile still reads. This is the biggest GPU win — backdrop
             blur is the single most expensive op on the page.
     - high: restore 12px blur (pre-v1.2.12 quality) for GPU-rich rigs. */
  body.glass-quality-low.widget-tile-glass .widget,
  body.glass-quality-low .widget.tile-glass {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    background: rgba(15, 22, 36, 0.78) !important;
  }
  body.glass-quality-high.widget-tile-glass .widget,
  body.glass-quality-high .widget.tile-glass {
    backdrop-filter: blur(12px) saturate(140%) !important;
    -webkit-backdrop-filter: blur(12px) saturate(140%) !important;
  }

  /* ── Bridge-offline standby card ── (v1.2.1)
     Visible only after the WS has been disconnected for >5s, so a
     bridge restart that completes in <5s never flashes this. Sits
     above the wallpaper but below widgets so it's the clear focal
     point on a "no signal" screen. Light scan-line + pulse animation
     so the user can tell the wallpaper is alive but the bridge is
     not. Hidden in preview mode (the Configurator already shows its
     own connection status). */
  #standby-card {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    opacity: 0; transition: opacity 0.4s ease;
    padding: 28px 36px;
    /* v1.2.12: dropped backdrop-filter (was blur(14px) saturate(140%))
       and bumped background opacity 0.78 -> 0.94. The card is visible
       exactly when the bridge is down — i.e. the wallpaper page has
       no useful work otherwise — and a per-frame backdrop-blur over
       the card's ~400×220 px area was burning ~10-15% GPU forever in
       that state. The solid-ish bg keeps the same hierarchy without
       the blur cost. */
    background: rgba(10, 14, 22, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 14px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.45);
    color: rgba(255, 255, 255, 0.92);
    font-family: ui-sans-serif, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    min-width: 340px; max-width: 80vw;
    overflow: hidden;
  }
  #standby-card.on { opacity: 1; }
  #standby-card::before {
    /* Slow scan-line — same trick the "no signal" CRT look uses to
       say "this is dead but the surface is fine". 8s sweep keeps it
       just visible enough to register movement without being busy. */
    content: "";
    position: absolute; left: 0; right: 0; top: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(106, 176, 255, 0.55) 50%,
      transparent 100%);
    animation: standby-scan 4s linear infinite;
    pointer-events: none;
  }
  @keyframes standby-scan {
    0%   { transform: translateY(0);    opacity: 0; }
    10%  {                              opacity: 1; }
    90%  {                              opacity: 1; }
    100% { transform: translateY(180px); opacity: 0; }
  }
  #standby-card .standby-icon {
    width: 56px; height: 56px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: rgba(106, 176, 255, 0.12);
    border: 1px solid rgba(106, 176, 255, 0.45);
    display: flex; align-items: center; justify-content: center;
    /* v1.2.12: the pulse animation moved to a ::after pseudo so it
       uses transform + opacity instead of box-shadow. box-shadow
       animations are paint operations (browser must re-rasterise
       the element with a different shadow extent every keyframe
       step); transform + opacity stay on the compositor and cost
       essentially nothing. The icon itself just needs to host the
       pseudo via position: relative. */
    position: relative;
  }
  #standby-card .standby-icon::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: rgba(106, 176, 255, 0.32);
    z-index: -1;
    pointer-events: none;
    animation: standby-pulse 2.4s ease-in-out infinite;
  }
  #standby-card .standby-icon svg {
    width: 28px; height: 28px;
    stroke: rgba(106, 176, 255, 0.85); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  @keyframes standby-pulse {
    0%, 100% { transform: scale(0.92); opacity: 0; }
    50%      { transform: scale(1.32); opacity: 0.7; }
  }
  #standby-card .standby-title {
    font-size: 17px; font-weight: 600;
    letter-spacing: 0.02em; margin-bottom: 6px;
  }
  #standby-card .standby-sub {
    font-size: 12.5px;
    color: rgba(255, 255, 255, 0.65);
    line-height: 1.5;
  }
  #standby-card .standby-sub code {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    font-size: 11.5px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 4px;
    padding: 1px 5px;
  }

  /* ── Layout: Pixel Grid (2D — default) ─────────────────────────────────── */
  #bars.lay-grid {
    display: grid;
    grid-template-columns: repeat(var(--cols, 16), 1fr);
    grid-template-rows: repeat(var(--rows, 1), 1fr);
    filter: blur(calc(var(--grid-blur, 30px) * var(--glow, 1)));
  }
  #bars.lay-grid .zone {
    background: var(--c, #111);
    /* No CSS transition on grid zones: at 60 FPS the bridge frames are
       already smoother than the old 80 ms tween, and a transition on
       N × M zones keeps the compositor juggling hundreds of in-flight
       animations every frame — measurable GPU savings dropping it. The
       pill / stripe layouts (far fewer zones) keep their transition. */
    contain: strict;
  }

  /* v1.2.12: canvas grid renderer. Sized internally to the SignalRGB
     grid resolution (~32×32); CSS scales it to fill the viewport, and
     the browser interpolates + applies the blur on the GPU as part of
     compositing. One putImageData per frame replaces ~1024 DOM style
     writes per frame on a 32×32 grid under heavy SignalRGB effects. */
  #bars-canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
    width: 100%; height: 100%;
    filter: blur(calc(var(--grid-blur, 30px) * var(--glow, 1)));
    /* `pixelated` looks blocky; default `auto` smooths bilinearly,
       and combined with the blur the result is visually identical to
       the DOM-div grid. */
    image-rendering: auto;
    display: none;     /* shown only when currentLayout === "lay-grid" */
  }
  #bars-canvas.on { display: block; }
  /* When the canvas grid is active, hide the DOM-div #bars container
     entirely so we don't double-paint. */
  #bars.bars-canvas-active { display: none; }

  /* ── Layout: Vertical Stripes ───────────────────────────────────────────── */
  /* v2.3.8-beta perf: `transition: background 0.08s` removed from all
     three bar layouts. JS rewrites `--c` per zone every render tick
     (~30 Hz) which restarted the 80 ms transition each time, keeping
     N CSS animations in flight permanently — same compositor pressure
     pattern gotcha-perf-transitions warned about, and the same bug
     v2.3.7-beta fixed on the Repulsion effect's --repel-x/-y. The 30 Hz
     JS updates already provide motion smoothing; the extra CSS easing
     was redundant. */
  #bars.lay-vstripes { display: flex; flex-direction: row; }
  #bars.lay-vstripes .zone {
    flex: 1; height: 100%;
    background: var(--c, #111);
    filter: blur(calc(var(--stripe-blur, 60px) * var(--glow, 1)));
  }

  /* ── Layout: Horizontal Stripes ─────────────────────────────────────────── */
  #bars.lay-hstripes { display: flex; flex-direction: column; }
  #bars.lay-hstripes .zone {
    flex: 1; width: 100%;
    background: var(--c, #111);
    filter: blur(calc(var(--stripe-blur, 60px) * var(--glow, 1)));
  }

  /* ── Layout: Centered Pills ─────────────────────────────────────────────── */
  #bars.lay-pills {
    display: flex; align-items: center; justify-content: space-evenly;
    padding: 0 8vw;
  }
  #bars.lay-pills .zone {
    flex: 0 0 auto;
    width: var(--bar-w, 1.4vw); min-width: 6px;
    height: var(--bar-h, 38vh);
    border-radius: 999px;
    background: var(--c, #111);
    box-shadow:
      0 0 calc(18px * var(--glow, 1)) calc(2px * var(--glow, 1)) var(--c, #111),
      0 0 calc(48px * var(--glow, 1)) calc(6px * var(--glow, 1)) var(--c, #111),
      0 0 calc(110px * var(--glow, 1)) calc(14px * var(--glow, 1)) var(--c, #111);
  }

  #bars.lay-off,
  #bars.disabled { display: none !important; }

  /* ── Ambient effects (snow / rain / sparks / aurora) ────────────────────
     Full-viewport canvas above the dim layer but BEHIND widgets so the
     widgets stay readable. pointer-events:none — clicks fall through. */
  #ambient-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 4;
    pointer-events: none;
    display: none;
  }
  #ambient-canvas.on { display: block; }

  /* ── Pixelfx (mouse trail / hover glow / click ripple) ──────────────────
     ABOVE widgets so the trail draws on top. Still pointer-events:none —
     we read mouse position from Lively's callback, not real events. */
  #pixelfx-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 7;
    pointer-events: none;
    display: none;
  }
  #pixelfx-canvas.on { display: block; }

  /* ── Audio-reactive glow layer (whole-screen) ───────────────────────────
     Pulses / spectrum bars / waveform driven by Lively's livelyAudioListener
     (or Wallpaper Engine's wallpaperRegisterAudioListener). Above the glow
     bars but below widgets so widgets stay readable. mix-blend-mode: screen
     so it adds light over whatever's underneath instead of replacing it. */
  #audioglow-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
    display: none;
    mix-blend-mode: screen;
  }
  #audioglow-canvas.on { display: block; }

  /* ── Widgets layer ──────────────────────────────────────────────────────
     Sits above the dim layer and below the debug HUD. Pointer-events flip
     between none (locked / normal use — clicks fall through to Lively's
     interaction passthrough) and auto (edit mode — drag/resize). */
  #widgets-container {
    position: fixed; inset: 0; z-index: 5;
    pointer-events: none;
  }
  #widgets-container.edit-mode { pointer-events: none; }
  /* v2.3.11-beta: edit-mode pill — fixed top so the user can find
     the lock toggle without going back to the Configurator. The
     widgets container itself flips pointer-events: auto in edit
     mode (so drag/resize works), but this pill stays clickable in
     either mode because it carries `pointer-events: auto` on its
     own rule. Toggled via .on class from setWidgetsLocked. */
  #widgets-banner {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 999;   /* above all widgets + canvases */
    padding: 6px 6px 6px 14px;
    border-radius: 999px;
    background: rgba(20, 30, 60, 0.88);
    color: #d8e6fc;
    border: 1px solid #3a6ba8;
    font-family: ui-sans-serif, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.55);
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    pointer-events: auto;
    user-select: none;
  }
  #widgets-banner.on { display: inline-flex; }
  #widgets-banner .wb-text { opacity: 0.85; }
  #widgets-banner .wb-lock {
    background: rgba(58, 107, 168, 0.45);
    border: 1px solid rgba(58, 107, 168, 0.85);
    color: #fff;
    padding: 4px 12px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    display: inline-flex; align-items: center; gap: 5px;
  }
  #widgets-banner .wb-lock:hover {
    background: rgba(58, 107, 168, 0.7);
  }

  .widget {
    position: absolute;
    box-sizing: border-box;
    padding: 8px;
    color: #fff;
    font-family: ui-sans-serif, "Segoe UI", Roboto, sans-serif;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    user-select: none;
    pointer-events: none;     /* per-widget; flipped in edit mode */
    touch-action: none;       /* required by interact.js */
    overflow: hidden;
    /* Tokens the optional tile shell reads. Picked once here so
       every variant inherits the same scale. Override per-widget
       if a specific layout needs different padding. */
    --widget-tile-radius: 10px;
    --widget-tile-padding: 12px;
    --widget-tile-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    --widget-tile-border: 1px solid rgba(255, 255, 255, 0.08);
  }

  /* ── Widget tile shell (opt-in, v1.1+) ──
     The pre-v1.0 baseline shows widgets as transparent overlays —
     just text + glow with no chrome — which works on busy wallpapers
     but reads as a disconnected pile on plain backgrounds. The tile
     shell adds a uniform container around every widget so the whole
     widget set reads as one design system. Three variants:

       glass — frosted-acrylic, semi-transparent + backdrop-blur,
               the default when the user opts in. Works against
               any wallpaper.
       solid — opaque dark fill, best for users who want the
               widgets to stand out completely (presentations,
               heavy-pattern wallpapers).
       clear — minimal — subtle border + faint fill, mostly
               transparent. Half-step between off and glass.

     Applied via a class on <body> so a single attribute toggles
     every widget at once. Default state (no class) preserves the
     v1.0 transparent-overlay look. */
  /* v1.6.0-beta theme palette variables. Defaults match the v1.5
     hardcoded values so an upgrade without picking a theme is a
     visual no-op. Each body.theme-<name> class below overrides
     these to repaint every widget at once. */
  :root {
    --theme-bg-glass:  rgba(15, 22, 36, 0.55);
    --theme-bg-solid:  rgba(20, 26, 38, 0.92);
    --theme-bg-clear:  rgba(255, 255, 255, 0.04);
    --theme-border:    rgba(255, 255, 255, 0.12);
    --theme-fg:        #f5f7fb;
    --theme-fg-muted:  rgba(245, 247, 251, 0.65);
    --theme-accent:    var(--w-tint, #6ab0ff);
    --theme-font:      system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  body.theme-dracula {
    --theme-bg-glass:  rgba(40, 42, 54, 0.62);
    --theme-bg-solid:  rgba(40, 42, 54, 0.94);
    --theme-bg-clear:  rgba(189, 147, 249, 0.06);
    --theme-border:    rgba(189, 147, 249, 0.22);
    --theme-fg:        #f8f8f2;
    --theme-fg-muted:  rgba(248, 248, 242, 0.65);
    --theme-accent:    #ff79c6;
  }
  body.theme-nord {
    --theme-bg-glass:  rgba(46, 52, 64, 0.62);
    --theme-bg-solid:  rgba(46, 52, 64, 0.94);
    --theme-bg-clear:  rgba(136, 192, 208, 0.06);
    --theme-border:    rgba(136, 192, 208, 0.22);
    --theme-fg:        #eceff4;
    --theme-fg-muted:  rgba(236, 239, 244, 0.62);
    --theme-accent:    #88c0d0;
  }
  body.theme-tokyo-night {
    --theme-bg-glass:  rgba(26, 27, 38, 0.65);
    --theme-bg-solid:  rgba(26, 27, 38, 0.96);
    --theme-bg-clear:  rgba(125, 207, 255, 0.06);
    --theme-border:    rgba(125, 207, 255, 0.22);
    --theme-fg:        #c0caf5;
    --theme-fg-muted:  rgba(192, 202, 245, 0.62);
    --theme-accent:    #7dcfff;
  }
  body.theme-catppuccin {
    --theme-bg-glass:  rgba(30, 30, 46, 0.65);
    --theme-bg-solid:  rgba(30, 30, 46, 0.96);
    --theme-bg-clear:  rgba(245, 194, 231, 0.06);
    --theme-border:    rgba(245, 194, 231, 0.22);
    --theme-fg:        #cdd6f4;
    --theme-fg-muted:  rgba(205, 214, 244, 0.62);
    --theme-accent:    #f5c2e7;
  }
  body.theme-solarized {
    --theme-bg-glass:  rgba(0, 43, 54, 0.65);
    --theme-bg-solid:  rgba(0, 43, 54, 0.96);
    --theme-bg-clear:  rgba(38, 139, 210, 0.06);
    --theme-border:    rgba(147, 161, 161, 0.25);
    --theme-fg:        #93a1a1;
    --theme-fg-muted:  rgba(147, 161, 161, 0.65);
    --theme-accent:    #b58900;
  }
  body.theme-vintage-crt {
    --theme-bg-glass:  rgba(8, 18, 8, 0.7);
    --theme-bg-solid:  rgba(8, 18, 8, 0.97);
    --theme-bg-clear:  rgba(0, 255, 70, 0.05);
    --theme-border:    rgba(0, 255, 70, 0.3);
    --theme-fg:        #00ff46;
    --theme-fg-muted:  rgba(0, 255, 70, 0.55);
    --theme-accent:    #00ff46;
    --theme-font:      "Cascadia Mono", "Consolas", "Menlo", monospace;
  }
  body.theme-vintage-crt .widget {
    text-shadow: 0 0 4px currentColor;
  }
  body.theme-light {
    --theme-bg-glass:  rgba(250, 250, 252, 0.7);
    --theme-bg-solid:  rgba(255, 255, 255, 0.96);
    --theme-bg-clear:  rgba(0, 0, 0, 0.04);
    --theme-border:    rgba(0, 0, 0, 0.12);
    --theme-fg:        #1c1f24;
    --theme-fg-muted:  rgba(28, 31, 36, 0.6);
    --theme-accent:    #0066cc;
  }
  /* v1.6.1-beta: theme palette applies WIDGET-LEVEL ONLY. No
     wallpaper-wide tints, no body overlays — themes are about
     giving widgets variety. Each theme overrides:
        --theme-bg, --theme-border, --theme-fg, --theme-fg-muted,
        --theme-accent, --theme-font, --theme-radius, --theme-shadow
     (all consumed below by both the `body[class*="theme-"] .widget`
     base rule AND the existing tile-style overrides).

     When tile-style is "off" the theme still applies — widgets
     get the themed background + border so the theme is visible
     even without an explicit tile shell. */
  body[class*="theme-"] .widget {
    color:        var(--theme-fg) !important;
    font-family:  var(--theme-font);
    background:   var(--theme-bg, transparent);
    border:       1px solid var(--theme-border, transparent);
    border-radius: var(--theme-radius, 8px);
    box-shadow:   var(--theme-shadow, none);
    padding:      var(--widget-tile-padding);
    transition:   background 0.3s, border-color 0.3s, color 0.3s;
  }
  body[class*="theme-"] .widget.tinted {
    color: var(--w-tint, var(--theme-accent)) !important;
  }
  /* Per-theme character: shape, decoration, shadow on widgets
     specifically — never on the wallpaper. */
  body.theme-dracula {
    --theme-bg:      rgba(40, 42, 54, 0.78);
    --theme-radius:  10px;
    --theme-shadow:  0 2px 14px rgba(189, 147, 249, 0.18);
  }
  body.theme-nord {
    --theme-bg:      rgba(46, 52, 64, 0.78);
    --theme-radius:  4px;
    --theme-shadow:  0 1px 0 rgba(136, 192, 208, 0.22) inset;
  }
  body.theme-tokyo-night {
    --theme-bg:      rgba(26, 27, 38, 0.85);
    --theme-radius:  6px;
    --theme-shadow:  0 0 18px rgba(125, 207, 255, 0.18);
  }
  body.theme-catppuccin {
    --theme-bg:      rgba(30, 30, 46, 0.78);
    --theme-radius:  16px;
    --theme-shadow:  0 4px 18px rgba(245, 194, 231, 0.15);
  }
  body.theme-solarized {
    --theme-bg:      rgba(0, 43, 54, 0.85);
    --theme-radius:  2px;
    --theme-shadow:  0 1px 0 rgba(147, 161, 161, 0.25);
  }
  body.theme-vintage-crt {
    --theme-bg:      rgba(8, 18, 8, 0.88);
    --theme-radius:  2px;
    --theme-shadow:  0 0 12px rgba(0, 255, 70, 0.4),
                     inset 0 0 24px rgba(0, 255, 70, 0.12);
  }
  /* CRT scanlines on widgets only (not the wallpaper background).
     v1.6.1-beta hotfix3: do NOT override position — widgets are
     already position:absolute (line 397) which makes the ::before
     position itself relative to the widget anyway. Adding
     `position: relative` here collapsed widgets back into normal
     document flow and stacked them vertically across the screen.
     `overflow: hidden` is fine because the ::before already
     respects the widget's border-radius via `inherit`. */
  body.theme-vintage-crt .widget {
    overflow: hidden;
  }
  body.theme-vintage-crt .widget::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      transparent 0, transparent 2px,
      rgba(0, 255, 70, 0.10) 2px, rgba(0, 255, 70, 0.10) 3px);
    pointer-events: none;
    border-radius: inherit;
    mix-blend-mode: screen;
    /* Keep the scanlines BEHIND widget content but above the
       widget's themed background — z-index 0 puts it at the
       widget's own stacking context base. */
    z-index: 0;
  }
  body.theme-vintage-crt .widget > * { position: relative; z-index: 1; }
  body.theme-light {
    --theme-bg:      rgba(250, 250, 252, 0.92);
    --theme-radius:  8px;
    --theme-shadow:  0 4px 14px rgba(0, 0, 0, 0.08);
  }
  /* Gruvbox Dark — earthy retro palette, beloved by Vim users. */
  body.theme-gruvbox {
    --theme-bg-glass:  rgba(40, 40, 40, 0.78);
    --theme-bg-solid:  rgba(40, 40, 40, 0.94);
    --theme-bg-clear:  rgba(254, 128, 25, 0.06);
    --theme-border:    rgba(254, 128, 25, 0.28);
    --theme-fg:        #ebdbb2;
    --theme-fg-muted:  rgba(235, 219, 178, 0.62);
    --theme-accent:    #fabd2f;
    --theme-bg:        rgba(40, 40, 40, 0.82);
    --theme-radius:    6px;
    --theme-shadow:    0 2px 0 rgba(254, 128, 25, 0.25);
  }
  /* Rose Pine — muted pastel rose + plum + sage. */
  body.theme-rose-pine {
    --theme-bg-glass:  rgba(25, 23, 36, 0.78);
    --theme-bg-solid:  rgba(25, 23, 36, 0.94);
    --theme-bg-clear:  rgba(235, 188, 186, 0.06);
    --theme-border:    rgba(235, 188, 186, 0.25);
    --theme-fg:        #e0def4;
    --theme-fg-muted:  rgba(224, 222, 244, 0.62);
    --theme-accent:    #ebbcba;
    --theme-bg:        rgba(25, 23, 36, 0.82);
    --theme-radius:    12px;
    --theme-shadow:    0 3px 16px rgba(235, 188, 186, 0.18);
  }
  /* Cyberpunk Neon — magenta + cyan glow, the SignalRGB vibe. */
  body.theme-cyberpunk {
    --theme-bg-glass:  rgba(8, 4, 20, 0.85);
    --theme-bg-solid:  rgba(8, 4, 20, 0.97);
    --theme-bg-clear:  rgba(255, 30, 200, 0.08);
    --theme-border:    rgba(255, 30, 200, 0.45);
    --theme-fg:        #f0f0ff;
    --theme-fg-muted:  rgba(240, 240, 255, 0.62);
    --theme-accent:    #ff1ec8;
    --theme-bg:        linear-gradient(135deg,
                         rgba(20, 4, 40, 0.92) 0%,
                         rgba(4, 8, 30, 0.92) 100%);
    --theme-radius:    4px;
    --theme-shadow:    0 0 18px rgba(255, 30, 200, 0.45),
                       0 0 36px rgba(0, 240, 255, 0.20);
  }
  body.theme-cyberpunk .widget {
    border-image: linear-gradient(
      135deg, #ff1ec8, #00f0ff) 1;
    text-shadow: 0 0 6px rgba(255, 30, 200, 0.4);
  }
  /* v1.6.1-beta: widget-only pulse on theme change. Animates
     --pulse-scale (registered above via @property so keyframes
     can interpolate it) — composed into the .widget transform
     pipeline so the widget's position is preserved through the
     animation. Previously a plain `transform: scale(1)` keyframe
     overwrote the inline `transform: translate(x,y)` and every
     widget snapped to the top-left corner for the duration. */
  @keyframes theme-pulse {
    0%   { --pulse-scale: 1;     box-shadow: var(--theme-shadow, none); }
    35%  { --pulse-scale: 1.025; box-shadow: 0 0 24px var(--theme-accent); }
    100% { --pulse-scale: 1;     box-shadow: var(--theme-shadow, none); }
  }
  body.theme-just-changed .widget {
    animation: theme-pulse 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* v1.6.1-beta widget transform pipeline.
     Widget position lives in --widget-x / --widget-y; mouse-fx
     repulsion adds --repel-x / --repel-y; theme-pulse animates
     --pulse-scale via @property below. The .widget rule composes
     them all so no single transition or keyframe ever clobbers
     position again. */
  @property --pulse-scale {
    syntax: '<number>';
    initial-value: 1;
    inherits: false;
  }
  .widget {
    --repel-x: 0px;
    --repel-y: 0px;
    --pulse-scale: 1;
    transform:
      translate(
        calc(var(--widget-x, 0px) + var(--repel-x)),
        calc(var(--widget-y, 0px) + var(--repel-y))
      )
      scale(var(--pulse-scale));
  }
  /* Repulsion effect now just animates the offset vars — composed
     into the unified transform above.
     v1.6.1-beta R2.4: `will-change: transform` removed. It forced a
     GPU compositor layer per widget the entire time Widget-Schwung
     was on — even with the cursor across the screen, every widget
     paid the layer cost. Modern browsers auto-promote during the
     transition itself, so removing the always-on hint costs us
     nothing during actual repulsion but saves N×layer cost at idle.
     This is the same class of regression gotcha-perf-transitions
     warns about (transition on per-frame-mutated zones).  */
  /* v2.3.7-beta perf fix: the CSS transition that USED to live here
     (transition on --repel-x / --repel-y, 0.18s cubic-bezier) had
     the same anti-pattern gotcha-perf-transitions warns about: the
     repulsion JS sets fresh target values for every widget every
     33 ms (30 Hz tick), and each set RESTARTED a 180 ms transition.
     With N widgets, the compositor kept 2N transitions in flight at
     all times, juggling them every frame. The widget positions
     looked fine — they were just being interpolated by both the JS
     dt-based smoothing AND the CSS easing — but the GPU was paying
     for one continuous N-widget animation set that didn't need to
     exist. Removed; the 30 Hz JS updates are already perceptually
     smooth. No body.fx-repulsion .widget rule needed. */
  body.fx-ripple #bg,
  body.fx-ripple #bars,
  body.fx-ripple #bars-canvas {
    filter: url(#fx-ripple-filter);
  }
  /* v2.3.10-beta: pixelfx water mode — feDisplacementMap fed by a
     procedurally painted ring-front canvas. Distinct filter ID from
     fx-ripple so the two effects don't fight; only #bg gets the
     filter (not #bars / #bars-canvas) so the glow-stripes stay
     stable and don't read as part of the water surface. */
  body.fx-pixelfx-water #bg {
    filter: url(#pixelfx-water-filter);
  }

  body.widget-tile-glass .widget {
    background: var(--theme-bg-glass);
    /* v1.2.12: blur radius 12px -> 6px. backdrop-filter blur is the
       single most expensive GPU op on the page — every glass widget
       re-samples the wallpaper area behind it each frame the source
       changes, and the cost scales with kernel size² (12px kernel
       reads ~49 texels per output pixel, 6px reads ~13). On Crystal
       Glow with every zone changing every frame, an 8-widget glass
       layout was driving ~10-15% GPU on a 4070 Ti just for the
       backdrop-filter passes. Visual difference at 6px is minor;
       the saturation lift keeps the "glassy" feel.
       contain: paint scopes the dirty area so a widget animation
       (clock seconds, etc.) can't invalidate paint of neighbours.
       will-change: backdrop-filter hints the compositor to keep a
       cached blur texture per widget so a static source frame
       doesn't recompute the blur on every rAF wakeup. */
    backdrop-filter: blur(6px) saturate(140%);
    -webkit-backdrop-filter: blur(6px) saturate(140%);
    contain: paint;
    will-change: backdrop-filter;
    border: var(--widget-tile-border);
    border-radius: var(--widget-tile-radius);
    box-shadow: var(--widget-tile-shadow);
    padding: var(--widget-tile-padding);
  }
  body.widget-tile-solid .widget {
    background: var(--theme-bg-solid);
    border: var(--widget-tile-border);
    border-radius: var(--widget-tile-radius);
    box-shadow: var(--widget-tile-shadow);
    padding: var(--widget-tile-padding);
  }
  body.widget-tile-clear .widget {
    background: var(--theme-bg-clear);
    border: 1px solid var(--theme-border);
    border-radius: var(--widget-tile-radius);
    padding: var(--widget-tile-padding);
  }
  /* Edit-mode still overrides background for the dashed-border
     feedback — but we keep the radius from the active variant
     so it doesn't snap to square edges during drags. */
  body.widget-tile-glass .edit-mode .widget,
  body.widget-tile-solid .edit-mode .widget,
  body.widget-tile-clear .edit-mode .widget {
    border-radius: var(--widget-tile-radius);
  }

  /* Per-widget tile-style overrides — same property block as the
     body-level rules but scoped to a single widget so a user can
     dial "all glass, but this one solid" via the widget's edit
     dialog. `.tile-off` explicitly cancels the inherited body
     style (clear background, no border, no shadow). */
  .widget.tile-glass {
    background: var(--theme-bg-glass);
    /* v1.2.12: match the body.widget-tile-glass rule above (blur
       12px -> 6px + cache hints). */
    backdrop-filter: blur(6px) saturate(140%);
    -webkit-backdrop-filter: blur(6px) saturate(140%);
    contain: paint;
    will-change: backdrop-filter;
    border: var(--widget-tile-border);
    border-radius: var(--widget-tile-radius);
    box-shadow: var(--widget-tile-shadow);
    padding: var(--widget-tile-padding);
  }
  .widget.tile-solid {
    background: var(--theme-bg-solid);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: var(--widget-tile-border);
    border-radius: var(--widget-tile-radius);
    box-shadow: var(--widget-tile-shadow);
    padding: var(--widget-tile-padding);
  }
  .widget.tile-clear {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: var(--widget-tile-radius);
    box-shadow: none;
    padding: var(--widget-tile-padding);
  }
  .widget.tile-off {
    background: transparent !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    border: none !important;
    box-shadow: none !important;
    padding: 8px !important;
  }

  /* Universal text alignment + scale. Default values (left + 1.0)
     are baked into the var fallbacks so widgets that never had the
     opts set keep their pre-v1.1 layout. */
  .widget {
    --w-align: left;
    --w-scale: 1;
    text-align: var(--w-align);
  }
  /* Widgets with their own per-content font sizing (cpu/ram/hwmon
     meter values, now-playing title, etc.) all use `em` units that
     scale relative to .widget's font-size, so multiplying that one
     base size hits everything inside. */
  .widget { font-size: calc(1em * var(--w-scale)); }
  /* Clock widget — text-scale applies to the digital mode's
     text rendering (rules further down add the calc() multiplier
     to .digital-time / .digital-date). Analog mode is a fixed-
     viewBox SVG that fills the widget container; the only sensible
     way to make an analog clock bigger is to resize the widget
     itself, so text-scale is a no-op for analog and that's
     intentional. The earlier transform:scale on the SVG hack
     looked correct in DevTools but got clipped by .widget's
     overflow:hidden — drop it. */
  .edit-mode .widget {
    pointer-events: auto;
    background: rgba(0,0,0,0.30);
    border: 1px dashed rgba(255,255,255,0.55);
    border-radius: 6px;
    cursor: move;
  }

  /* ── v1.1.5+ widget header bar ──
     Optional strip at the top of every widget. Hidden by default
     (preserves the pre-v1.1.5 look exactly — no surprise visual
     change for existing users) and lit up via the universal
     `showHeader` option or the global default. When visible:
       • left:  widget-type icon (the SVG already defined on the
                registry's `icon` field, re-used as the in-screen
                badge instead of just the Configurator picker)
       • centre: widget label (e.g. "Clock", "Weather", "CPU")
       • right: settings + remove action buttons (was floating-
                overlay in edit mode only; now docked in the header
                and visible-on-hover in normal mode too).
     Layout uses CSS grid so the title can ellipsis-truncate on
     narrow widgets without pushing the actions out of view. */
  .widget-header { display: none; }
  .widget.with-header .widget-header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 6px;
    padding: 4px 4px 6px;
    margin: -2px -2px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.75);
    user-select: none;
  }
  .widget.with-header .widget-header-icon {
    display: flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    opacity: 0.8;
  }
  .widget.with-header .widget-header-icon svg {
    width: 100%; height: 100%;
    fill: none; stroke: currentColor; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .widget.with-header .widget-header-title {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .widget.with-header .widget-header-actions {
    display: flex; gap: 2px;
    opacity: 0; transition: opacity 0.15s;
  }
  .widget.with-header:hover .widget-header-actions,
  .edit-mode .widget.with-header .widget-header-actions {
    opacity: 1;
  }
  .widget.with-header .widget-act {
    width: 18px; height: 18px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 12px; line-height: 16px;
    text-align: center; cursor: pointer; padding: 0;
    pointer-events: auto;
  }
  .widget.with-header .widget-act:hover {
    background: rgba(255,255,255,0.18);
  }
  .widget.with-header .widget-remove:hover {
    background: rgba(220,70,70,0.85);
    color: white;
  }
  /* v1.2.1: every widget's content now lives inside .widget-body
     (was unwrapped before v1.1.5). Per-type layout rules (clock
     centering, meter flex-column, etc.) moved from the .widget-X
     root onto .widget-X .widget-body so the layout works regardless
     of whether the optional header bar is rendered above it. */
  .widget .widget-body {
    width: 100%; height: 100%;
    position: relative;
  }
  .widget.with-header .widget-body {
    /* Header claims a row at the top; body shrinks to fill below. */
    height: calc(100% - 26px);
  }
  /* Header tint follows the user's glow colour when "tint" is on,
     so multi-widget setups read as one coherent UI surface. */
  .widget.with-header.tinted .widget-header { color: var(--w-tint, rgba(255,255,255,0.85)); }
  .widget.with-header.tinted .widget-header-icon { color: var(--w-tint, rgba(255,255,255,0.85)); }
  .edit-mode .widget:hover {
    border-color: rgba(106,176,255,0.85);
    background: rgba(15,28,55,0.40);
  }
  .widget .widget-handle {
    position: absolute; right: 0; bottom: 0;
    width: 14px; height: 14px;
    background:
      linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.65) 60% 70%, transparent 70% 75%,
                              rgba(255,255,255,0.65) 75% 85%, transparent 85% 90%,
                              rgba(255,255,255,0.65) 90% 100%);
    cursor: se-resize;
    display: none;
  }
  .edit-mode .widget .widget-handle { display: block; }
  .widget .widget-remove {
    position: absolute; top: 2px; right: 2px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(180, 40, 40, 0.85);
    color: #fff;
    font-size: 14px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    display: none;
  }
  .edit-mode .widget .widget-remove { display: block; }
  .widget .widget-remove:hover { background: rgba(220, 70, 70, 0.95); }

  /* ── Clock widget ── */
  .widget-clock .widget-body {
    display: flex; align-items: center; justify-content: center;
  }
  .widget-clock svg { width: 100%; height: 100%; max-width: 100%; max-height: 100%; }
  .widget-clock .hand-h, .widget-clock .hand-m, .widget-clock .hand-s,
  .widget-clock .face,   .widget-clock .tick   { stroke: #fff; fill: none; stroke-linecap: round; }
  .widget-clock .face { stroke-width: 2; }
  .widget-clock .tick { stroke-width: 1.5; }
  .widget-clock .hand-h { stroke-width: 4; }
  .widget-clock .hand-m { stroke-width: 3; }
  .widget-clock .hand-s { stroke: #ff7575; stroke-width: 1.5; }
  .widget-clock.tinted .hand-s { stroke: var(--w-tint, #ff7575); }
  .widget-clock.tinted .face   { stroke: var(--w-tint, #fff);    }
  .widget-clock .digital-time {
    font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
    /* clamp() gives the viewport-relative base size; * --w-scale
       lets the universal "Text size" option grow / shrink without
       breaking the responsive sizing. Same pattern the meter
       widgets use for their stat-value. */
    font-size: calc(clamp(22px, 28%, 64px) * var(--w-scale, 1));
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .widget-clock .digital-date {
    font-size: calc(clamp(11px, 12%, 22px) * var(--w-scale, 1));
    color: rgba(255,255,255,0.78);
    margin-top: 4px;
  }
  .widget-clock.tinted .digital-time { color: var(--w-tint, #fff); }

  /* ── Calendar widget ── */
  .widget-calendar .widget-body { display: flex; flex-direction: column; }
  .widget-calendar .cal-head {
    text-align: center; font-weight: 600; font-size: 13px;
    margin-bottom: 4px; letter-spacing: 0.05em;
  }
  .widget-calendar.tinted .cal-head { color: var(--w-tint, #fff); }
  .widget-calendar table {
    width: 100%; height: 100%;
    border-collapse: collapse;
    font-size: calc(clamp(9px, 1.5vw, 13px) * var(--w-scale, 1));
  }
  .widget-calendar th, .widget-calendar td {
    text-align: center; padding: 1px 0;
    font-variant-numeric: tabular-nums;
  }
  .widget-calendar th { color: rgba(255,255,255,0.55); font-weight: 600; }
  .widget-calendar td.dim { color: rgba(255,255,255,0.30); }
  .widget-calendar td.today {
    background: rgba(106,176,255,0.30);
    border-radius: 4px;
    font-weight: 700;
  }
  .widget-calendar.tinted td.today {
    background: color-mix(in srgb, var(--w-tint, #6ab0ff) 35%, transparent);
  }

  /* ── Weather widget (v2.3.3-beta redesign) ── */
  .widget-weather .widget-body { display: flex; flex-direction: column; gap: 4px; }
  .widget-weather .wx-head {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .widget-weather .wx-icon {
    width: 40px; height: 40px;
    flex: 0 0 40px;
    opacity: 0.92;
    color: rgba(255,255,255,0.92);
  }
  .widget-weather .wx-icon svg { width: 100%; height: 100%; display: block; }
  .widget-weather .wx-head-text { min-width: 0; }
  .widget-weather .wx-loc {
    font-size: 12px; color: rgba(255,255,255,0.75);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .widget-weather .wx-cond {
    font-size: 13px; opacity: 0.88;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .widget-weather .wx-temp {
    font-size: calc(clamp(28px, 40%, 56px) * var(--w-scale, 1));
    font-weight: 300; letter-spacing: -0.02em; line-height: 1;
    text-align: right;
  }
  .widget-weather.tinted .wx-temp { color: var(--w-tint, #fff); }
  .widget-weather .wx-feel {
    font-size: 11.5px; opacity: 0.62;
    margin-top: 2px;
  }
  .widget-weather .wx-stats {
    display: flex; flex-direction: column;
    gap: 3px;
    margin-top: 6px;
    font-size: 11.5px;
  }
  .widget-weather .wx-hilo {
    display: flex; gap: 14px;
    opacity: 0.85;
  }
  .widget-weather .wx-hi, .widget-weather .wx-lo {

  .widget-cpu-meter, .widget-ram-meter, .widget-net-graph,

       second span in stat-head was dead weight (unit moved to the

<div id="bars" class="lay-grid"></div>
<!-- v1.2.12: Canvas-based grid renderer. Active only when the layout is
     "lay-grid"; pills / stripes / off keep the DOM-div pipeline because
     they need per-zone CSS (border-radius pills, box-shadows, transitions)
     that doesn't translate to canvas at their low zone counts. The
     internal canvas size matches the SignalRGB grid resolution
     (e.g. 32×32); CSS scales it to viewport so a single putImageData()
     of a ~4 KiB buffer replaces ~1024 DOM style writes per frame. -->
<canvas id="bars-canvas" aria-hidden="true"></canvas>
<div id="bg" role="img" aria-label=""></div>
<!-- v1.2-dev: animated-background support. Hidden by default; the
     wallpaper page swaps to the <video> element when bgImage's
     extension matches a known video container (mp4/webm/mov/m4v).
     `muted` + `playsinline` are required for autoplay in
     Chromium-based wallpaper hosts. `loop` keeps the loop seamless
     regardless of clip length. Audio always off — SignalRGB's
     own FFT feed drives the audio-glow layer, double-decoding
     here would just be wasted GPU. -->
<video id="bg-video" muted playsinline loop autoplay
       preload="auto" disablepictureinpicture
       style="display: none;"></video>

     after the hello handshake when the wallpaper bundle is older. -->

<script>
"use strict";

// Pick up the screen index from the meta tag (set per-bundle when the
// Lively zip is built). Fall back to 0 if missing/garbage.
//
// The single-Workshop-item WE bundle DOESN'T pin the meta tag; instead it
// declares a `screenIndex` user property in project.json so each WE
// assignment (one per monitor) sets a different value. The
// `wallpaperPropertyListener` path below routes that property to
// setScreenIndex(), which reconnects the WS to the right screen on the
// fly. Default 0 covers the first-paint before WE delivers properties.
// Query-string parser used by both SCREEN_INDEX and PREVIEW_MODE.
// Wrapped in try/catch so the page still boots in environments where
// URLSearchParams is missing (very old WebView2 fallbacks, etc.).
const _URL_PARAMS = (function () {
  try { return new URLSearchParams(window.location.search); }
  catch (_) { return new URLSearchParams(""); }
})();

let SCREEN_INDEX = (function () {
  // Configurator's live-preview iframe passes ?screen=N directly. In
  // Lively / WE bundles the screen index comes from a <meta> tag the
  // installer bakes into the per-screen ZIP. URL param wins if both
  // present (covers re-using the same wallpaper page from multiple
  // origins).
  const qp = parseInt(_URL_PARAMS.get("screen"), 10);
  if (Number.isFinite(qp) && qp >= 0) return qp;
  const m = document.querySelector('meta[name="signalrgb-screen-index"]');
  const v = m && m.getAttribute("content");
  const n = parseInt(v, 10);
  return Number.isFinite(n) && n >= 0 ? n : 0;
})();

// v1.2.12: wallpaper bundle version. Reads from the <meta> tag the
// installer's build.ps1 stamps at staging time (`__WALLPAPER_VERSION__`
// placeholder -> "1.2.X"). When the file is served from the dev tree
// the placeholder stays intact and we report "dev" — the bridge then
// surfaces "wallpaper: dev" instead of triggering a stale-bundle hint.
const WALLPAPER_VERSION = (function () {
  try {
    const m = document.querySelector('meta[name="signalrgb-wallpaper-version"]');
    const raw = m && m.getAttribute("content");
    if (!raw || raw.indexOf("__") === 0) return "dev";
    return String(raw);
  } catch (_) { return "dev"; }
})();

function showVersionMismatchBanner(bridgeVer, wallpaperVer) {
