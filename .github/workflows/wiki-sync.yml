name: wiki-sync

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - tools/sync_wiki.py
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

permissions:
  contents: write

# Don't race the docs (Pages) deploy or other wiki-sync runs.
concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pyyaml

      - name: Clone wiki repo
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: Render docs/ into wiki
        run: python tools/sync_wiki.py wiki

      - name: Commit and push if changed
        working-directory: wiki
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "wiki: sync from docs/ @ ${GITHUB_SHA::7}"
            git push
          fi
