site_name: SignalRGB Desktop Wallpaper
site_description: Live RGB glow on your desktop, driven by your SignalRGB effect.
site_url: https://delido.github.io/signalrgb-wallpaper/
repo_url: https://github.com/Delido/signalrgb-wallpaper
repo_name: Delido/signalrgb-wallpaper
edit_uri: edit/main/docs/
copyright: MIT-licensed tooling · bundled imagery under its own notices

docs_dir: docs

theme:
  name: material
  logo: images/banner.png
  favicon: images/banner.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    # v2.2.1: navigation.instant DROPPED because it breaks
    # mkdocs-static-i18n's contextual language switcher — with
    # instant-nav active, clicking 🇩🇪 from /installation/ takes
    # you to /de/ (German homepage) instead of /de/installation/.
    # The page reloads now, but the switcher actually works.
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  # v2.2.1: mkdocs-static-i18n adds a language picker to the
  # Material header. Suffix strategy — docs/installation.md is the
  # canonical English page, docs/installation.de.md is its German
  # sibling. Pages without a `.de.md` sibling fall back to the
  # English version, so we don't have to translate every page at
  # once. Start with the user-facing docs (Home + Installation),
  # expand from there.
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Getting started: Erste Schritte
            Multi-screen setup: Multi-Monitor-Einrichtung
            Troubleshooting: Fehlerbehebung
            Using the app: App-Nutzung
            Building glow wallpapers: Glow-Wallpaper bauen
            Wallpaper packs: Wallpaper-Packs
            Tray reference: Tray-Referenz
            OpenRGB SDK server: OpenRGB-SDK-Server
            Reference: Referenz
            Architecture: Architektur
            REST API: REST-API
            Plugin API: Plugin-API
            Widget skins: Widget-Skins
            Publishing to Workshop: Workshop-Veröffentlichung
            Building from source: Aus Quellcode bauen
            Project: Projekt
            Changelog archive: Changelog-Archiv

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Delido/signalrgb-wallpaper
  # v2.2.1: declare the available languages so Material's i18n
  # picker shows them in the header. mkdocs-static-i18n's
  # reconfigure_material auto-injects this, but listing it here
  # too keeps the config explicit / greppable.
  alternate:
    - name: English
      link: /
      lang: en
    - name: Deutsch
      link: /de/
      lang: de

# Files in docs/ that are not part of the rendered site.
# v2.3.0-beta: library-packs.json IS copied to the rendered site
# now — the bridge fetches it from
# https://delido.github.io/signalrgb-wallpaper/library-packs.json
# to discover available wallpaper packs. Excluding it from
# rendering happens automatically because MkDocs only renders .md.
exclude_docs: |


nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Multi-screen setup: multi-screen-setup.md
      - Troubleshooting: troubleshooting.md
  - Using the app:
      - Building glow wallpapers: building-wallpapers.md
      - Wallpaper packs: wallpaper-packs.md
      - Tray reference: tray-settings.md
      - OpenRGB SDK server: openrgb-sdk-server.md
  - Reference:
      - Architecture: architecture.md
      - REST API: api.md
      - Plugin API: plugin-api.md
      - Widget skins: widget-skins.md
      - Publishing to Workshop: workshop-publishing.md
      - Building from source: building-from-source.md
  - Project:
      - Roadmap: roadmap.md
      - Credits: credits.md
      - Changelog archive: CHANGELOG-archive.md
